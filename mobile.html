<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#1a0f2e">
    <title>YzFi Ultimate — Социальная сеть</title>

    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            --primary: #5c3d8c; --accent: #b47aff; --bg: #1a0f2e; --card: #2d1b4e;
            --text: #e8d5f2; --dim: #b9a0d4; --danger: #ff5555; --success: #7fdb8a;
            --radius: 12px;
        }

        body.theme-light { --bg: #f5e6ff; --card: #e8d5f2; --text: #1a0f2e; --dim: #5c3d8c; }
        body.theme-stars { --bg: #0a0a2a; --card: rgba(25, 25, 70, 0.9); }
        body.theme-hedgehogs { --bg: #1a0a2e; --card: rgba(45, 20, 70, 0.9); }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: -apple-system, sans-serif; background-color: var(--bg); color: var(--text); height: 100vh; overflow: hidden; display: flex; flex-direction: column; transition: background 0.3s; }
        #bg-pattern { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: -1; opacity: 0.15; }

        .retro-card {
            background: var(--card); border: 2px solid var(--primary); border-radius: var(--radius);
            box-shadow: 4px 4px 0px var(--primary); margin: 12px; padding: 15px;
        }

        .content-area { flex: 1; overflow-y: auto; padding-bottom: 90px; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; background: var(--card); border-top: 2px solid var(--primary); display: flex; justify-content: space-around; padding: 10px 0 15px; z-index: 1000; }
        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--text-dim); font-size: 10px; cursor: pointer; }
        .nav-item.active { color: var(--accent); }
        .nav-item i { font-size: 26px; }

        .page { display: none; height: 100%; overflow-y: auto; }
        .page.active { display: block; }

        .avatar { width: 45px; height: 45px; border-radius: 10px; object-fit: cover; background: var(--primary); border: 1px solid var(--accent); display: flex; align-items: center; justify-content: center; font-weight: bold; color: #fff; }
        .avatar-lg { width: 90px; height: 90px; border-radius: 15px; font-size: 30px; }

        .p-tab { flex:1; text-align:center; padding:10px; cursor:pointer; font-weight: bold; font-size: 14px; transition: 0.3s; }
        .p-tab.active { background: var(--primary); color: #fff; }

        /* Fullscreen Screens (Chat & Comments) */
        #chat-screen, #comment-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 2000; display: none; flex-direction: column; }
        .chat-header { padding: 15px; background: var(--card); border-bottom: 2px solid var(--primary); display: flex; align-items: center; gap: 15px; }
        #msgs, #comment-list { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 8px; }

        .msg, .comment-bubble { max-width: 85%; padding: 10px; border-radius: 12px; position: relative; word-wrap: break-word; }
        .msg.out { align-self: flex-end; background: var(--primary); color: #fff; }
        .msg.in, .comment-bubble { align-self: flex-start; background: var(--card); border: 1px solid var(--primary); }

        .input-bar { padding: 10px 15px; background: var(--card); border-top: 2px solid var(--primary); display: flex; align-items: center; gap: 10px; }
        .input-bar input { margin: 0; flex: 1; }

        .post-img { width: 100%; border-radius: 8px; margin-top: 10px; border: 1px solid var(--primary); cursor: pointer; }
        .post-actions { display: flex; gap: 15px; margin-top: 12px; color: var(--accent); font-weight: bold; align-items: center; }
        .post-actions span { display: flex; align-items: center; gap: 4px; cursor: pointer; }

        .modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 3000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: var(--card); border: 2px solid var(--primary); border-radius: 15px; width: 100%; max-width: 400px; padding: 20px; max-height: 90vh; overflow-y: auto; }

        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; background: var(--bg); border: 1px solid var(--primary); border-radius: 8px; color: #fff; }
        .btn { width: 100%; padding: 12px; background: var(--accent); border: none; border-radius: 8px; color: var(--bg); font-weight: bold; cursor: pointer; }
        .hidden { display: none !important; }
        .repost-info { background: rgba(180,122,255,0.1); padding: 8px; border-radius: 8px; margin-bottom: 8px; font-size: 12px; font-style: italic; }

        .comment-item { display: flex; gap: 10px; padding: 5px 0; }
        .comment-item b { color: var(--accent); cursor: pointer; }

        .poll-opt { border: 1px solid var(--primary); padding: 10px; margin: 5px 0; border-radius: 8px; cursor: pointer; position: relative; overflow: hidden; }
        .poll-bar { position: absolute; left: 0; top: 0; height: 100%; background: var(--accent); opacity: 0.2; transition: width 0.4s; }
    </style>
</head>
<body class="theme-dark">

    <div id="bg-pattern"></div>

    <!-- Login -->
    <div id="page-auth" class="page active">
        <div style="text-align:center; padding: 50px 20px;">
            <h1 style="color:var(--accent); font-size:60px;">YzFi</h1>
            <div class="retro-card">
                <input type="text" id="auth-u" placeholder="Логин">
                <input type="password" id="auth-p" placeholder="Пароль">
                <button class="btn" onclick="login()">ВОЙТИ</button>
            </div>
        </div>
    </div>

    <!-- UI -->
    <div id="main-ui" class="hidden" style="height:100%; display:flex; flex-direction:column;">
        <div class="content-area">
            <div id="tab-chats" class="page active">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
                    <h2>Чаты</h2>
                    <div style="display:flex; gap:12px;">
                        <i class="material-icons" onclick="showM('m-group')">group_add</i>
                        <i class="material-icons" onclick="showM('m-search')">search</i>
                    </div>
                </div>
                <div id="list-chats"></div>
            </div>

            <div id="tab-feed" class="page">
                <div style="display:flex; justify-content:space-between; align-items:center; padding:15px;">
                    <h2 onclick="loadFeed()">Лента</h2>
                    <i class="material-icons" onclick="showM('m-post')">add_box</i>
                </div>
                <div id="list-feed"></div>
            </div>

            <div id="tab-notif" class="page"><h2 style="padding:15px;">События</h2><div id="list-notif"></div></div>

            <div id="tab-profile" class="page">
                <div id="p-header"></div>
                <div class="profile-tabs" style="display:flex; justify-content:center; gap:0; background:var(--card); margin:0 12px 10px; border-radius:var(--radius); border:2px solid var(--primary); overflow:hidden;">
                    <div id="p-tab-posts" class="p-tab active" onclick="switchProfileTab('posts')">Посты</div>
                    <div id="p-tab-reposts" class="p-tab" onclick="switchProfileTab('reposts')">Репосты</div>
                </div>
                <div id="list-user-posts"></div>
            </div>

            <div id="tab-settings" class="page">
                <h2 style="padding:15px;">Настройки</h2>
                <div class="retro-card">
                    <label>Тема</label>
                    <select onchange="applyT(this.value)"><option value="dark">Тёмная</option><option value="light">Светлая</option><option value="stars">Звёздная</option><option value="hedgehogs">Ёжики</option></select>
                    <label>Скругление (px)</label>
                    <input type="range" min="0" max="30" value="12" oninput="applyR(this.value)">
                    <button class="btn" style="background:var(--danger); color:white; margin-top:20px;" onclick="logout()">ВЫЙТИ</button>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="tab('chats')"><i class="material-icons">chat</i><span>Чаты</span></div>
            <div class="nav-item" onclick="tab('feed')"><i class="material-icons">explore</i><span>Лента</span></div>
            <div class="nav-item" onclick="tab('notif')"><i class="material-icons">notifications</i><span>События</span></div>
            <div class="nav-item" onclick="tab('profile'); openProfile(me.uid)"><i class="material-icons">person</i><span>Профиль</span></div>
            <div class="nav-item" onclick="tab('settings')"><i class="material-icons">settings</i><span>Опции</span></div>
        </div>
    </div>

    <!-- Chat Overlay -->
    <div id="chat-screen">
        <div class="chat-header">
            <i class="material-icons" onclick="closeC()">arrow_back</i>
            <div id="c-av-box"></div>
            <div style="flex:1"><b id="c-name"></b><br><small id="c-stat">онлайн</small></div>
        </div>
        <div id="msgs"></div>
        <div class="input-bar">
            <input type="text" id="m-in" placeholder="Сообщение..." onkeypress="if(event.key==='Enter') sendM()">
            <i class="material-icons" style="color:var(--accent); cursor:pointer;" onclick="sendM()">send</i>
        </div>
    </div>

    <!-- Comments Screen -->
    <div id="comment-screen">
        <div class="chat-header">
            <i class="material-icons" onclick="closeComm()">arrow_back</i>
            <div id="p-av-box"></div>
            <div style="flex:1"><b>Комментарии</b><br><small id="p-author-name">пост</small></div>
        </div>
        <div id="comment-list"></div>
        <div class="input-bar">
            <input type="text" id="c-in" placeholder="Написать комментарий..." onkeypress="if(event.key==='Enter') addComment()">
            <i class="material-icons" style="color:var(--accent); cursor:pointer;" onclick="addComment()">send</i>
        </div>
    </div>

    <!-- Search Modal -->
    <div id="m-search" class="modal">
        <div class="modal-content">
            <h3>Поиск пользователя</h3>
            <input type="text" placeholder="Введите имя..." oninput="searchU(this.value)">
            <div id="search-res" style="margin-top:10px; max-height: 300px; overflow-y: auto;"></div>
            <button class="btn btn-ghost" onclick="hideM()" style="margin-top:10px; background:none; color:var(--dim)">ЗАКРЫТЬ</button>
        </div>
    </div>

    <div id="m-post" class="modal"><div class="modal-content"><h3>Новый пост</h3><textarea id="p-t" rows="4" placeholder="Что нового?"></textarea><input type="text" id="p-i" placeholder="URL картинки"><button class="btn" onclick="addP()">ОПУБЛИКОВАТЬ</button></div></div>
    <div id="m-group" class="modal"><div class="modal-content"><h3>Создать группу</h3><input type="text" id="g-n" placeholder="Имя"><input type="text" id="g-h" placeholder="@хендл"><button class="btn" onclick="addG()">СОЗДАТЬ</button></div></div>

    <script>
        const config = { apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk", authDomain: "hlypalka.firebaseapp.com", projectId: "hlypalka", storageBucket: "hlypalka.firebasestorage.app", messagingSenderId: "41063525028", appId: "1:41063525028:web:253e10e09ec8ff4cf75431" };
        firebase.initializeApp(config);
        const db = firebase.firestore(), auth = firebase.auth();
        let me = null, myD = null, curC = null, curP = null, lastT = 'chats', unsubMsgs = null, unsubComments = null, unsubProfilePosts = null;
        let curProfileUid = null, curProfileTab = 'posts';
        const viewedPosts = new Set(JSON.parse(sessionStorage.getItem('viewedPosts') || '[]'));

        // GESTURES
        let startX = 0;
        document.addEventListener('touchstart', e => startX = e.touches[0].clientX);
        document.addEventListener('touchend', e => {
            if(e.changedTouches[0].clientX - startX > 150) {
                if(document.getElementById('chat-screen').style.display === 'flex') closeC();
                else if(document.getElementById('comment-screen').style.display === 'flex') closeComm();
                else if(document.getElementById('tab-profile').classList.contains('active')) tab(lastT);
                else hideM();
            }
        });

        async function login() {
            const u = document.getElementById('auth-u').value, p = document.getElementById('auth-p').value;
            try { await auth.signInWithEmailAndPassword(u+"@fichat.com", p); init(); } catch(e) { alert(e.message); }
        }

        function init() {
            me = auth.currentUser;
            document.getElementById('page-auth').classList.add('hidden');
            document.getElementById('main-ui').classList.remove('hidden');
            db.collection('users').doc(me.uid).onSnapshot(d => { myD = d.data(); if(myD) db.collection('users').doc(me.uid).update({online:true}); });
            loadChats(); loadFeed(); loadNotifs();
        }

        function tab(t) {
            if(t !== 'profile') lastT = t;
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('tab-'+t).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            const idx = {chats:0, feed:1, notif:2, profile:3, settings:4}[t];
            document.querySelectorAll('.nav-item')[idx].classList.add('active');
        }

        function getAv(u, sz='') {
            const name = u?.username || u?.authorName || u?.name || 'U';
            const url = u?.avatar || u?.authorAvatar || u?.peerAvatar;
            if(url) return `<img src="${url}" class="avatar ${sz}">`;
            return `<div class="avatar ${sz}">${name[0].toUpperCase()}</div>`;
        }

        async function openProfile(uid) {
            tab('profile');
            curProfileUid = uid;
            curProfileTab = 'posts';
            updateProfileTabsUI();

            const uDoc = await db.collection('users').doc(uid).get();
            const u = uDoc.data();
            const h = document.getElementById('p-header');
            const isFollowing = myD?.following?.includes(uid);
            h.innerHTML = `<div class="retro-card" style="text-align:center;">
                ${getAv(u, 'avatar-lg')}
                <h2>${u.username}</h2><p style="color:var(--accent)">${u.userHandle}</p>
                <div style="display:flex; justify-content:center; gap:20px; margin:15px 0;">
                    <b>${u.followers?.length||0}<br><small>Подписчики</small></b>
                    <b>${u.following?.length||0}<br><small>Подписки</small></b>
                </div>
                ${uid !== me.uid ? `<button class="btn" onclick="follow('${uid}')">${isFollowing?'ОТПИСАТЬСЯ':'ПОДПИСАТЬСЯ'}</button>` : ''}
            </div>`;
            loadProfilePosts();
        }

        function switchProfileTab(t) {
            curProfileTab = t;
            updateProfileTabsUI();
            loadProfilePosts();
        }

        function updateProfileTabsUI() {
            document.getElementById('p-tab-posts').classList.toggle('active', curProfileTab === 'posts');
            document.getElementById('p-tab-reposts').classList.toggle('active', curProfileTab === 'reposts');
        }

        function loadProfilePosts() {
            if(unsubProfilePosts) unsubProfilePosts();
            let q = db.collection('posts').where('authorId','==',curProfileUid);

            unsubProfilePosts = q.orderBy('timestamp','desc').onSnapshot(s => {
                const l = document.getElementById('list-user-posts'); l.innerHTML = '';
                let count = 0;
                s.forEach(doc => {
                    const p = doc.data();
                    const isR = p.isRepost === true;
                    if ((curProfileTab === 'posts' && !isR) || (curProfileTab === 'reposts' && isR)) {
                        l.appendChild(postUI(doc.id, p));
                        count++;
                    }
                });
                if(count === 0) l.innerHTML = '<div style="text-align:center; opacity:0.5; margin-top:20px;">Здесь пока ничего нет</div>';
            });
        }

        function postUI(id, p) {
            const div = document.createElement('div'); div.className = 'retro-card';
            const likesCount = p.likes ? Object.keys(p.likes).length : 0;
            const isLiked = p.likes && p.likes[me.uid];
            div.innerHTML = `
                ${p.isRepost ? `<div class="repost-info">🔁 Репост от ${p.originalAuthorName}</div>` : ''}
                <div style="display:flex; align-items:center; gap:10px; cursor:pointer;" onclick="openProfile('${p.authorId}')">
                    ${getAv(p)} <div><b>${p.authorName}</b><br><small>${p.authorHandle}</small></div>
                </div>
                <p style="margin:10px 0;">${p.text}</p>
                ${p.imageUrl ? `<img src="${p.imageUrl}" class="post-img" onclick="window.open('${p.imageUrl}')">` : ''}
                ${p.isPoll ? renderPoll(id, p) : ''}
                <div style="font-size:10px; color:var(--text-dim); margin-top:8px;">👀 Просмотры: ${p.viewsCount||0}</div>
                <div class="post-actions">
                    <span onclick="toggleLike('${id}')"><i class="material-icons">${isLiked?'favorite':'favorite_border'}</i> ${likesCount}</span>
                    <span onclick="openComments('${id}')"><i class="material-icons">chat_bubble_outline</i> ${p.commentCount||0}</span>
                    <span onclick="repost('${id}')"><i class="material-icons">repeat</i> ${p.repostCount||0}</span>
                    <i class="material-icons" style="margin-left:auto;" onclick="report('${id}')">report</i>
                    ${p.authorId === me.uid ? `<i class="material-icons" onclick="delP('${id}')">delete</i>` : ''}
                </div>`;
            if(p.authorId !== me.uid && !viewedPosts.has(id)) {
                viewedPosts.add(id); sessionStorage.setItem('viewedPosts', JSON.stringify([...viewedPosts]));
                db.collection('posts').doc(id).update({viewsCount: firebase.firestore.FieldValue.increment(1)}).catch(()=>{});
            }
            return div;
        }

        function renderPoll(id, p) {
            const total = (p.pollResults||[]).reduce((a,b)=>a+b, 0) || 1;
            return `<div style="background:rgba(0,0,0,0.1); padding:10px; border-radius:8px;">${p.pollOptions.map((opt, i)=>`
                <div class="poll-opt" onclick="vote('${id}', ${i})">
                    <div class="poll-bar" style="width:${((p.pollResults[i]||0)/total)*100}%"></div>
                    <span style="position:relative">${opt} (${Math.round(((p.pollResults[i]||0)/total)*100)}%)</span>
                </div>`).join('')}</div>`;
        }

        async function vote(postId, optIdx) {
            const ref = db.collection('posts').doc(postId);
            await db.runTransaction(async t => {
                const doc = await t.get(ref);
                const p = doc.data();
                if (p.votedUsers && p.votedUsers.includes(me.uid)) return;
                let results = p.pollResults || new Array(p.pollOptions.length).fill(0);
                results[optIdx]++;
                t.update(ref, {
                    pollResults: results,
                    votedUsers: firebase.firestore.FieldValue.arrayUnion(me.uid)
                });
            });
        }

        async function toggleLike(id) {
            const ref = db.collection('posts').doc(id);
            await db.runTransaction(async t => {
                const doc = await t.get(ref);
                let likes = doc.data().likes || {};
                if(likes[me.uid]) delete likes[me.uid]; else likes[me.uid] = true;
                t.update(ref, {likes});
            });
        }

        async function repost(id) {
            const originalId = id;
            // Check if already reposted
            const existing = await db.collection('posts')
                .where('authorId', '==', me.uid)
                .where('originalPostId', '==', originalId)
                .get();

            if (!existing.empty) {
                alert('Вы уже делали репост этого поста!');
                return;
            }

            const doc = await db.collection('posts').doc(id).get();
            const p = doc.data();

            // If we are reposting a repost, we should still point to the original or the one we are looking at?
            // Usually it points to the original. But here p might already be a repost.
            const targetId = p.isRepost ? p.originalPostId : id;
            const targetAuthorName = p.isRepost ? p.originalAuthorName : p.authorName;

            await db.collection('posts').add({
                ...p, authorId: me.uid, authorName: myD.username, authorHandle: myD.userHandle, authorAvatar: myD.avatar,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(), isRepost: true, originalPostId: targetId, originalAuthorName: targetAuthorName,
                likes: {}, commentCount: 0, viewsCount: 0, repostCount: 0
            });
            await db.collection('posts').doc(id).update({repostCount: firebase.firestore.FieldValue.increment(1)});
            alert('Репост выполнен!');
        }

        async function openComments(id) {
            curP = id;
            const pDoc = await db.collection('posts').doc(id).get();
            const p = pDoc.data();
            document.getElementById('p-av-box').innerHTML = getAv(p, 'width:35px;height:35px;');
            document.getElementById('p-author-name').innerText = p.authorName;
            document.getElementById('comment-screen').style.display='flex';
            loadComments(id);
        }

        function loadComments(id) {
            if(unsubComments) unsubComments();
            unsubComments = db.collection('posts').doc(id).collection('comments').orderBy('timestamp','asc').onSnapshot(s => {
                const l = document.getElementById('comment-list'); l.innerHTML = '';
                if(s.empty) l.innerHTML = '<div style="text-align:center; opacity:0.5; margin-top:20px;">Нет комментариев</div>';
                s.forEach(d => {
                    const c = d.data(); const div = document.createElement('div'); div.className = 'comment-item';
                    div.innerHTML = `${getAv({avatar:c.authorAvatar, username:c.authorName}, 'width:35px;height:35px;')} <div class="comment-bubble"> <b onclick="closeComm(); openProfile('${c.authorId}')">${c.authorName}</b><br>${c.text} </div>`;
                    l.appendChild(div);
                });
                l.scrollTop = l.scrollHeight;
            });
        }
        async function addComment() {
            const i = document.getElementById('c-in'), t = i.value.trim(); if(!t) return;
            await db.collection('posts').doc(curP).collection('comments').add({ authorId: me.uid, authorName: myD.username, authorAvatar: myD.avatar, text: t, timestamp: firebase.firestore.FieldValue.serverTimestamp() });
            await db.collection('posts').doc(curP).update({commentCount: firebase.firestore.FieldValue.increment(1)});
            i.value = '';
        }

        async function searchU(q) {
            if(q.length < 2) return;
            const term = q.toLowerCase();
            const s = await db.collection('users').where('usernameLower','>=',term).where('usernameLower','<=',term+'\uf8ff').limit(10).get();
            const res = document.getElementById('search-res'); res.innerHTML = '';
            s.forEach(doc => { const u = doc.data(); const div = document.createElement('div'); div.className="retro-card"; div.style="display:flex;align-items:center;gap:10px;padding:10px;cursor:pointer;"; div.innerHTML=`${getAv(u)} <b>${u.username}</b>`; div.onclick=()=>{ hideM(); openProfile(doc.id); }; res.appendChild(div); });
        }

        function loadChats() {
            db.collection('users').doc(me.uid).collection('chats').orderBy('lastMessageTime','desc').onSnapshot(s => {
                const l = document.getElementById('list-chats'); l.innerHTML = '';
                s.forEach(d => {
                    const c = d.data(); const div = document.createElement('div'); div.className = 'retro-card'; div.style="display:flex; align-items:center; gap:10px; cursor:pointer;";
                    div.innerHTML = `${getAv({peerAvatar:c.peerAvatar, name:c.username||c.name})} <div style="flex:1"><b>${c.username||c.name}</b><br><small style="color:var(--text-dim)">${c.lastMessage}</small></div>`;
                    div.onclick = () => openChat(d.id, c); l.appendChild(div);
                });
            });
        }

        function openChat(id, data) {
            curC = {id, ...data}; document.getElementById('chat-screen').style.display='flex';
            document.getElementById('c-name').innerText = data.username||data.name;
            document.getElementById('c-av-box').innerHTML = getAv({avatar:data.peerAvatar, name:data.username||data.name}, 'width:35px;height:35px;');
            if(unsubMsgs) unsubMsgs();
            const path = curC.type==='dm' ? db.collection('chats').doc([me.uid, id].sort().join('_')).collection('messages') : db.collection('conversations').doc(id).collection('messages');
            unsubMsgs = path.orderBy('timestamp','asc').onSnapshot(s => {
                const area = document.getElementById('msgs'); area.innerHTML = '';
                s.forEach(mDoc => { const m = mDoc.data(); const div = document.createElement('div'); div.className = `msg ${m.userId===me.uid?'out':'in'}`; div.innerText = m.text; area.appendChild(div); });
                area.scrollTop = area.scrollHeight;
            });
        }

        async function sendM() {
            const i = document.getElementById('m-in'), t = i.value.trim(); if(!t) return;
            const msg = { userId: me.uid, username: myD.username, text: t, timestamp: firebase.firestore.FieldValue.serverTimestamp(), readBy: {[me.uid]:firebase.firestore.FieldValue.serverTimestamp()} };
            const path = curC.type==='dm' ? db.collection('chats').doc([me.uid, curC.id].sort().join('_')).collection('messages') : db.collection('conversations').doc(curC.id).collection('messages');
            await path.add(msg); i.value = '';
            const upd = { lastMessage: t, lastMessageTime: firebase.firestore.FieldValue.serverTimestamp() };
            db.collection('users').doc(me.uid).collection('chats').doc(curC.id).update(upd);
            if(curC.type==='dm') db.collection('users').doc(curC.id).collection('chats').doc(me.uid).set({...upd, username:myD.username, peerAvatar:myD.avatar, type:'dm', userId:me.uid}, {merge:true});
        }

        function loadFeed() { db.collection('posts').orderBy('timestamp','desc').limit(30).onSnapshot(s => { const l = document.getElementById('list-feed'); l.innerHTML = ''; s.forEach(d => l.appendChild(postUI(d.id, d.data()))); }); }
        function loadNotifs() { db.collection('users').doc(me.uid).collection('notifications').orderBy('timestamp','desc').limit(15).onSnapshot(s => { const l = document.getElementById('list-notif'); l.innerHTML = ''; s.forEach(d => { const n = d.data(); const div = document.createElement('div'); div.className = 'retro-card'; div.innerHTML = `<b>${n.senderName}</b> ${n.text}`; l.appendChild(div); }); }); }
        function showM(id) { document.getElementById(id).style.display='flex'; }
        function hideM() { document.querySelectorAll('.modal').forEach(m => m.style.display='none'); }
        function closeC() { document.getElementById('chat-screen').style.display='none'; if(unsubMsgs) unsubMsgs(); }
        function closeComm() { document.getElementById('comment-screen').style.display='none'; if(unsubComments) unsubComments(); }
        function applyT(v) { document.body.className = 'theme-'+v; }
        function applyR(v) { document.documentElement.style.setProperty('--radius', v+'px'); }
        function logout() { db.collection('users').doc(me.uid).update({online:false}); auth.signOut(); location.reload(); }
        async function delP(id) { if(confirm('Удалить?')) await db.collection('posts').doc(id).delete(); }
        async function addP() { const t = document.getElementById('p-t').value, img = document.getElementById('p-i').value; if(!t.trim()) return; await db.collection('posts').add({ authorId:me.uid, authorName:myD.username, authorHandle:myD.userHandle, authorAvatar:myD.avatar, text:t, imageUrl:img||null, timestamp:firebase.firestore.FieldValue.serverTimestamp(), likes:{}, commentCount:0, viewsCount:0, repostCount:0 }); hideM(); document.getElementById('p-t').value=''; document.getElementById('p-i').value=''; }
        async function addG() { const n = document.getElementById('g-n').value, h = document.getElementById('g-h').value; if(!n || !h) return; const gid = "group_" + Date.now(); const gData = { id:gid, name:n, userHandle:h, type:'group', ownerId:me.uid, admins:[me.uid], lastMessage:'Группа создана', lastMessageTime:firebase.firestore.FieldValue.serverTimestamp() }; await db.collection('public_chats').doc(h.replace('@','')).set(gData); await db.collection('users').doc(me.uid).collection('chats').doc(gid).set(gData); hideM(); }
        async function report(id) { if(confirm('Пожаловаться?')) await db.collection('posts').doc(id).update({reportCount: firebase.firestore.FieldValue.increment(1)}); }
        async function follow(uid) {
            const isF = myD?.following?.includes(uid);
            const batch = db.batch();
            if(isF) {
                batch.update(db.collection('users').doc(me.uid), {following: firebase.firestore.FieldValue.arrayRemove(uid)});
                batch.update(db.collection('users').doc(uid), {followers: firebase.firestore.FieldValue.arrayRemove(me.uid)});
            } else {
                batch.update(db.collection('users').doc(me.uid), {following: firebase.firestore.FieldValue.arrayUnion(uid)});
                batch.update(db.collection('users').doc(uid), {followers: firebase.firestore.FieldValue.arrayUnion(me.uid)});
            }
            await batch.commit();
        }

        auth.onAuthStateChanged(u => { if(u) init(); });
    </script>
</body>
</html>
