<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
    <meta name="theme-color" content="#2d1b4e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>YzFi — лента</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            background: #1a0f2e;
            color: #e8d5f2;
            line-height: 1.45;
            font-size: 15px;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 520px;
            margin: 0 auto;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }

        /* Хедер */
        .header {
            background: linear-gradient(180deg, #4a2f7a, #2d1b4e);
            border: 2px solid #110822;
            border-radius: 0 0 8px 8px;
            padding: 12px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            flex-shrink: 0;
            box-shadow: 0 4px 0 #110822;
        }

        .header h1 {
            font-size: 1.2rem;
            color: #f5e6ff;
            text-shadow: 1px 1px 0 #000;
            letter-spacing: 0.06em;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        button, .btn {
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #110822;
            border-radius: 4px;
            padding: 10px 14px;
            cursor: pointer;
            background: #b47aff;
            color: #1a0f2e;
            box-shadow: 2px 2px 0 #110822;
            touch-action: manipulation;
            transition: all 0.05s ease;
        }

        button:active, .btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #110822;
        }

        button.secondary {
            background: #3d2666;
            color: #f5e6ff;
        }

        button.small {
            padding: 6px 12px;
            font-size: 13px;
        }

        /* Лента */
        .feed {
            flex: 1;
            overflow-y: auto;
            padding: 8px 8px 80px 8px;
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Карточка поста */
        .post-card {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 8px;
            overflow: hidden;
            box-shadow: 3px 3px 0 rgba(0, 0, 0, 0.35);
        }

        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #3d2666;
        }

        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            border: 2px solid #110822;
            background: #3d2666;
            cursor: pointer;
            transition: opacity 0.2s ease;
        }

        .post-avatar:hover {
            opacity: 0.8;
        }

        .post-author {
            flex: 1;
            cursor: pointer;
        }

        .post-name {
            font-weight: bold;
            color: #7fdb8a;
            font-size: 1rem;
            transition: color 0.2s ease;
        }

        .post-name:hover {
            color: #9effaa;
            text-decoration: underline;
        }

        .post-handle {
            font-size: 12px;
            color: #b47aff;
            font-family: monospace;
            transition: color 0.2s ease;
        }

        .post-handle:hover {
            color: #d4a5ff;
            text-decoration: underline;
        }

        .post-time {
            font-size: 11px;
            color: #8a739e;
        }

        .post-image {
            width: 100%;
            max-height: 480px;
            object-fit: cover;
            background: #12081f;
            border-bottom: 1px solid #3d2666;
        }

        .post-text {
            padding: 12px;
            font-size: 15px;
            line-height: 1.4;
            word-break: break-word;
            border-bottom: 1px solid #3d2666;
        }

        .post-actions {
            display: flex;
            gap: 20px;
            padding: 10px 12px;
            border-bottom: 1px solid #3d2666;
        }

        .action-btn {
            background: none;
            border: none;
            box-shadow: none;
            padding: 6px 12px;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            color: #e8d5f2;
        }

        .action-btn:active {
            transform: none;
            opacity: 0.7;
        }

        .action-btn.liked {
            color: #ff6b6b;
        }

        .action-stats {
            display: flex;
            gap: 4px;
            font-size: 13px;
            color: #9a84b8;
            margin-left: auto;
            align-items: center;
        }

        .comments-section {
            padding: 8px 12px 12px;
            background: #12081f;
        }

        .comment {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .comment-name {
            color: #7fdb8a;
            font-weight: bold;
            flex-shrink: 0;
            cursor: pointer;
            transition: color 0.2s ease;
        }

        .comment-name:hover {
            color: #9effaa;
            text-decoration: underline;
        }

        .comment-text {
            color: #e8d5f2;
            word-break: break-word;
            flex: 1;
        }

        .comment-time {
            font-size: 10px;
            color: #8a739e;
            flex-shrink: 0;
        }

        .add-comment {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .add-comment input {
            flex: 1;
            padding: 10px 12px;
            border: 2px solid #110822;
            border-radius: 4px;
            background: #f5e6ff;
            font-size: 14px;
        }

        .add-comment button {
            padding: 8px 14px;
            margin: 0;
        }

        .empty-feed {
            text-align: center;
            padding: 48px 20px;
            color: #9a84b8;
        }

        .empty-feed strong {
            color: #7fdb8a;
            display: block;
            margin-bottom: 8px;
        }

        /* Модалка создания поста */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            max-height: 90dvh;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 6px 6px 0 #110822;
        }

        .modal h3 {
            color: #f5e6ff;
            margin-bottom: 16px;
        }

        .modal textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #110822;
            border-radius: 4px;
            background: #f5e6ff;
            font-size: 15px;
            font-family: inherit;
            resize: vertical;
            margin-bottom: 12px;
        }

        .modal .image-preview {
            max-width: 100%;
            max-height: 200px;
            margin: 10px 0;
            border-radius: 4px;
            border: 2px solid #110822;
        }

        .modal-actions {
            display: flex;
            gap: 12px;
            margin-top: 16px;
        }

        .hidden {
            display: none !important;
        }

        .toast {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 12px;
            right: 12px;
            background: #1a5a2a;
            border: 2px solid #110822;
            color: #ccffcc;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            z-index: 1100;
            animation: fadeInUp 0.3s ease;
        }

        .toast.error {
            background: #5a1a1a;
            color: #ffcccc;
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #b47aff;
        }

        /* Стили для кликабельных элементов */
        .clickable {
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 YzFi · лента</h1>
            <div class="header-buttons">
                <button class="secondary" onclick="goToChats()">💬 чаты</button>
                <button class="secondary" onclick="goToProfile()">👤 я</button>
                <button onclick="openCreatePostModal()">➕ создать</button>
            </div>
        </div>

        <div class="feed" id="feedContainer">
            <div class="loading">⏳ Загрузка ленты...</div>
        </div>
    </div>

    <!-- Модалка создания поста -->
    <div id="createPostModal" class="modal-overlay hidden" onclick="if(event.target===this) closeCreatePostModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>✨ Новый пост</h3>
            <textarea id="postText" rows="3" placeholder="Что у вас нового? (до 1000 символов)" maxlength="1000"></textarea>
            <input type="file" id="postImageInput" accept="image/*" style="margin-bottom: 12px;">
            <div id="imagePreviewContainer" class="hidden"></div>
            <div class="modal-actions">
                <button onclick="submitPost()">📤 Опубликовать</button>
                <button class="secondary" onclick="closeCreatePostModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const IMGBB_API_KEY = '532c1a46efe25420841b8296f7eeed3f';

        let currentUser = null;
        let userProfile = null;
        let unsubscribeFeed = null;
        
        // Хранилище для отслеживания просмотренных постов (в этой сессии)
        let viewedPosts = new Set();

        // Элементы
        const feedContainer = document.getElementById('feedContainer');
        const createPostModal = document.getElementById('createPostModal');
        const postText = document.getElementById('postText');
        const postImageInput = document.getElementById('postImageInput');
        const imagePreviewContainer = document.getElementById('imagePreviewContainer');

        // Утилиты
        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = isError ? '❌ ' + msg : '✅ ' + msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatTime(date) {
            if (!date) return '';
            const now = new Date();
            const diff = now - date;
            if (diff < 60000) return 'только что';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' мин назад';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ч назад';
            return date.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
        }

        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        // Навигация
        function goToChats() {
            window.location.href = 'chat.html';
        }

        function goToProfile() {
            window.location.href = 'profil.html';
        }

        function goToUserProfile(userId) {
            if (userId === currentUser?.uid) {
                window.location.href = 'profil.html';
            } else {
                window.location.href = `users_profil.html?userId=${userId}`;
            }
        }

        // Инициализация
        async function init() {
            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                currentUser = user;
                await loadUserProfile();
                loadFeed();
            });
        }

        async function loadUserProfile() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    userProfile = doc.data();
                    if (!userProfile.username) {
                        userProfile.username = currentUser.displayName || 'Пользователь';
                    }
                } else {
                    userProfile = { username: currentUser.displayName || 'Пользователь' };
                }
            } catch (e) {
                console.error('Ошибка загрузки профиля:', e);
            }
        }

        // Функция для регистрации просмотра
        async function registerView(postId, authorId) {
            // Не учитываем просмотр автором своего поста
            if (authorId === currentUser.uid) return;
            
            // Проверяем, не смотрели ли уже этот пост в текущей сессии
            if (viewedPosts.has(postId)) return;
            
            viewedPosts.add(postId);
            
            try {
                const postRef = db.collection('posts').doc(postId);
                await postRef.update({
                    [`views.${currentUser.uid}`]: firebase.firestore.FieldValue.serverTimestamp(),
                    viewsCount: firebase.firestore.FieldValue.increment(1)
                });
            } catch (e) {
                console.error('Ошибка регистрации просмотра:', e);
            }
        }

        // Загрузка ленты (посты в реальном времени)
        function loadFeed() {
            if (unsubscribeFeed) unsubscribeFeed();

            feedContainer.innerHTML = '<div class="loading">📡 Загрузка ленты...</div>';

            unsubscribeFeed = db.collection('posts')
                .orderBy('timestamp', 'desc')
                .limit(50)
                .onSnapshot((snapshot) => {
                    if (snapshot.empty) {
                        feedContainer.innerHTML = `
                            <div class="empty-feed">
                                <strong>✨ Пока нет постов</strong>
                                Нажмите «создать» и поделитесь чем-нибудь!
                            </div>
                        `;
                        return;
                    }

                    feedContainer.innerHTML = '';
                    snapshot.forEach(doc => {
                        const post = { id: doc.id, ...doc.data() };
                        renderPost(post);
                    });
                }, (error) => {
                    console.error('Ошибка загрузки ленты:', error);
                    feedContainer.innerHTML = '<div class="empty-feed">⚠️ Не удалось загрузить ленту</div>';
                });
        }

        // Рендер одного поста
        async function renderPost(post) {
            const postDiv = document.createElement('div');
            postDiv.className = 'post-card';
            postDiv.id = `post-${post.id}`;

            // Информация об авторе
            let authorName = post.authorName || 'Пользователь';
            let authorHandle = post.authorHandle || '';
            let authorAvatar = post.authorAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(authorName)}&background=5c3d8c&color=f5e6ff&size=88`;

            if (post.authorId) {
                try {
                    const userDoc = await db.collection('users').doc(post.authorId).get();
                    if (userDoc.exists) {
                        const data = userDoc.data();
                        authorName = data.username || authorName;
                        authorHandle = data.userHandle || ('$' + (data.usernameLower || authorName.toLowerCase()));
                        authorAvatar = data.avatar || authorAvatar;
                    }
                } catch (e) { /* fallback */ }
            }

            const timestamp = post.timestamp?.toDate ? post.timestamp.toDate() : new Date();
            const timeStr = formatTime(timestamp);

            const isLiked = post.likes && post.likes[currentUser.uid] === true;
            const likesCount = post.likes ? Object.keys(post.likes).length : 0;
            const viewsCount = post.viewsCount || 0;
            
            // Регистрируем просмотр (если пост виден в ленте)
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => {
                    if (entry.isIntersecting) {
                        registerView(post.id, post.authorId);
                        observer.disconnect();
                    }
                });
            }, { threshold: 0.5 });
            
            // HTML карточки
            postDiv.innerHTML = `
                <div class="post-header">
                    <img class="post-avatar" src="${escapeHtml(authorAvatar)}" alt="аватар" loading="lazy">
                    <div class="post-author">
                        <div class="post-name">${escapeHtml(authorName)}</div>
                        <div class="post-handle">${escapeHtml(authorHandle)}</div>
                    </div>
                    <div class="post-time">${timeStr}</div>
                </div>
                ${post.imageUrl ? `<img class="post-image" src="${escapeHtml(post.imageUrl)}" alt="пост" loading="lazy">` : ''}
                ${post.text ? `<div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>` : ''}
                <div class="post-actions">
                    <button class="action-btn ${isLiked ? 'liked' : ''}" data-action="like" data-post-id="${post.id}">
                        ❤️ <span class="likes-count">${formatNumber(likesCount)}</span>
                    </button>
                    <button class="action-btn" data-action="comment" data-post-id="${post.id}">
                        💬 <span class="comments-count">${post.commentCount || 0}</span>
                    </button>
                    <div class="action-stats">
                        👁️ ${formatNumber(viewsCount)}
                    </div>
                </div>
                <div class="comments-section" id="comments-${post.id}">
                    <div class="comments-list"></div>
                    <div class="add-comment">
                        <input type="text" placeholder="Написать комментарий..." maxlength="300" id="comment-input-${post.id}">
                        <button class="small" data-action="add-comment" data-post-id="${post.id}">→</button>
                    </div>
                </div>
            `;

            // Добавляем обработчики для перехода на профиль
            const avatarImg = postDiv.querySelector('.post-avatar');
            const authorDiv = postDiv.querySelector('.post-author');
            const postName = postDiv.querySelector('.post-name');
            const postHandle = postDiv.querySelector('.post-handle');
            
            const goToProfileHandler = () => goToUserProfile(post.authorId);
            
            avatarImg.addEventListener('click', goToProfileHandler);
            authorDiv.addEventListener('click', goToProfileHandler);
            postName.addEventListener('click', goToProfileHandler);
            postHandle.addEventListener('click', goToProfileHandler);
            
            // Добавляем стили курсора для всех кликабельных элементов
            avatarImg.style.cursor = 'pointer';
            authorDiv.style.cursor = 'pointer';
            postName.style.cursor = 'pointer';
            postHandle.style.cursor = 'pointer';

            // Подключаем Intersection Observer для регистрации просмотра
            observer.observe(postDiv);

            // Обработчики событий
            const likeBtn = postDiv.querySelector(`[data-action="like"]`);
            if (likeBtn) {
                likeBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    toggleLike(post.id, post);
                });
            }

            const addCommentBtn = postDiv.querySelector(`[data-action="add-comment"]`);
            if (addCommentBtn) {
                addCommentBtn.addEventListener('click', (e) => {
                    e.stopPropagation();
                    const input = postDiv.querySelector(`#comment-input-${post.id}`);
                    if (input && input.value.trim()) {
                        addComment(post.id, input.value.trim());
                        input.value = '';
                    }
                });
            }
            
            // Добавляем возможность отправки комментария по Enter
            const commentInput = postDiv.querySelector(`#comment-input-${post.id}`);
            if (commentInput) {
                commentInput.addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') {
                        e.preventDefault();
                        if (commentInput.value.trim()) {
                            addComment(post.id, commentInput.value.trim());
                            commentInput.value = '';
                        }
                    }
                });
            }

            // Подписываемся на комментарии к этому посту
            subscribeComments(post.id, postDiv);

            feedContainer.appendChild(postDiv);
        }

        // Лайк / анлайк
        async function toggleLike(postId, post) {
            if (!currentUser) return;

            const postRef = db.collection('posts').doc(postId);
            const isLiked = post.likes && post.likes[currentUser.uid] === true;

            try {
                if (isLiked) {
                    await postRef.update({
                        [`likes.${currentUser.uid}`]: firebase.firestore.FieldValue.delete()
                    });
                } else {
                    await postRef.update({
                        [`likes.${currentUser.uid}`]: true
                    });
                }
                // Обновляем счетчик в UI сразу (оптимистично)
                const likesSpan = document.querySelector(`#post-${postId} .likes-count`);
                if (likesSpan) {
                    const currentText = likesSpan.textContent;
                    let currentCount = 0;
                    if (currentText.includes('k')) {
                        currentCount = parseFloat(currentText) * 1000;
                    } else {
                        currentCount = parseInt(currentText) || 0;
                    }
                    const newCount = isLiked ? currentCount - 1 : currentCount + 1;
                    likesSpan.textContent = formatNumber(newCount);
                }
                const likeBtn = document.querySelector(`#post-${postId} [data-action="like"]`);
                if (likeBtn) {
                    if (isLiked) likeBtn.classList.remove('liked');
                    else likeBtn.classList.add('liked');
                }
            } catch (e) {
                console.error('Ошибка лайка:', e);
                showToast('Не удалось поставить лайк', true);
            }
        }

        // Подписка на комментарии
        function subscribeComments(postId, postDiv) {
            const commentsList = postDiv.querySelector('.comments-list');
            if (!commentsList) return;

            const unsubscribe = db.collection('posts').doc(postId)
                .collection('comments')
                .orderBy('timestamp', 'asc')
                .limit(10)
                .onSnapshot((snapshot) => {
                    if (!commentsList) return;
                    commentsList.innerHTML = '';
                    
                    if (snapshot.empty) {
                        commentsList.innerHTML = '<div style="color:#8a739e; font-size:12px; padding:4px 0;">💬 Нет комментариев. Будьте первым!</div>';
                        return;
                    }

                    snapshot.forEach(doc => {
                        const comment = doc.data();
                        const commentTime = comment.timestamp?.toDate ? comment.timestamp.toDate() : new Date();
                        const commentDiv = document.createElement('div');
                        commentDiv.className = 'comment';
                        
                        // Добавляем возможность перехода в профиль по имени комментатора
                        const authorNameSpan = document.createElement('span');
                        authorNameSpan.className = 'comment-name';
                        authorNameSpan.textContent = comment.authorName || 'anon';
                        authorNameSpan.style.cursor = 'pointer';
                        authorNameSpan.onclick = () => {
                            if (comment.authorId) {
                                goToUserProfile(comment.authorId);
                            }
                        };
                        
                        const textSpan = document.createElement('span');
                        textSpan.className = 'comment-text';
                        textSpan.textContent = comment.text;
                        
                        const timeSpan = document.createElement('span');
                        timeSpan.className = 'comment-time';
                        timeSpan.textContent = formatTime(commentTime);
                        
                        commentDiv.appendChild(authorNameSpan);
                        commentDiv.appendChild(textSpan);
                        commentDiv.appendChild(timeSpan);
                        commentsList.appendChild(commentDiv);
                    });
                    
                    // Обновляем счетчик комментариев в посте
                    const commentsSpan = document.querySelector(`#post-${postId} .comments-count`);
                    if (commentsSpan) {
                        commentsSpan.textContent = snapshot.size;
                    }
                }, (error) => {
                    console.error('Ошибка загрузки комментариев:', error);
                });

            // Сохраняем отписку
            postDiv._unsubscribeComments = unsubscribe;
        }

        // Добавление комментария
        async function addComment(postId, text) {
            if (!currentUser || !userProfile) {
                showToast('Ошибка авторизации', true);
                return;
            }

            if (text.length > 300) {
                showToast('Комментарий не более 300 символов', true);
                return;
            }

            try {
                const commentData = {
                    authorId: currentUser.uid,
                    authorName: userProfile.username || currentUser.displayName || 'Пользователь',
                    text: text,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp()
                };
                
                await db.collection('posts').doc(postId).collection('comments').add(commentData);
                
                // Обновляем счетчик комментариев в посте
                const postRef = db.collection('posts').doc(postId);
                await postRef.update({
                    commentCount: firebase.firestore.FieldValue.increment(1)
                });
                
                showToast('Комментарий добавлен');
            } catch (e) {
                console.error('Ошибка добавления комментария:', e);
                showToast('Не удалось добавить комментарий', true);
            }
        }

        // Создание поста
        async function submitPost() {
            const text = postText.value.trim();
            const imageFile = postImageInput.files[0];

            if (!text && !imageFile) {
                showToast('Напишите текст или добавьте фото', true);
                return;
            }

            if (text && text.length > 1000) {
                showToast('Текст не более 1000 символов', true);
                return;
            }

            if (imageFile && imageFile.size > 5 * 1024 * 1024) {
                showToast('Изображение не более 5 МБ', true);
                return;
            }

            // Показываем лоадер на кнопке
            const submitBtn = document.querySelector('#createPostModal button:first-child');
            const originalText = submitBtn.textContent;
            submitBtn.textContent = '⏳ Публикация...';
            submitBtn.disabled = true;

            try {
                let imageUrl = null;
                if (imageFile) {
                    const formData = new FormData();
                    formData.append('image', imageFile);
                    const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                        method: 'POST',
                        body: formData
                    });
                    const data = await res.json();
                    if (data.success) {
                        imageUrl = data.data.url;
                    } else {
                        throw new Error(data.error?.message || 'Ошибка загрузки картинки');
                    }
                }

                const postData = {
                    authorId: currentUser.uid,
                    authorName: userProfile?.username || currentUser.displayName || 'Пользователь',
                    authorHandle: userProfile?.userHandle || ('$' + (userProfile?.usernameLower || (userProfile?.username || '').toLowerCase())),
                    authorAvatar: userProfile?.avatar || null,
                    text: text || '',
                    imageUrl: imageUrl,
                    timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                    likes: {},
                    views: {},
                    viewsCount: 0,
                    commentCount: 0
                };

                await db.collection('posts').add(postData);

                showToast('Пост опубликован!');
                closeCreatePostModal();
                postText.value = '';
                postImageInput.value = '';
                imagePreviewContainer.innerHTML = '';
                imagePreviewContainer.classList.add('hidden');

            } catch (e) {
                console.error('Ошибка создания поста:', e);
                showToast('Не удалось опубликовать: ' + (e.message || e), true);
            } finally {
                submitBtn.textContent = originalText;
                submitBtn.disabled = false;
            }
        }

        // Превью изображения
        postImageInput.addEventListener('change', () => {
            const file = postImageInput.files[0];
            if (!file) {
                imagePreviewContainer.innerHTML = '';
                imagePreviewContainer.classList.add('hidden');
                return;
            }
            const reader = new FileReader();
            reader.onload = (e) => {
                imagePreviewContainer.innerHTML = `<img src="${e.target.result}" class="image-preview" alt="preview">`;
                imagePreviewContainer.classList.remove('hidden');
            };
            reader.readAsDataURL(file);
        });

        function openCreatePostModal() {
            postText.value = '';
            postImageInput.value = '';
            imagePreviewContainer.innerHTML = '';
            imagePreviewContainer.classList.add('hidden');
            createPostModal.classList.remove('hidden');
        }

        function closeCreatePostModal() {
            createPostModal.classList.add('hidden');
        }

        // Глобальные функции
        window.goToChats = goToChats;
        window.goToProfile = goToProfile;
        window.goToUserProfile = goToUserProfile;
        window.openCreatePostModal = openCreatePostModal;
        window.closeCreatePostModal = closeCreatePostModal;
        window.submitPost = submitPost;

        window.onload = init;
    </script>
</body>
</html>
