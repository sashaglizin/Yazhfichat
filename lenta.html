<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>YzFi — лента</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            background: #1a0f2e;
            color: #e8d5f2;
            font-size: 15px;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container { max-width: 520px; margin: 0 auto; padding: 10px; }
        .header {
            background: linear-gradient(180deg, #4a2f7a, #2d1b4e);
            border: 2px solid #110822;
            border-radius: 0 0 8px 8px;
            padding: 12px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 { color: #f5e6ff; font-size: 1.1rem; }
        button {
            font-family: inherit;
            font-size: 13px;
            font-weight: bold;
            border: 2px solid #110822;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            background: #b47aff;
            color: #1a0f2e;
            box-shadow: 2px 2px 0 #110822;
        }
        button:active { transform: translate(1px, 1px); }
        button.secondary { background: #3d2666; color: #f5e6ff; }
        .feed { display: flex; flex-direction: column; gap: 16px; padding-bottom: 80px; }
        .post-card {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 8px;
            overflow: hidden;
        }
        .post-header {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #3d2666;
        }
        .post-avatar {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            border: 2px solid #110822;
            cursor: pointer;
        }
        .post-author { flex: 1; cursor: pointer; }
        .post-name { font-weight: bold; color: #7fdb8a; }
        .post-handle { font-size: 12px; color: #b47aff; }
        .post-time { font-size: 11px; color: #8a739e; }
        .post-image { width: 100%; max-height: 400px; object-fit: contain; background: #12081f; }
        .post-text { padding: 12px; word-break: break-word; }
        .post-actions {
            display: flex;
            gap: 20px;
            padding: 10px 12px;
            border-top: 1px solid #3d2666;
        }
        .action-btn {
            background: none;
            border: none;
            box-shadow: none;
            padding: 4px 8px;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
        }
        .action-btn.liked { color: #ff6b6b; }
        .comments-section {
            padding: 8px 12px;
            background: #12081f;
            border-top: 1px solid #3d2666;
        }
        .comment {
            display: flex;
            gap: 8px;
            margin-bottom: 8px;
            font-size: 13px;
        }
        .comment-name { color: #7fdb8a; font-weight: bold; cursor: pointer; }
        .comment-text { flex: 1; }
        .comment-time { font-size: 10px; color: #8a739e; }
        .add-comment { display: flex; gap: 8px; margin-top: 10px; }
        .add-comment input { flex: 1; padding: 8px; border: 2px solid #110822; border-radius: 4px; background: #f5e6ff; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 8px;
            padding: 20px;
            width: 100%;
            max-width: 400px;
        }
        .modal textarea { width: 100%; padding: 8px; margin-bottom: 10px; border: 2px solid #110822; border-radius: 4px; background: #f5e6ff; }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 12px;
            right: 12px;
            background: #1a5a2a;
            border: 2px solid #110822;
            color: #ccffcc;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            z-index: 1100;
        }
        .toast.error { background: #5a1a1a; color: #ffcccc; }
        .loading { text-align: center; padding: 40px; color: #b47aff; }
        .empty-feed { text-align: center; padding: 48px; color: #8a739e; }
        .premium-icon { font-size: 14px; margin-left: 4px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📸 YzFi · лента</h1>
            <div>
                <button class="secondary" onclick="goToChats()">💬 чаты</button>
                <button class="secondary" onclick="goToProfile()">👤 я</button>
                <button onclick="openCreatePostModal()">➕ создать</button>
            </div>
        </div>

        <div class="feed" id="feedContainer">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <div id="createPostModal" class="modal-overlay hidden">
        <div class="modal">
            <h3>✨ Новый пост</h3>
            <textarea id="postText" rows="3" placeholder="Что нового?" maxlength="1000"></textarea>
            <input type="file" id="postImage" accept="image/*">
            <div id="imagePreview" class="hidden" style="margin: 10px 0;"></div>
            <div style="display: flex; gap: 10px;">
                <button onclick="submitPost()">📤 Опубликовать</button>
                <button class="secondary" onclick="closeCreatePostModal()">Отмена</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const IMGBB_API_KEY = '532c1a46efe25420841b8296f7eeed3f';

        let currentUser = null;
        let myData = null;
        let unsubscribeFeed = null;
        let userCache = new Map();
        let viewedPosts = new Set();

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = isError ? '❌ ' + msg : '✅ ' + msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }

        function formatTime(date) {
            if (!date) return '';
            const diff = new Date() - date;
            if (diff < 60000) return 'только что';
            if (diff < 3600000) return Math.floor(diff / 60000) + ' мин';
            if (diff < 86400000) return Math.floor(diff / 3600000) + ' ч';
            return date.toLocaleDateString();
        }

        function formatNumber(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : n.toString(); }

        function goToChats() { window.location.href = 'chat.html'; }
        function goToProfile() { window.location.href = 'profil.html'; }
        function goToUserProfile(userId) { window.location.href = `users_profil.html?userId=${userId}`; }

        async function init() {
            auth.onAuthStateChanged(async (user) => {
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;
                const doc = await db.collection('users').doc(currentUser.uid).get();
                myData = doc.data();
                loadFeed();
            });
        }

        function loadFeed() {
            if (unsubscribeFeed) unsubscribeFeed();
            unsubscribeFeed = db.collection('posts').orderBy('timestamp', 'desc').limit(50)
                .onSnapshot(snap => {
                    const container = document.getElementById('feedContainer');
                    if (snap.empty) { container.innerHTML = '<div class="empty-feed"><strong>✨ Пока нет постов</strong><br>Нажмите «создать»!</div>'; return; }
                    container.innerHTML = '';
                    snap.forEach(doc => renderPost({ id: doc.id, ...doc.data() }));
                });
        }

        async function renderPost(post) {
            const div = document.createElement('div');
            div.className = 'post-card';
            div.dataset.postId = post.id;
            
            let authorName = post.authorName || 'Пользователь';
            let authorHandle = post.authorHandle || '';
            let authorAvatar = post.authorAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(authorName)}&background=5c3d8c&color=f5e6ff&size=88`;
            let userIcon = '';
            
            if (post.authorId) {
                if (userCache.has(post.authorId)) {
                    const cached = userCache.get(post.authorId);
                    if (cached.premium) userIcon = cached.userIcon || '';
                } else {
                    const uDoc = await db.collection('users').doc(post.authorId).get();
                    if (uDoc.exists) {
                        const data = uDoc.data();
                        userCache.set(post.authorId, data);
                        if (data.premium) userIcon = data.userIcon || '';
                    }
                }
            }
            
            const likes = post.likes || {};
            const isLiked = likes[currentUser?.uid] === true;
            const likesCount = Object.keys(likes).length;
            
            div.innerHTML = `
                <div class="post-header">
                    <img class="post-avatar" src="${escapeHtml(authorAvatar)}" alt="">
                    <div class="post-author">
                        <div class="post-name">${escapeHtml(authorName)}${userIcon ? `<span class="premium-icon">${userIcon}</span>` : ''}</div>
                        <div class="post-handle">${escapeHtml(authorHandle)}</div>
                    </div>
                    <div class="post-time">${formatTime(post.timestamp?.toDate())}</div>
                </div>
                ${post.imageUrl ? `<img class="post-image" src="${escapeHtml(post.imageUrl)}" loading="lazy">` : ''}
                ${post.text ? `<div class="post-text">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>` : ''}
                <div class="post-actions">
                    <button class="action-btn like-btn ${isLiked ? 'liked' : ''}">❤️ <span class="likes-count">${formatNumber(likesCount)}</span></button>
                    <button class="action-btn comment-toggle">💬 <span class="comments-count">${formatNumber(post.commentCount || 0)}</span></button>
                </div>
                <div class="comments-section hidden" id="comments-${post.id}">
                    <div class="comments-list"></div>
                    <div class="add-comment">
                        <input type="text" placeholder="Написать комментарий..." id="comment-input-${post.id}">
                        <button class="add-comment-btn">→</button>
                    </div>
                </div>
            `;
            
            const avatar = div.querySelector('.post-avatar');
            const authorDiv = div.querySelector('.post-author');
            avatar.onclick = () => goToUserProfile(post.authorId);
            authorDiv.onclick = () => goToUserProfile(post.authorId);
            
            const likeBtn = div.querySelector('.like-btn');
            likeBtn.onclick = async () => {
                const postRef = db.collection('posts').doc(post.id);
                if (isLiked) await postRef.update({ [`likes.${currentUser.uid}`]: firebase.firestore.FieldValue.delete() });
                else await postRef.update({ [`likes.${currentUser.uid}`]: true });
            };
            
            const commentToggle = div.querySelector('.comment-toggle');
            const commentsSec = div.querySelector(`#comments-${post.id}`);
            commentToggle.onclick = () => {
                if (commentsSec.classList.contains('hidden')) {
                    commentsSec.classList.remove('hidden');
                    loadComments(post.id);
                } else commentsSec.classList.add('hidden');
            };
            
            const addBtn = div.querySelector('.add-comment-btn');
            const input = div.querySelector(`#comment-input-${post.id}`);
            addBtn.onclick = () => { if (input.value.trim()) addComment(post.id, input.value.trim(), input); };
            input.onkeypress = (e) => { if (e.key === 'Enter' && input.value.trim()) addComment(post.id, input.value.trim(), input); };
            
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(e => { if (e.isIntersecting && post.authorId !== currentUser.uid && !viewedPosts.has(post.id)) {
                    viewedPosts.add(post.id);
                    db.collection('posts').doc(post.id).update({ viewsCount: firebase.firestore.FieldValue.increment(1) });
                    observer.disconnect();
                }});
            }, { threshold: 0.3 });
            observer.observe(div);
            
            document.getElementById('feedContainer').appendChild(div);
        }

        async function loadComments(postId) {
            const container = document.querySelector(`#comments-${postId} .comments-list`);
            if (!container) return;
            container.innerHTML = '<div class="loading" style="padding: 10px;">Загрузка...</div>';
            
            const snap = await db.collection('posts').doc(postId).collection('comments').orderBy('timestamp', 'asc').limit(20).get();
            container.innerHTML = '';
            if (snap.empty) { container.innerHTML = '<div style="color:#8a739e; padding:8px;">💬 Нет комментариев</div>'; return; }
            snap.forEach(doc => {
                const c = doc.data();
                const div = document.createElement('div');
                div.className = 'comment';
                div.innerHTML = `
                    <span class="comment-name">${escapeHtml(c.authorName)}</span>
                    <span class="comment-text">${escapeHtml(c.text)}</span>
                    <span class="comment-time">${formatTime(c.timestamp?.toDate())}</span>
                `;
                div.querySelector('.comment-name').onclick = () => goToUserProfile(c.authorId);
                container.appendChild(div);
            });
        }

        async function addComment(postId, text, input) {
            if (!text) return;
            await db.collection('posts').doc(postId).collection('comments').add({
                authorId: currentUser.uid,
                authorName: myData?.username || 'anon',
                text: text,
                timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            await db.collection('posts').doc(postId).update({ commentCount: firebase.firestore.FieldValue.increment(1) });
            input.value = '';
            loadComments(postId);
        }

        async function submitPost() {
            const text = document.getElementById('postText').value.trim();
            const file = document.getElementById('postImage').files[0];
            if (!text && !file) { showToast('Напишите текст или добавьте фото', true); return; }
            
            let imageUrl = null;
            if (file) {
                const fd = new FormData();
                fd.append('image', file);
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) imageUrl = data.data.url;
                else { showToast('Ошибка загрузки фото', true); return; }
            }
            
            await db.collection('posts').add({
                authorId: currentUser.uid,
                authorName: myData?.username,
                authorHandle: myData?.userHandle,
                authorAvatar: myData?.avatar,
                text: text || '',
                imageUrl: imageUrl,
                timestamp: firebase.firestore.FieldValue.serverTimestamp(),
                likes: {},
                viewsCount: 0,
                commentCount: 0
            });
            showToast('Пост опубликован!');
            closeCreatePostModal();
            document.getElementById('postText').value = '';
            document.getElementById('postImage').value = '';
        }

        document.getElementById('postImage').addEventListener('change', () => {
            const file = document.getElementById('postImage').files[0];
            const preview = document.getElementById('imagePreview');
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => { preview.innerHTML = `<img src="${e.target.result}" style="max-width:100%; max-height:150px;">`; preview.classList.remove('hidden'); };
                reader.readAsDataURL(file);
            } else preview.classList.add('hidden');
        });

        function openCreatePostModal() { document.getElementById('createPostModal').classList.remove('hidden'); }
        function closeCreatePostModal() { document.getElementById('createPostModal').classList.add('hidden'); }

        window.goToChats = goToChats;
        window.goToProfile = goToProfile;
        window.openCreatePostModal = openCreatePostModal;
        window.closeCreatePostModal = closeCreatePostModal;
        window.submitPost = submitPost;

        init();
    </script>
</body>
</html>
