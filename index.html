<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2d1b4e">
    <title>YzFi — вход</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            background: #1a0f2e;
            color: #e8d5f2;
            font-size: 15px;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container {
            max-width: 440px;
            margin: 0 auto;
            padding: 10px;
        }
        .header {
            background: linear-gradient(180deg, #4a2f7a, #2d1b4e);
            border: 2px solid #110822;
            border-radius: 0 0 8px 8px;
            padding: 12px;
            margin-bottom: 14px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            justify-content: space-between;
            gap: 8px;
            box-shadow: 0 4px 0 #110822;
        }
        .header h1 {
            flex: 1 1 100%;
            text-align: center;
            font-size: 1.2rem;
            color: #ffd700;
            text-shadow: 0 0 5px rgba(255,215,0,0.5);
            letter-spacing: 0.06em;
        }
        .tagline {
            text-align: center;
            font-size: 12px;
            color: #b9a0d4;
            margin-top: -5px;
            margin-bottom: 10px;
        }
        button {
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #110822;
            border-radius: 4px;
            padding: 10px 14px;
            cursor: pointer;
            background: #b47aff;
            color: #1a0f2e;
            box-shadow: 2px 2px 0 #110822;
            touch-action: manipulation;
            transition: all 0.05s ease;
        }
        button:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #110822;
        }
        button.secondary {
            background: #3d2666;
            color: #f5e6ff;
        }
        .setup-screen {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 6px;
            padding: 16px;
            box-shadow: 4px 4px 0 rgba(0,0,0,.35);
        }
        .input-group {
            margin-bottom: 14px;
        }
        .input-group h3 {
            color: #f5e6ff;
            margin-bottom: 10px;
            font-size: 1rem;
        }
        input {
            width: 100%;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid #110822;
            border-radius: 4px;
            background: #f5e6ff;
            color: #1a0f2e;
        }
        .auth-tabs {
            display: flex;
            border-bottom: 2px solid #110822;
            margin-bottom: 14px;
        }
        .auth-tab {
            flex: 1;
            padding: 10px;
            border: none;
            background: #3d2666;
            color: #e8d5f2;
            border-radius: 6px 6px 0 0;
            margin-right: 4px;
            box-shadow: none;
            cursor: pointer;
            text-align: center;
        }
        .auth-tab.active {
            background: #b47aff;
            color: #1a0f2e;
        }
        .hidden {
            display: none !important;
        }
        .dashboard-card {
            background: #12081f;
            border: 2px dashed #4a2f7a;
            padding: 14px;
            border-radius: 6px;
            margin-top: 12px;
            font-size: 14px;
            color: #b9a0d4;
            text-align: center;
        }
        .big-cta {
            width: 100%;
            padding: 14px;
            font-size: 16px;
            margin-top: 8px;
        }
        .toast {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 12px;
            right: 12px;
            background: #1a5a2a;
            border: 2px solid #110822;
            color: #ccffcc;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            z-index: 1100;
            animation: fadeInUp 0.3s ease;
        }
        .toast.error {
            background: #5a1a1a;
            color: #ffcccc;
        }
        @keyframes fadeInUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        .premium-note {
            background: rgba(255,215,0,0.1);
            border: 1px solid #ffd700;
            border-radius: 6px;
            padding: 10px;
            margin-top: 12px;
            font-size: 12px;
            text-align: center;
            color: #ffd700;
        }
        .password-input {
            position: relative;
        }
        .toggle-password {
            position: absolute;
            right: 6px;
            top: 50%;
            transform: translateY(-50%);
            background: transparent;
            border: none;
            box-shadow: none;
            font-size: 18px;
            padding: 6px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⭐ YzFi ⭐</h1>
            <div class="tagline">мини-мессенджер с привкусом имиджборды</div>
        </div>

        <div id="setupScreen" class="setup-screen">
            <div class="auth-tabs">
                <div class="auth-tab active" onclick="showLoginForm()">Вход</div>
                <div class="auth-tab" onclick="showRegisterForm()">Регистрация</div>
            </div>

            <div id="loginSection" class="input-group">
                <h3>Вход</h3>
                <input type="text" id="loginUsernameInput" placeholder="Ник" maxlength="30">
                <div class="password-input">
                    <input type="password" id="loginPasswordInput" placeholder="Пароль" maxlength="64">
                    <button type="button" class="toggle-password" onclick="toggleLoginPassword()">👁</button>
                </div>
                <button onclick="loginUser()">Войти</button>
            </div>

            <div id="registerSection" class="input-group hidden">
                <h3>Регистрация</h3>
                <input type="text" id="usernameInput" placeholder="Ник (виден в чате)" maxlength="30">
                <div class="password-input">
                    <input type="password" id="passwordInput" placeholder="Пароль (6+)" maxlength="64">
                    <button type="button" class="toggle-password" onclick="togglePassword()">👁</button>
                </div>
                <button onclick="registerUser()">Создать аккаунт</button>
                <div class="premium-note">
                    ⭐ Премиум-доступ можно получить только через администратора
                </div>
            </div>

            <div id="dashboardSection" class="hidden">
                <div class="dashboard-card">
                    <strong>✨ Добро пожаловать в YzFi!</strong><br>
                    Общайтесь в личных сообщениях и группах, делитесь фото в ленте.
                    Премиум-доступ открывает дополнительные возможности.
                </div>
                <button class="big-cta" onclick="goToChats()">📱 Открыть мессенджер</button>
                <button class="big-cta secondary" onclick="goToLenta()">📸 Лента постов</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = isError ? '❌ ' + msg : '✅ ' + msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function showLoginForm() {
            document.getElementById('loginSection').classList.remove('hidden');
            document.getElementById('registerSection').classList.add('hidden');
            document.querySelectorAll('.auth-tab')[0].classList.add('active');
            document.querySelectorAll('.auth-tab')[1].classList.remove('active');
        }

        function showRegisterForm() {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('registerSection').classList.remove('hidden');
            document.querySelectorAll('.auth-tab')[1].classList.add('active');
            document.querySelectorAll('.auth-tab')[0].classList.remove('active');
        }

        function togglePassword() {
            const el = document.getElementById('passwordInput');
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        function toggleLoginPassword() {
            const el = document.getElementById('loginPasswordInput');
            el.type = el.type === 'password' ? 'text' : 'password';
        }

        async function registerUser() {
            const username = document.getElementById('usernameInput').value.trim();
            const password = document.getElementById('passwordInput').value.trim();
            
            if (!username || !password) {
                showToast('Заполните все поля', true);
                return;
            }
            if (password.length < 6) {
                showToast('Пароль должен быть не менее 6 символов', true);
                return;
            }
            if (username.length < 2 || username.length > 30) {
                showToast('Имя должно быть от 2 до 30 символов', true);
                return;
            }
            
            const term = username.toLowerCase();
            
            try {
                const nameLock = await db.collection('usernames').doc(term).get();
                if (nameLock.exists) {
                    showToast('Это имя уже занято', true);
                    return;
                }
            } catch(e) {}
            
            try {
                const taken = await db.collection('users').where('usernameLower', '==', term).limit(1).get();
                if (!taken.empty) {
                    showToast('Это имя уже занято', true);
                    return;
                }
            } catch(e) {}
            
            try {
                const email = `${username}@yazhfi.com`;
                const cred = await auth.createUserWithEmailAndPassword(email, password);
                await cred.user.updateProfile({ displayName: username });
                
                await db.collection('users').doc(cred.user.uid).set({
                    username: username,
                    usernameLower: term,
                    userHandle: '$' + term,
                    userHandleNorm: term,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp(),
                    avatar: `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=5c3d8c&color=f5e6ff&size=128`,
                    premium: false,
                    userIcon: '',
                    online: false,
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    globalBlockedUsers: []
                });
                
                try {
                    await db.collection('usernames').doc(term).set({ uid: cred.user.uid });
                    await db.collection('handles').doc(term).set({ uid: cred.user.uid });
                } catch(e) {}
                
                showToast('Аккаунт создан!');
                setTimeout(() => {
                    window.location.href = 'chat.html';
                }, 1500);
                
            } catch(e) {
                if (e.code === 'auth/email-already-in-use') {
                    showToast('Аккаунт уже существует', true);
                } else {
                    showToast('Ошибка: ' + (e.message || e), true);
                }
            }
        }

        async function loginUser() {
            const username = document.getElementById('loginUsernameInput').value.trim();
            const password = document.getElementById('loginPasswordInput').value.trim();
            
            if (!username || !password) {
                showToast('Введите ник и пароль', true);
                return;
            }
            
            try {
                const email = `${username}@yazhfi.com`;
                await auth.signInWithEmailAndPassword(email, password);
                showToast('Добро пожаловать!');
                setTimeout(() => {
                    window.location.href = 'chat.html';
                }, 500);
            } catch(e) {
                showToast('Неверный ник или пароль', true);
            }
        }

        function goToChats() { window.location.href = 'chat.html'; }
        function goToLenta() { window.location.href = 'lenta.html'; }
        function goToProfile() { window.location.href = 'profil.html'; }

        auth.onAuthStateChanged((user) => {
            const setupScreen = document.getElementById('setupScreen');
            const dashboardSection = document.getElementById('dashboardSection');
            
            if (user) {
                setupScreen.classList.add('hidden');
                dashboardSection.classList.remove('hidden');
            } else {
                setupScreen.classList.remove('hidden');
                dashboardSection.classList.add('hidden');
                showLoginForm();
            }
        });

        window.showLoginForm = showLoginForm;
        window.showRegisterForm = showRegisterForm;
        window.togglePassword = togglePassword;
        window.toggleLoginPassword = toggleLoginPassword;
        window.registerUser = registerUser;
        window.loginUser = loginUser;
        window.goToChats = goToChats;
        window.goToLenta = goToLenta;
        window.goToProfile = goToProfile;
    </script>
</body>
</html>
