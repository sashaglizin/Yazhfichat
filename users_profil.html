<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2d1b4e">
    <title>YzFi — профиль пользователя</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            background: #1a0f2e;
            color: #e8d5f2;
            line-height: 1.45;
            font-size: 15px;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-tap-highlight-color: transparent;
        }

        .container {
            max-width: 480px;
            margin: 0 auto;
            padding: 10px;
        }

        .header {
            background: linear-gradient(180deg, #4a2f7a, #2d1b4e);
            padding: 12px;
            margin-bottom: 14px;
            border: 2px solid #110822;
            border-radius: 0 0 8px 8px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 0 #110822;
        }

        .header h1 {
            color: #f5e6ff;
            font-weight: bold;
            font-size: 1.1rem;
            flex: 1;
            text-align: center;
            text-shadow: 1px 1px 0 #000;
        }

        .header-buttons {
            display: flex;
            gap: 8px;
        }

        .profile-screen {
            background: #2d1b4e;
            border: 2px solid #110822;
            padding: 20px;
            border-radius: 6px;
            box-shadow: 4px 4px 0 rgba(0, 0, 0, 0.35);
        }

        .profile-header {
            text-align: center;
            margin-bottom: 20px;
        }

        .avatar-container {
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
        }

        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            border: 3px solid #110822;
            background: #3d2666;
        }

        .user-info {
            text-align: center;
            margin-bottom: 20px;
        }

        .user-name {
            font-size: 1.5rem;
            font-weight: bold;
            color: #7fdb8a;
            margin-bottom: 5px;
        }

        .user-handle {
            color: #b47aff;
            font-size: 0.9rem;
            font-family: monospace;
            margin-bottom: 5px;
        }

        .user-bio {
            color: #b9a0d4;
            font-size: 0.9rem;
            margin-top: 8px;
            padding: 8px;
            background: #12081f;
            border-radius: 4px;
            word-break: break-word;
        }

        .action-buttons {
            display: flex;
            gap: 12px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        button, .btn {
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #110822;
            border-radius: 4px;
            padding: 12px 20px;
            cursor: pointer;
            background: #b47aff;
            color: #1a0f2e;
            box-shadow: 2px 2px 0 #110822;
            touch-action: manipulation;
            transition: all 0.05s ease;
            flex: 1;
            min-width: 120px;
        }

        button:active, .btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 #110822;
        }

        button.primary {
            background: #5c9e6a;
            color: #102018;
        }

        button.secondary {
            background: #3d2666;
            color: #f5e6ff;
        }

        button.danger {
            background: #a33;
            color: #fff;
        }

        .stats {
            background: #12081f;
            border: 2px dashed #4a2f7a;
            border-radius: 6px;
            padding: 15px;
            margin: 20px 0;
        }

        .stat-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2a1a45;
            font-size: 14px;
        }

        .stat-item:last-child {
            border-bottom: none;
        }

        .stat-label {
            color: #b9a0d4;
        }

        .stat-value {
            color: #7fdb8a;
            font-weight: bold;
        }

        .user-posts {
            margin-top: 20px;
        }

        .user-posts h3 {
            color: #f5e6ff;
            margin-bottom: 12px;
            font-size: 1.1rem;
            border-left: 3px solid #b47aff;
            padding-left: 10px;
        }

        .posts-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-height: 500px;
            overflow-y: auto;
        }

        .post-preview {
            background: #12081f;
            border: 1px solid #3d2666;
            border-radius: 6px;
            padding: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .post-preview:hover {
            background: #1f1338;
            transform: translateX(2px);
        }

        .post-preview-text {
            font-size: 13px;
            color: #e8d5f2;
            margin-bottom: 8px;
            word-break: break-word;
            max-height: 60px;
            overflow: hidden;
        }

        .post-preview-image {
            max-width: 100%;
            max-height: 150px;
            object-fit: cover;
            border-radius: 4px;
            margin-top: 8px;
        }

        .post-preview-stats {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 12px;
            color: #8a739e;
        }

        .empty-posts {
            text-align: center;
            padding: 32px;
            color: #8a739e;
            background: #12081f;
            border-radius: 6px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #b47aff;
        }

        .hidden {
            display: none !important;
        }

        .toast {
            position: fixed;
            bottom: max(20px, env(safe-area-inset-bottom));
            left: 12px;
            right: 12px;
            background: #1a5a2a;
            border: 2px solid #110822;
            color: #ccffcc;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            z-index: 1100;
            animation: fadeInUp 0.3s ease;
        }

        .toast.error {
            background: #5a1a1a;
            color: #ffcccc;
        }

        @keyframes fadeInUp {
            from {
                transform: translateY(20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.95);
            z-index: 2000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow-y: auto;
        }

        .modal {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 8px;
            width: 100%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 20px;
            box-shadow: 6px 6px 0 #110822;
        }

        .modal img {
            max-width: 100%;
            border-radius: 4px;
            margin: 10px 0;
        }

        hr {
            border-color: #4a2f7a;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-buttons">
                <button class="secondary" onclick="goBack()">← Назад</button>
            </div>
            <h1>👤 Профиль</h1>
            <div class="header-buttons">
                <button class="secondary" onclick="goToChats()">💬 чаты</button>
            </div>
        </div>

        <div id="profileContent" class="profile-screen">
            <div class="loading">⏳ Загрузка профиля...</div>
        </div>
    </div>

    <div id="postModal" class="modal-overlay hidden" onclick="if(event.target===this) closePostModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <div id="modalPostContent"></div>
            <div class="modal-actions" style="display: flex; gap: 12px; margin-top: 16px;">
                <button class="secondary" onclick="closePostModal()">Закрыть</button>
            </div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let targetUserId = null;
        let targetUserData = null;
        let unsubscribePosts = null;

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = isError ? '❌ ' + msg : '✅ ' + msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(str) {
            if (!str) return '';
            const div = document.createElement('div');
            div.textContent = str;
            return div.innerHTML;
        }

        function formatDate(date) {
            if (!date) return 'Неизвестно';
            const d = date.toDate ? date.toDate() : new Date(date);
            return d.toLocaleDateString('ru-RU', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }

        function formatNumber(num) {
            if (num >= 1000) {
                return (num / 1000).toFixed(1) + 'k';
            }
            return num.toString();
        }

        function goBack() {
            window.history.back();
        }

        function goToChats() {
            window.location.href = 'chat.html';
        }

        function goToLenta() {
            window.location.href = 'lenta.html';
        }

        async function init() {
            auth.onAuthStateChanged(async (user) => {
                if (!user) {
                    window.location.href = 'index.html';
                    return;
                }
                currentUser = user;
                
                // Получаем userId из URL параметров
                const urlParams = new URLSearchParams(window.location.search);
                targetUserId = urlParams.get('userId');
                
                console.log('Target userId:', targetUserId);
                console.log('Current user:', currentUser.uid);
                
                if (!targetUserId) {
                    showToast('Пользователь не указан', true);
                    document.getElementById('profileContent').innerHTML = `
                        <div class="loading">❌ Ошибка: пользователь не найден</div>
                        <button onclick="goBack()" style="margin-top: 20px;">← Вернуться</button>
                    `;
                    return;
                }
                
                // Проверяем, не пытаемся ли мы открыть свой профиль
                if (targetUserId === currentUser.uid) {
                    window.location.href = 'profil.html';
                    return;
                }
                
                await loadUserProfile();
                loadUserPosts();
            });
        }

        async function loadUserProfile() {
            const profileContent = document.getElementById('profileContent');
            profileContent.innerHTML = '<div class="loading">⏳ Загрузка профиля...</div>';
            
            try {
                console.log('Загружаем профиль пользователя:', targetUserId);
                const userDoc = await db.collection('users').doc(targetUserId).get();
                
                console.log('Документ существует:', userDoc.exists);
                
                if (!userDoc.exists) {
                    profileContent.innerHTML = `
                        <div class="loading">❌ Пользователь не найден</div>
                        <button onclick="goBack()" style="margin-top: 20px;">← Вернуться</button>
                    `;
                    return;
                }
                
                targetUserData = userDoc.data();
                console.log('Данные пользователя:', targetUserData);
                
                // Подсчет статистики
                const postsSnap = await db.collection('posts').where('authorId', '==', targetUserId).get();
                const postsCount = postsSnap.size;
                
                // Проверяем подписку (если есть коллекция followers)
                let isFollowing = false;
                try {
                    const followDoc = await db.collection('followers').doc(targetUserId)
                        .collection('followers').doc(currentUser.uid).get();
                    isFollowing = followDoc.exists;
                } catch(e) {
                    console.warn('Followers collection not exists:', e);
                }
                
                renderProfile(targetUserData, postsCount, isFollowing);
                
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
                profileContent.innerHTML = `
                    <div class="loading">❌ Ошибка загрузки профиля: ${error.message}</div>
                    <button onclick="goBack()" style="margin-top: 20px;">← Вернуться</button>
                `;
                showToast('Не удалось загрузить профиль', true);
            }
        }
        
        function renderProfile(userData, postsCount, isFollowing) {
            const username = userData.username || 'Пользователь';
            const avatarUrl = userData.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(username)}&background=5c3d8c&color=f5e6ff&size=150&bold=true`;
            const userHandle = userData.userHandle || ('$' + (userData.usernameLower || username.toLowerCase()));
            const bio = userData.bio || '✨ Пользователь YzFi';
            const joinDate = userData.createdAt ? formatDate(userData.createdAt) : 'Недавно';
            
            const profileHTML = `
                <div class="profile-header">
                    <div class="avatar-container">
                        <img class="avatar-image" src="${escapeHtml(avatarUrl)}" alt="Аватар">
                    </div>
                    <div class="user-info">
                        <div class="user-name">${escapeHtml(username)}</div>
                        <div class="user-handle">${escapeHtml(userHandle)}</div>
                        <div class="user-bio">${escapeHtml(bio)}</div>
                    </div>
                </div>
                
                <div class="action-buttons">
                    <button class="primary" onclick="startChat()">💬 Написать</button>
                    <button class="${isFollowing ? 'secondary' : 'primary'}" id="followBtn" onclick="toggleFollow()">
                        ${isFollowing ? '✓ Подписан' : '+ Подписаться'}
                    </button>
                </div>
                
                <div class="stats">
                    <div class="stat-item">
                        <span class="stat-label">📝 Постов:</span>
                        <span class="stat-value">${postsCount}</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-label">📅 В YzFi с:</span>
                        <span class="stat-value">${joinDate}</span>
                    </div>
                </div>
                
                <div class="user-posts">
                    <h3>📸 Последние посты</h3>
                    <div id="postsContainer" class="posts-grid">
                        <div class="loading">Загрузка постов...</div>
                    </div>
                </div>
            `;
            
            document.getElementById('profileContent').innerHTML = profileHTML;
        }
        
        function loadUserPosts() {
            if (unsubscribePosts) unsubscribePosts();
            
            const postsContainer = document.getElementById('postsContainer');
            if (!postsContainer) return;
            
            console.log('Загружаем посты пользователя:', targetUserId);
            
            unsubscribePosts = db.collection('posts')
                .where('authorId', '==', targetUserId)
                .orderBy('timestamp', 'desc')
                .limit(20)
                .onSnapshot((snapshot) => {
                    if (!postsContainer) return;
                    
                    console.log('Постов найдено:', snapshot.size);
                    
                    if (snapshot.empty) {
                        postsContainer.innerHTML = '<div class="empty-posts">📭 Пользователь ещё не создал ни одного поста</div>';
                        return;
                    }
                    
                    postsContainer.innerHTML = '';
                    snapshot.forEach(doc => {
                        const post = { id: doc.id, ...doc.data() };
                        renderPostPreview(post, postsContainer);
                    });
                }, (error) => {
                    console.error('Ошибка загрузки постов:', error);
                    if (postsContainer) {
                        postsContainer.innerHTML = '<div class="empty-posts">⚠️ Не удалось загрузить посты</div>';
                    }
                });
        }
        
        function renderPostPreview(post, container) {
            const postDiv = document.createElement('div');
            postDiv.className = 'post-preview';
            
            const timestamp = post.timestamp?.toDate ? post.timestamp.toDate() : new Date();
            const timeStr = formatDate(timestamp);
            
            const likesCount = post.likes ? Object.keys(post.likes).length : 0;
            const viewsCount = post.viewsCount || 0;
            
            let content = '';
            if (post.text) {
                const previewText = post.text.length > 100 ? post.text.substring(0, 100) + '...' : post.text;
                content += `<div class="post-preview-text">${escapeHtml(previewText)}</div>`;
            }
            
            if (post.imageUrl) {
                content += `<img class="post-preview-image" src="${escapeHtml(post.imageUrl)}" alt="пост" loading="lazy">`;
            }
            
            content += `
                <div class="post-preview-stats">
                    <span>❤️ ${formatNumber(likesCount)}</span>
                    <span>💬 ${post.commentCount || 0}</span>
                    <span>👁️ ${formatNumber(viewsCount)}</span>
                    <span>📅 ${timeStr}</span>
                </div>
            `;
            
            postDiv.innerHTML = content;
            postDiv.onclick = () => showFullPost(post);
            container.appendChild(postDiv);
        }
        
        function showFullPost(post) {
            const modal = document.getElementById('postModal');
            const modalContent = document.getElementById('modalPostContent');
            
            const timestamp = post.timestamp?.toDate ? post.timestamp.toDate() : new Date();
            const timeStr = formatDate(timestamp);
            const likesCount = post.likes ? Object.keys(post.likes).length : 0;
            const viewsCount = post.viewsCount || 0;
            
            let content = `
                <div style="margin-bottom: 16px;">
                    <div style="color: #7fdb8a; font-weight: bold; margin-bottom: 8px;">${escapeHtml(targetUserData?.username || 'Пользователь')}</div>
                    <div style="color: #8a739e; font-size: 12px; margin-bottom: 12px;">${timeStr}</div>
            `;
            
            if (post.text) {
                content += `<div style="margin-bottom: 12px; line-height: 1.5;">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>`;
            }
            
            if (post.imageUrl) {
                content += `<img src="${escapeHtml(post.imageUrl)}" alt="пост" style="max-width: 100%; border-radius: 4px; margin-bottom: 12px;">`;
            }
            
            content += `
                    <div style="display: flex; gap: 20px; padding-top: 12px; border-top: 1px solid #3d2666;">
                        <span>❤️ ${formatNumber(likesCount)}</span>
                        <span>💬 ${post.commentCount || 0}</span>
                        <span>👁️ ${formatNumber(viewsCount)}</span>
                    </div>
                </div>
            `;
            
            modalContent.innerHTML = content;
            modal.classList.remove('hidden');
        }
        
        function closePostModal() {
            document.getElementById('postModal').classList.add('hidden');
        }
        
        async function toggleFollow() {
            showToast('Функция подписок в разработке');
        }
        
        async function startChat() {
            if (!currentUser || !targetUserId || !targetUserData) return;
            
            showToast('Создание чата...');
            
            try {
                // Получаем данные текущего пользователя
                const myUserDoc = await db.collection('users').doc(currentUser.uid).get();
                const myData = myUserDoc.data();
                
                const myAvatar = myData?.avatar || '';
                const myUsername = myData?.username || currentUser.displayName || 'Пользователь';
                const myHandle = myData?.userHandle || ('$' + (myData?.usernameLower || myUsername.toLowerCase()));
                
                const ts = firebase.firestore.FieldValue.serverTimestamp();
                
                // Создаем чат для текущего пользователя
                const myChatData = {
                    type: 'dm',
                    userId: targetUserId,
                    username: targetUserData.username || 'Пользователь',
                    peerAvatar: targetUserData.avatar || '',
                    userHandle: targetUserData.userHandle || ('$' + (targetUserData.usernameLower || '')),
                    lastMessage: '',
                    lastMessageTime: ts,
                    unreadCount: 0,
                    createdAt: ts,
                    updatedAt: ts
                };
                
                // Создаем чат для целевого пользователя
                const peerChatData = {
                    type: 'dm',
                    userId: currentUser.uid,
                    username: myUsername,
                    peerAvatar: myAvatar,
                    userHandle: myHandle,
                    lastMessage: '',
                    lastMessageTime: ts,
                    unreadCount: 0,
                    createdAt: ts,
                    updatedAt: ts
                };
                
                await db.collection('users').doc(currentUser.uid).collection('chats').doc(targetUserId).set(myChatData);
                await db.collection('users').doc(targetUserId).collection('chats').doc(currentUser.uid).set(peerChatData);
                
                showToast('Чат создан! Переход...');
                setTimeout(() => {
                    window.location.href = 'chat.html';
                }, 1000);
                
            } catch (error) {
                console.error('Ошибка создания чата:', error);
                showToast('Не удалось создать чат: ' + error.message, true);
            }
        }
        
        window.goBack = goBack;
        window.goToChats = goToChats;
        window.goToLenta = goToLenta;
        window.startChat = startChat;
        window.toggleFollow = toggleFollow;
        window.closePostModal = closePostModal;
        
        window.onload = init;
    </script>
</body>
</html>
