<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>YzFi — профиль пользователя</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            background: #1a0f2e;
            color: #e8d5f2;
            font-size: 15px;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container { max-width: 480px; margin: 0 auto; padding: 10px; }
        .header {
            background: linear-gradient(180deg, #4a2f7a, #2d1b4e);
            border: 2px solid #110822;
            border-radius: 0 0 8px 8px;
            padding: 12px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button {
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #110822;
            border-radius: 4px;
            padding: 10px 14px;
            cursor: pointer;
            background: #b47aff;
            color: #1a0f2e;
            box-shadow: 2px 2px 0 #110822;
        }
        button:active { transform: translate(1px, 1px); }
        button.secondary { background: #3d2666; color: #f5e6ff; }
        button.primary { background: #7fdb8a; color: #1a0f2e; }
        .profile-card {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 8px;
            padding: 20px;
            text-align: center;
        }
        .avatar {
            width: 120px;
            height: 120px;
            border-radius: 8px;
            object-fit: cover;
            border: 3px solid #110822;
            margin-bottom: 15px;
        }
        .user-name { font-size: 1.4rem; font-weight: bold; color: #7fdb8a; }
        .user-handle { color: #b47aff; margin-bottom: 10px; }
        .stats {
            background: #12081f;
            border-radius: 6px;
            padding: 12px;
            margin: 15px 0;
            text-align: left;
        }
        .stat-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #2a1a45; }
        .stat-item:last-child { border-bottom: none; }
        .action-buttons { display: flex; gap: 10px; margin-top: 15px; }
        .posts-section { margin-top: 20px; }
        .posts-section h3 { color: #f5e6ff; margin-bottom: 10px; }
        .post-preview {
            background: #12081f;
            border: 1px solid #3d2666;
            border-radius: 6px;
            padding: 10px;
            margin-bottom: 10px;
            cursor: pointer;
        }
        .post-preview:hover { background: #1f1338; }
        .post-preview-text { font-size: 13px; color: #e8d5f2; max-height: 60px; overflow: hidden; }
        .post-preview-image { max-width: 100%; max-height: 100px; object-fit: cover; border-radius: 4px; margin-top: 8px; }
        .post-preview-stats { display: flex; gap: 12px; font-size: 12px; color: #8a739e; margin-top: 8px; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 8px;
            padding: 20px;
            max-width: 500px;
            width: 90%;
            max-height: 80vh;
            overflow-y: auto;
        }
        .modal img { max-width: 100%; border-radius: 4px; margin: 10px 0; }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 12px;
            right: 12px;
            background: #1a5a2a;
            border: 2px solid #110822;
            color: #ccffcc;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            z-index: 1100;
        }
        .toast.error { background: #5a1a1a; color: #ffcccc; }
        .loading { text-align: center; padding: 40px; color: #b47aff; }
        .premium-icon { font-size: 18px; margin-left: 6px; }
        .premium-badge {
            display: inline-block;
            background: #ffd700;
            color: #1a0f2e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <button class="secondary" onclick="goBack()">← Назад</button>
            <h1>👤 Профиль</h1>
            <button class="secondary" onclick="goToChats()">💬 чаты</button>
        </div>

        <div id="profileContent">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <div id="postModal" class="modal-overlay hidden">
        <div class="modal">
            <div id="modalPostContent"></div>
            <button class="secondary" onclick="closePostModal()" style="margin-top: 12px;">Закрыть</button>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        let currentUser = null;
        let targetUserId = null;
        let targetUserData = null;
        let unsubscribePosts = null;

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = isError ? '❌ ' + msg : '✅ ' + msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }

        function formatNumber(n) { return n >= 1000 ? (n/1000).toFixed(1)+'k' : n.toString(); }
        function formatDate(date) { return date?.toDate ? date.toDate().toLocaleDateString() : 'неизвестно'; }

        function goBack() { window.history.back(); }
        function goToChats() { window.location.href = 'chat.html'; }

        async function init() {
            auth.onAuthStateChanged(async (user) => {
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;
                const urlParams = new URLSearchParams(window.location.search);
                targetUserId = urlParams.get('userId');
                if (!targetUserId || targetUserId === currentUser.uid) { window.location.href = 'profil.html'; return; }
                await loadUserProfile();
                loadUserPosts();
            });
        }

        async function loadUserProfile() {
            const container = document.getElementById('profileContent');
            container.innerHTML = '<div class="loading">⏳ Загрузка...</div>';
            
            const doc = await db.collection('users').doc(targetUserId).get();
            if (!doc.exists) { container.innerHTML = '<div class="loading">❌ Пользователь не найден</div>'; return; }
            targetUserData = doc.data();
            
            const postsCount = (await db.collection('posts').where('authorId', '==', targetUserId).get()).size;
            const isPremium = targetUserData.premium === true;
            const avatarUrl = targetUserData.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(targetUserData.username)}&background=5c3d8c&color=f5e6ff&size=150`;
            
            container.innerHTML = `
                <div class="profile-card">
                    <img class="avatar" src="${escapeHtml(avatarUrl)}" alt="аватар">
                    <div class="user-name">
                        ${escapeHtml(targetUserData.username)}
                        ${isPremium ? '<span class="premium-badge">⭐ PREMIUM</span>' : ''}
                        <span class="premium-icon">${targetUserData.userIcon || ''}</span>
                    </div>
                    <div class="user-handle">${escapeHtml(targetUserData.userHandle || ('$' + targetUserData.usernameLower))}</div>
                    
                    <div class="stats">
                        <div class="stat-item"><span>📝 Постов:</span><span>${postsCount}</span></div>
                        <div class="stat-item"><span>📅 В YzFi с:</span><span>${formatDate(targetUserData.createdAt)}</span></div>
                        ${isPremium ? '<div class="stat-item"><span>⭐ Премиум</span><span>🌟</span></div>' : ''}
                    </div>
                    
                    <div class="action-buttons">
                        <button class="primary" onclick="startChat()">💬 Написать</button>
                    </div>
                </div>
                <div class="posts-section">
                    <h3>📸 Последние посты</h3>
                    <div id="postsContainer" class="loading">Загрузка постов...</div>
                </div>
            `;
        }

        function loadUserPosts() {
            if (unsubscribePosts) unsubscribePosts();
            unsubscribePosts = db.collection('posts').where('authorId', '==', targetUserId).orderBy('timestamp', 'desc').limit(10)
                .onSnapshot(snap => {
                    const container = document.getElementById('postsContainer');
                    if (snap.empty) { container.innerHTML = '<div style="text-align:center; color:#8a739e;">📭 Нет постов</div>'; return; }
                    container.innerHTML = '';
                    snap.forEach(doc => renderPostPreview({ id: doc.id, ...doc.data() }, container));
                });
        }

        function renderPostPreview(post, container) {
            const div = document.createElement('div');
            div.className = 'post-preview';
            div.innerHTML = `
                ${post.text ? `<div class="post-preview-text">${escapeHtml(post.text.substring(0, 100))}${post.text.length > 100 ? '...' : ''}</div>` : ''}
                ${post.imageUrl ? `<img class="post-preview-image" src="${escapeHtml(post.imageUrl)}" loading="lazy">` : ''}
                <div class="post-preview-stats">
                    <span>❤️ ${formatNumber(Object.keys(post.likes || {}).length)}</span>
                    <span>💬 ${formatNumber(post.commentCount || 0)}</span>
                    <span>👁️ ${formatNumber(post.viewsCount || 0)}</span>
                </div>
            `;
            div.onclick = () => showFullPost(post);
            container.appendChild(div);
        }

        function showFullPost(post) {
            const modal = document.getElementById('postModal');
            const content = document.getElementById('modalPostContent');
            content.innerHTML = `
                <div style="margin-bottom: 12px;">
                    <strong style="color: #7fdb8a;">${escapeHtml(targetUserData.username)}</strong>
                    <span class="premium-icon">${targetUserData.userIcon || ''}</span>
                </div>
                ${post.text ? `<div style="margin-bottom: 12px;">${escapeHtml(post.text).replace(/\n/g, '<br>')}</div>` : ''}
                ${post.imageUrl ? `<img src="${escapeHtml(post.imageUrl)}" alt="пост">` : ''}
                <div style="display: flex; gap: 16px; margin-top: 12px; color: #8a739e;">
                    <span>❤️ ${formatNumber(Object.keys(post.likes || {}).length)}</span>
                    <span>💬 ${formatNumber(post.commentCount || 0)}</span>
                    <span>👁️ ${formatNumber(post.viewsCount || 0)}</span>
                </div>
            `;
            modal.classList.remove('hidden');
        }

        function closePostModal() { document.getElementById('postModal').classList.add('hidden'); }

        async function startChat() {
            const myDoc = await db.collection('users').doc(currentUser.uid).get();
            const myData = myDoc.data();
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(targetUserId).set({
                type: 'dm', userId: targetUserId, username: targetUserData.username,
                peerAvatar: targetUserData.avatar, userHandle: targetUserData.userHandle,
                lastMessage: '', lastMessageTime: ts, unreadCount: 0
            });
            await db.collection('users').doc(targetUserId).collection('chats').doc(currentUser.uid).set({
                type: 'dm', userId: currentUser.uid, username: myData?.username,
                peerAvatar: myData?.avatar, userHandle: myData?.userHandle,
                lastMessage: '', lastMessageTime: ts, unreadCount: 0
            });
            showToast('Чат создан!');
            setTimeout(() => window.location.href = 'chat.html', 1000);
        }

        window.goBack = goBack;
        window.goToChats = goToChats;
        window.startChat = startChat;
        window.closePostModal = closePostModal;

        init();
    </script>
</body>
</html>
