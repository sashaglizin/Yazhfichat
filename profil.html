<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2d1b4e">
    <title>YzFi — профиль</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            background: #1a0f2e;
            color: #e8d5f2;
            line-height: 1.45;
            font-size: 15px;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 10px; }
        .header {
            background: linear-gradient(180deg, #4a2f7a, #2d1b4e);
            padding: 12px;
            margin-bottom: 14px;
            border: 2px solid #110822;
            border-radius: 0 0 8px 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 0 #110822;
        }
        .header h1 {
            color: #f5e6ff;
            font-weight: bold;
            font-size: 1.1rem;
            flex: 1 1 100%;
            text-align: center;
            text-shadow: 1px 1px 0 #000;
        }
        .header-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .profile-screen {
            background: #2d1b4e;
            border: 2px solid #110822;
            padding: 20px;
            margin-bottom: 14px;
            border-radius: 6px;
            box-shadow: 4px 4px 0 rgba(0,0,0,.35);
        }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            cursor: pointer;
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            border: 3px solid #110822;
            background: #3d2666;
        }
        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            color: white;
            font-size: 13px;
            text-align: center;
            padding: 6px;
            font-weight: bold;
        }
        .avatar-container:hover .avatar-overlay, 
        .avatar-container:active .avatar-overlay { 
            opacity: 1; 
        }
        .user-info { text-align: center; margin-bottom: 20px; }
        .user-name { font-size: 1.35rem; font-weight: bold; color: #7fdb8a; margin-bottom: 5px; }
        .user-handle { color: #b47aff; font-size: 0.85rem; font-family: monospace; margin-bottom: 5px; }
        .user-email { color: #b9a0d4; font-size: 0.9rem; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: bold; color: #f5e6ff; }
        input[type="text"], input[type="password"], input[type="email"] {
            background: #f5e6ff;
            border: 2px solid #110822;
            padding: 12px 14px;
            width: 100%;
            font-size: 16px;
            border-radius: 4px;
            margin-bottom: 10px;
            color: #1a0f2e;
        }
        input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .password-input { position: relative; }
        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            width: auto;
            margin: 0;
            box-shadow: none;
        }
        .toggle-password:active {
            transform: translateY(-50%);
        }
        button {
            font-family: inherit;
            background: #b47aff;
            border: 2px solid #110822;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            color: #1a0f2e;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 10px;
            box-shadow: 2px 2px 0 #110822;
            touch-action: manipulation;
            transition: all 0.05s ease;
        }
        button:active { 
            transform: translate(1px, 1px); 
            box-shadow: 1px 1px 0 #110822; 
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary { background: #5c9e6a; color: #102018; }
        .btn-secondary { background: #4a3d7a; color: #f5e6ff; }
        .btn-danger { background: #a33; color: #fff; }
        .hidden { display: none !important; }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #9a84b8;
            font-size: 16px;
        }
        .error { 
            background: #3a1525; 
            color: #ffb3c0; 
            padding: 12px; 
            border-radius: 6px; 
            margin: 10px 0; 
            border: 2px solid #110822;
            animation: slideIn 0.3s ease;
        }
        .success { 
            background: #153a28; 
            color: #b5ffcc; 
            padding: 12px; 
            border-radius: 6px; 
            margin: 10px 0; 
            border: 2px solid #110822;
            animation: slideIn 0.3s ease;
        }
        .file-input { display: none; }
        .stats {
            background: #12081f;
            border: 2px dashed #4a2f7a;
            border-radius: 6px;
            padding: 15px;
            margin: 20px 0;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2a1a45;
            font-size: 14px;
        }
        .stat-item:last-child { border-bottom: none; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @media (max-width: 480px) {
            .avatar-container { width: 120px; height: 120px; }
            input[type="text"], input[type="password"], input[type="email"], button { padding: 14px; }
        }
        .button-with-spinner {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        hr {
            border-color: #4a2f7a;
            margin: 15px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🎯 YzFi · профиль</h1>
            <div class="header-buttons">
                <button type="button" onclick="goToChat()" class="btn-secondary">💬 чаты</button>
            </div>
        </div>

        <div id="profileScreen" class="profile-screen">
            <div class="profile-header">
                <div class="avatar-container" onclick="document.getElementById('avatarInput').click()">
                    <img id="avatarImage" class="avatar-image" src="" alt="Аватар">
                    <div class="avatar-overlay">
                        📷 Нажмите<br>для смены
                    </div>
                </div>
                <input type="file" id="avatarInput" class="file-input" accept="image/*">
                
                <div class="user-info">
                    <div id="userName" class="user-name"></div>
                    <div id="userHandle" class="user-handle"></div>
                    <div id="userEmail" class="user-email"></div>
                </div>
            </div>

            <div id="errorMessage" class="error hidden"></div>
            <div id="successMessage" class="success hidden"></div>

            <div class="stats">
                <div class="stat-item">
                    <span>📅 Дата регистрации:</span>
                    <span id="joinDate"></span>
                </div>
                <div class="stat-item">
                    <span>🆔 ID пользователя:</span>
                    <span id="userId"></span>
                </div>
            </div>

            <div class="input-group">
                <label for="usernameInput">✏️ Имя пользователя:</label>
                <input type="text" id="usernameInput" placeholder="Введите новое имя" maxlength="30">
                <button onclick="updateUsername()" class="btn-primary" id="updateNameBtn">🔄 Изменить имя</button>
            </div>

            <div class="input-group">
                <label for="handleInput">🏷️ Юз (хэндл):</label>
                <input type="text" id="handleInput" placeholder="Например, $yzfi99" maxlength="22">
                <small style="color: #9a84b8;display:block;margin-top:-4px;margin-bottom:10px;">
                    💡 Формат: <span style="font-family: monospace;">$юз</span> (латиница/цифры/_). Должен быть уникальным.
                </small>
                <button onclick="updateHandle()" class="btn-primary" id="updateHandleBtn">🏷️ Изменить юз</button>
            </div>

            <hr>

            <div class="input-group">
                <label for="currentPassword">🔐 Текущий пароль:</label>
                <div class="password-input">
                    <input type="password" id="currentPassword" placeholder="Введите текущий пароль">
                    <button class="toggle-password" onclick="togglePassword('currentPassword')">👁️</button>
                </div>
                
                <label for="newPassword">🆕 Новый пароль:</label>
                <div class="password-input">
                    <input type="password" id="newPassword" placeholder="Введите новый пароль (мин. 6 символов)" maxlength="30">
                    <button class="toggle-password" onclick="togglePassword('newPassword')">👁️</button>
                </div>
                
                <label for="confirmPassword">✅ Подтвердите пароль:</label>
                <div class="password-input">
                    <input type="password" id="confirmPassword" placeholder="Подтвердите новый пароль" maxlength="30">
                    <button class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</button>
                </div>
                
                <button onclick="updatePassword()" class="btn-primary" id="updatePassBtn">🔒 Изменить пароль</button>
            </div>

            <hr>

            <div class="input-group">
                <button onclick="logout()" class="btn-danger" id="logoutBtn">🚪 Выйти из аккаунта</button>
            </div>
        </div>

        <div id="loadingScreen" class="loading">
            <div class="spinner"></div> Загрузка профиля...
        </div>
    </div>

    <script>
        // Firebase конфигурация
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431",
            measurementId: "G-T5N77WGWYP"
        };

        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        // Ключ API для imgBB
        const IMGBB_API_KEY = '532c1a46efe25420841b8296f7eeed3f';

        // DOM элементы
        const profileScreen = document.getElementById('profileScreen');
        const loadingScreen = document.getElementById('loadingScreen');
        const avatarImage = document.getElementById('avatarImage');
        const userName = document.getElementById('userName');
        const userHandle = document.getElementById('userHandle');
        const userEmail = document.getElementById('userEmail');
        const usernameInput = document.getElementById('usernameInput');
        const handleInput = document.getElementById('handleInput');
        const joinDate = document.getElementById('joinDate');
        const userId = document.getElementById('userId');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        // Текущий пользователь
        let currentUser = null;
        let userProfile = null;

        // Функции для блокировки кнопок
        function setButtonLoading(buttonId, isLoading, originalText) {
            const btn = document.getElementById(buttonId);
            if (!btn) return;
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> ' + originalText;
            } else {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.remove('hidden');
            successMessage.classList.add('hidden');
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = '✅ ' + message;
            successMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            setTimeout(() => {
                successMessage.classList.add('hidden');
            }, 4000);
        }

        // Инициализация
        function init() {
            checkAuthState();
        }

        // Проверка состояния аутентификации
        function checkAuthState() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    loadUserProfile(user.uid);
                } else {
                    window.location.href = 'index.html';
                }
            });
        }

        // Загрузка профиля пользователя
        async function loadUserProfile(uid) {
            try {
                const userDoc = await db.collection('users').doc(uid).get();
                
                if (userDoc.exists) {
                    userProfile = userDoc.data();
                    
                    // Миграция данных
                    const updates = {};
                    if (userProfile.username && !userProfile.usernameLower) {
                        updates.usernameLower = userProfile.username.toLowerCase();
                    }
                    if (userProfile.username && !userProfile.userHandle) {
                        const norm = userProfile.username.toLowerCase();
                        updates.userHandle = '$' + norm;
                        updates.userHandleNorm = norm;
                        // Создаем запись в handles
                        await db.collection('handles').doc(norm).set({ uid: currentUser.uid }, { merge: true });
                    }
                    if (Object.keys(updates).length > 0) {
                        await db.collection('users').doc(uid).update(updates);
                        Object.assign(userProfile, updates);
                    }
                    
                    displayProfile(userProfile);
                } else {
                    showError('Профиль не найден');
                }
                
                loadingScreen.classList.add('hidden');
                profileScreen.classList.remove('hidden');
                
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
                showError('Ошибка загрузки профиля: ' + error.message);
                loadingScreen.classList.add('hidden');
            }
        }

        // Отображение профиля
        function displayProfile(profile) {
            // Аватар
            const avatarUrl = profile.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.username)}&background=5c3d8c&color=f5e6ff&size=150&bold=true`;
            avatarImage.src = avatarUrl;
            
            // Имя и handle
            userName.textContent = profile.username || 'Пользователь';
            const handleText = profile.userHandle || ('$' + (profile.usernameLower || profile.username?.toLowerCase() || 'user'));
            userHandle.textContent = handleText;
            userEmail.textContent = currentUser.email || 'email@example.com';
            
            // Поля формы
            usernameInput.value = profile.username || '';
            handleInput.value = profile.userHandle || ('$' + (profile.usernameLower || ''));
            
            // Статистика
            if (profile.createdAt) {
                const date = profile.createdAt.toDate ? profile.createdAt.toDate() : new Date(profile.createdAt);
                joinDate.textContent = date.toLocaleDateString('ru-RU', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            } else {
                joinDate.textContent = 'Неизвестно';
            }
            
            userId.textContent = currentUser.uid.substring(0, 8) + '...' + currentUser.uid.substring(currentUser.uid.length - 4);
        }

        // Загрузка аватара
        async function uploadAvatar() {
            const fileInput = document.getElementById('avatarInput');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            // Проверка размера файла
            if (file.size > 5 * 1024 * 1024) {
                showError('Размер изображения не должен превышать 5MB');
                fileInput.value = '';
                return;
            }
            
            // Проверка типа файла
            if (!file.type.startsWith('image/')) {
                showError('Пожалуйста, выберите изображение');
                fileInput.value = '';
                return;
            }
            
            showSuccess('⏳ Загрузка аватара...');
            
            try {
                const formData = new FormData();
                formData.append('image', file);
                
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    // Сохраняем URL аватара в профиль
                    await db.collection('users').doc(currentUser.uid).update({
                        avatar: data.data.url,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    // Обновляем аватар на странице
                    avatarImage.src = data.data.url;
                    
                    // Обновляем локальный профиль
                    userProfile.avatar = data.data.url;
                    
                    showSuccess('Аватар успешно обновлен! 🎉');
                } else {
                    showError('Ошибка загрузки: ' + (data.error?.message || 'неизвестная ошибка'));
                }
                
            } catch (error) {
                console.error('Ошибка загрузки аватара:', error);
                showError('Ошибка загрузки аватара: ' + error.message);
            } finally {
                fileInput.value = '';
            }
        }

        // Обновление имени пользователя
        async function updateUsername() {
            const newUsername = usernameInput.value.trim();
            
            if (!newUsername) {
                showError('Введите новое имя пользователя');
                return;
            }
            
            if (newUsername === userProfile.username) {
                showError('Это ваше текущее имя');
                return;
            }
            
            if (newUsername.length < 2 || newUsername.length > 30) {
                showError('Имя должно быть от 2 до 30 символов');
                return;
            }
            
            setButtonLoading('updateNameBtn', true, '🔄 Изменить имя');
            
            try {
                const newLower = newUsername.toLowerCase();
                
                // Проверка уникальности имени
                const existingUser = await db.collection('users')
                    .where('usernameLower', '==', newLower)
                    .limit(1)
                    .get();
                
                if (!existingUser.empty && existingUser.docs[0].id !== currentUser.uid) {
                    showError('Это имя пользователя уже занято');
                    return;
                }
                
                const userRef = db.collection('users').doc(currentUser.uid);
                
                // Обновляем имя
                await userRef.update({
                    username: newUsername,
                    usernameLower: newLower,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Обновляем usernames коллекцию
                const oldLower = (userProfile.username || '').toLowerCase();
                if (oldLower && oldLower !== newLower) {
                    const oldRef = db.collection('usernames').doc(oldLower);
                    const oldDoc = await oldRef.get();
                    if (oldDoc.exists && oldDoc.data().uid === currentUser.uid) {
                        await oldRef.delete();
                    }
                }
                await db.collection('usernames').doc(newLower).set({ uid: currentUser.uid });
                
                // Обновляем displayName в Auth
                await currentUser.updateProfile({ displayName: newUsername });
                
                // Обновляем локальные данные
                userProfile.username = newUsername;
                userProfile.usernameLower = newLower;
                userName.textContent = newUsername;
                
                showSuccess('Имя успешно обновлено! ✨');
                
            } catch (error) {
                console.error('Ошибка обновления имени:', error);
                showError('Ошибка обновления имени: ' + error.message);
            } finally {
                setButtonLoading('updateNameBtn', false, '🔄 Изменить имя');
            }
        }

        // Обновление публичного юза ($юз)
        async function updateHandle() {
            const raw = (handleInput.value || '').trim();

            if (!raw) {
                showError('Введите юз');
                return;
            }
            if (!/^\$[A-Za-z0-9_]{2,20}$/.test(raw)) {
                showError('Юз должен быть в формате $юз (латиница, цифры, _, 2-20 символов после $)');
                return;
            }

            const norm = raw.slice(1).toLowerCase();
            const oldRaw = (userProfile && userProfile.userHandle) ? String(userProfile.userHandle) : '';
            const oldNorm = oldRaw.startsWith('$') ? oldRaw.slice(1).toLowerCase() : '';

            if (oldNorm === norm) {
                showError('Это ваш текущий юз');
                return;
            }

            setButtonLoading('updateHandleBtn', true, '🏷️ Изменить юз');

            try {
                // Проверяем уникальность юза
                const newHandleDoc = await db.collection('handles').doc(norm).get();
                if (newHandleDoc.exists && newHandleDoc.data().uid !== currentUser.uid) {
                    showError('Этот юз уже занят');
                    return;
                }

                const userRef = db.collection('users').doc(currentUser.uid);
                
                // Обновляем профиль
                await userRef.update({
                    userHandle: raw,
                    userHandleNorm: norm,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                // Удаляем старую запись
                if (oldNorm && oldNorm !== norm) {
                    const oldHandleDoc = await db.collection('handles').doc(oldNorm).get();
                    if (oldHandleDoc.exists && oldHandleDoc.data().uid === currentUser.uid) {
                        await db.collection('handles').doc(oldNorm).delete();
                    }
                }

                // Создаем новую запись
                await db.collection('handles').doc(norm).set({ uid: currentUser.uid });

                // Обновляем локальные данные
                userProfile.userHandle = raw;
                userProfile.userHandleNorm = norm;
                userHandle.textContent = raw;
                
                showSuccess('Юз успешно обновлен! 🎯');
                
            } catch (error) {
                console.error('Ошибка обновления юза:', error);
                showError('Ошибка обновления юза: ' + error.message);
            } finally {
                setButtonLoading('updateHandleBtn', false, '🏷️ Изменить юз');
            }
        }

        // Обновление пароля
        async function updatePassword() {
            const currentPass = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (!currentPass || !newPass || !confirmPass) {
                showError('Заполните все поля паролей');
                return;
            }
            
            if (newPass !== confirmPass) {
                showError('Новые пароли не совпадают');
                return;
            }
            
            if (newPass.length < 6) {
                showError('Пароль должен содержать минимум 6 символов');
                return;
            }
            
            setButtonLoading('updatePassBtn', true, '🔒 Изменить пароль');
            
            try {
                // Реаутентификация пользователя
                const credential = firebase.auth.EmailAuthProvider.credential(
                    currentUser.email,
                    currentPass
                );
                
                await currentUser.reauthenticateWithCredential(credential);
                
                // Обновление пароля
                await currentUser.updatePassword(newPass);
                
                // Обновляем пароль в Firestore (для legacy логина)
                await db.collection('users').doc(currentUser.uid).update({
                    password: newPass,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Очищаем поля паролей
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                
                showSuccess('Пароль успешно обновлен! 🔐');
                
            } catch (error) {
                console.error('Ошибка обновления пароля:', error);
                
                if (error.code === 'auth/wrong-password') {
                    showError('Неверный текущий пароль');
                } else if (error.code === 'auth/weak-password') {
                    showError('Пароль слишком слабый');
                } else if (error.code === 'auth/requires-recent-login') {
                    showError('Требуется повторный вход. Выйдите и зайдите снова.');
                } else {
                    showError('Ошибка обновления пароля: ' + error.message);
                }
            } finally {
                setButtonLoading('updatePassBtn', false, '🔒 Изменить пароль');
            }
        }

        // Выход из аккаунта
        async function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                setButtonLoading('logoutBtn', true, '🚪 Выход...');
                try {
                    await auth.signOut();
                    window.location.href = 'index.html';
                } catch (error) {
                    console.error('Ошибка выхода:', error);
                    showError('Ошибка выхода из аккаунта');
                    setButtonLoading('logoutBtn', false, '🚪 Выйти из аккаунта');
                }
            }
        }

        // Вспомогательные функции
        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }

        // Обработчик загрузки аватара
        document.getElementById('avatarInput').addEventListener('change', uploadAvatar);

        // Экспорт глобальных функций
        window.updateUsername = updateUsername;
        window.updateHandle = updateHandle;
        window.updatePassword = updatePassword;
        window.logout = logout;
        window.togglePassword = togglePassword;
        window.goToChat = goToChat;

        // Инициализация
        window.onload = init;
    </script>
</body>
</html>
