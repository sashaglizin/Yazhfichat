<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2d1b4e">
    <title>YzFi — профиль</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            background: #1a0f2e;
            color: #e8d5f2;
            line-height: 1.45;
            font-size: 15px;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-tap-highlight-color: transparent;
        }
        .container { max-width: 480px; margin: 0 auto; padding: 10px; }
        .header {
            background: linear-gradient(180deg, #4a2f7a, #2d1b4e);
            padding: 12px;
            margin-bottom: 14px;
            border: 2px solid #110822;
            border-radius: 0 0 8px 8px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 0 #110822;
        }
        .header h1 {
            color: #f5e6ff;
            font-weight: bold;
            font-size: 1.1rem;
            flex: 1 1 100%;
            text-align: center;
            text-shadow: 1px 1px 0 #000;
        }
        .header-buttons { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; width: 100%; }
        .profile-screen {
            background: #2d1b4e;
            border: 2px solid #110822;
            padding: 20px;
            margin-bottom: 14px;
            border-radius: 6px;
            box-shadow: 4px 4px 0 rgba(0,0,0,.35);
        }
        .profile-header { text-align: center; margin-bottom: 20px; }
        .avatar-container {
            position: relative;
            width: 140px;
            height: 140px;
            margin: 0 auto 15px;
            cursor: pointer;
        }
        .avatar-image {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            border: 3px solid #110822;
            background: #3d2666;
        }
        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.65);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s ease;
            color: white;
            font-size: 13px;
            text-align: center;
            padding: 6px;
            font-weight: bold;
        }
        .avatar-container:hover .avatar-overlay, 
        .avatar-container:active .avatar-overlay { 
            opacity: 1; 
        }
        .user-info { text-align: center; margin-bottom: 20px; }
        .user-name { font-size: 1.35rem; font-weight: bold; color: #7fdb8a; margin-bottom: 5px; }
        .user-handle { color: #b47aff; font-size: 0.85rem; font-family: monospace; margin-bottom: 5px; }
        .user-email { color: #b9a0d4; font-size: 0.9rem; }
        .input-group { margin-bottom: 18px; }
        .input-group label { display: block; margin-bottom: 6px; font-weight: bold; color: #f5e6ff; }
        input[type="text"], input[type="password"], input[type="email"] {
            background: #f5e6ff;
            border: 2px solid #110822;
            padding: 12px 14px;
            width: 100%;
            font-size: 16px;
            border-radius: 4px;
            margin-bottom: 10px;
            color: #1a0f2e;
        }
        input:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        .password-input { position: relative; }
        .toggle-password {
            position: absolute;
            right: 8px;
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            font-size: 18px;
            padding: 6px;
            width: auto;
            margin: 0;
            box-shadow: none;
        }
        .toggle-password:active {
            transform: translateY(-50%);
        }
        button {
            font-family: inherit;
            background: #b47aff;
            border: 2px solid #110822;
            padding: 12px 20px;
            cursor: pointer;
            font-weight: bold;
            color: #1a0f2e;
            border-radius: 4px;
            font-size: 16px;
            width: 100%;
            margin-bottom: 10px;
            box-shadow: 2px 2px 0 #110822;
            touch-action: manipulation;
            transition: all 0.05s ease;
        }
        button:active { 
            transform: translate(1px, 1px); 
            box-shadow: 1px 1px 0 #110822; 
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-primary { background: #5c9e6a; color: #102018; }
        .btn-secondary { background: #4a3d7a; color: #f5e6ff; }
        .btn-danger { background: #a33; color: #fff; }
        .hidden { display: none !important; }
        .loading {
            text-align: center;
            padding: 40px 20px;
            color: #9a84b8;
            font-size: 16px;
        }
        .error { 
            background: #3a1525; 
            color: #ffb3c0; 
            padding: 12px; 
            border-radius: 6px; 
            margin: 10px 0; 
            border: 2px solid #110822;
            animation: slideIn 0.3s ease;
        }
        .success { 
            background: #153a28; 
            color: #b5ffcc; 
            padding: 12px; 
            border-radius: 6px; 
            margin: 10px 0; 
            border: 2px solid #110822;
            animation: slideIn 0.3s ease;
        }
        .file-input { display: none; }
        .stats {
            background: #12081f;
            border: 2px dashed #4a2f7a;
            border-radius: 6px;
            padding: 15px;
            margin: 20px 0;
        }
        .stat-item {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #2a1a45;
            font-size: 14px;
        }
        .stat-item:last-child { border-bottom: none; }
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        @keyframes slideIn {
            from {
                transform: translateY(-20px);
                opacity: 0;
            }
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        @media (max-width: 480px) {
            .avatar-container { width: 120px; height: 120px; }
            input[type="text"], input[type="password"], input[type="email"], button { padding: 14px; }
        }
        .button-with-spinner {
            position: relative;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        hr {
            border-color: #4a2f7a;
            margin: 15px 0;
        }
        .premium-badge-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            background: linear-gradient(135deg, #b47aff, #6b4ca0);
            padding: 4px 12px;
            border-radius: 20px;
            width: fit-content;
            margin: 8px auto 0 auto;
            border: 1px solid #110822;
            box-shadow: 2px 2px 0 #110822;
        }

        .premium-icon {
            font-size: 1rem;
        }

        .premium-text {
            font-size: 0.7rem;
            font-weight: bold;
            color: #1a0f2e;
            letter-spacing: 1px;
        }

                /* ===== ТЕМЫ ИНТЕРФЕЙСА ===== */
        
        /* Тёмная тема (по умолчанию) */
        body.theme-dark {
            --bg: #1a0f2e;
            --panel: #2d1b4e;
            --panel2: #3d2666;
            --text: #e8d5f2;
            --border: #110822;
            --accent: #b47aff;
            --cream: #f5e6ff;

        /* Светлая тема */
        body.theme-light {

            --border: #cbb8e8;
            --accent: #8b5cf6;
            --cream: #2d1b4e;
        }

            background: linear-gradient(180deg, #e9defa, #ffffff);
        }
        
        body.theme-light .settings-card,
        body.theme-light .message-bubble {
            background: #ffffff;
        }

        body.theme-stickers {
            --bg: #1a0f2e;

            --accent: #b47aff;
            --cream: #f5e6ff;
        }

            background-image: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" opacity="0.15"><path fill="%23b47aff" d="M20,20 L30,10 L40,20 L30,30 Z"/><circle cx="70" cy="30" r="8" fill="%237fdb8a"/><rect x="60" y="60" width="15" height="15" fill="%23f5a623" rx="3"/><path d="M20,70 Q30,60 40,70 Q30,80 20,70" fill="%23ff6b9d"/><circle cx="80" cy="80" r="6" fill="%234ade80"/><polygon points="15,45 22,35 29,45 22,55" fill="%23b47aff"/></svg>');

            backdrop-filter: blur(8px);

        }

        }

        /* ===== ГЛОБАЛЬНОЕ СКРУГЛЕНИЕ — ВСЕ ЭЛЕМЕНТЫ ===== */
        :root {
            --yzfi-radius: 8px;
            --yzfi-radius-sm: 4px;
        }
        
        /* Переопределяем ВСЕ border-radius на переменные */
        * {
            /* Базовое правило для всех элементов */
            --apply-radius: var(--yzfi-radius);
        }
        
        /* Контейнеры и карточки */
        .container, .header, .setup-screen, .settings-card, .post-card,
        .dashboard-card, .custom-notification, .pwa-promo, .ios-steps,
        .modal, .preview-section, .tabs-container, .search-bar,
        .trending-panel, .chats-list, .user-search-list, .messages,
        .panel, .chat-item, .comment, .modal .modal-content {
            border-radius: var(--yzfi-radius) !important;
        }
        
        /* Кнопки всех типов */
        button, .btn, .action-btn, .tab-btn, .auth-tab, .toggle-password,
        .msg-action-btn, .remove-image-btn, .big-cta, .ghost, .danger,
        .secondary, .small, .btn-save, .btn-secondary, .settings-btn {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        
        /* Поля ввода */
        input, textarea, select, .search-bar input, .add-comment input,
        #messageInput, #searchInput, #chatSearchInput {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        
        /* Аватары и изображения */
        .avatar, .post-avatar, .preview-avatar, .chat-avatar,
        .avatar-wrapper .avatar, img.avatar {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        
        /* Сообщения */
        .msg, .message-bubble, .preview-message {
            border-radius: var(--yzfi-radius) !important;
        }
        
        /* Карточки и блоки внутри */
        .post-header, .post-text, .post-actions, .comments-section,
        .poll-options, .poll-option, .setting-item, .settings-title {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        
        /* Галерея и изображения */
        .gallery img, .post-image, .preview-avatar, .image-preview-img {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        
        /* Уведомления и тосты */
        .toast, .error-toast, .success-toast {
            border-radius: var(--yzfi-radius) !important;
        }
        
        /* Ползунки */
        input[type="range"] {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        input[type="range"]::-webkit-slider-thumb {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        
        /* Вкладки и группы */
        .group-actions, .composer, .composer-row, .chat-header {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        
        /* Список чатов */
        .chat-item, .chat-info, .chat-meta {
            border-radius: var(--yzfi-radius-sm) !important;
        }
        
        /* Обложка модальных окон */
        .modal-overlay .modal {
            border-radius: var(--yzfi-radius) !important;
        }
        
        /* Для треугольного режима — отключаем скругление */
        body.triangle-mode * {
            border-radius: 0 !important;
        }

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431",
            measurementId: "G-T5N77WGWYP"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        const IMGBB_API_KEY = '532c1a46efe25420841b8296f7eeed3f';

        const profileScreen = document.getElementById('profileScreen');
        const loadingScreen = document.getElementById('loadingScreen');
        const avatarImage = document.getElementById('avatarImage');
        const userName = document.getElementById('userName');
        const userHandle = document.getElementById('userHandle');
        const userEmail = document.getElementById('userEmail');
        const usernameInput = document.getElementById('usernameInput');
        const handleInput = document.getElementById('handleInput');
        const joinDate = document.getElementById('joinDate');
        const userId = document.getElementById('userId');
        const errorMessage = document.getElementById('errorMessage');
        const successMessage = document.getElementById('successMessage');

        let currentUser = null;
        let userProfile = null;
        let isUploadingAvatar = false;

        function setButtonLoading(buttonId, isLoading, originalText) {
            const btn = document.getElementById(buttonId);
            if (!btn) return;
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span> ' + originalText;
            } else {
                btn.disabled = false;
                btn.innerHTML = originalText;
            }
        }

        function showError(message) {
            errorMessage.textContent = '❌ ' + message;
            errorMessage.classList.remove('hidden');
            successMessage.classList.add('hidden');
            setTimeout(() => {
                errorMessage.classList.add('hidden');
            }, 5000);
        }

        function showSuccess(message) {
            successMessage.textContent = '✅ ' + message;
            successMessage.classList.remove('hidden');
            errorMessage.classList.add('hidden');
            setTimeout(() => {
                successMessage.classList.add('hidden');
            }, 4000);
        }

        function init() {
            checkAuthState();
        }

                // Загрузка темы интерфейса
        function загрузитьТему() {
            const тема = localStorage.getItem('yzfi_theme') || 'dark';
            document.body.classList.add(`theme-${тема}`);
        }
        загрузитьТему();

        function checkAuthState() {
            auth.onAuthStateChanged((user) => {
                if (user) {
                    currentUser = user;
                    loadUserProfile(user.uid);
                } else {
                    window.location.href = 'index.html';
                }
            });
        }

        async function loadUserProfile(uid) {
            try {
                const userDoc = await db.collection('users').doc(uid).get();

                if (userDoc.exists) {
                    userProfile = userDoc.data();
                } else {
                    console.error('Профиль не найден');
                    return;
                }

                const updates = {};
                
                if (userProfile.username && !userProfile.usernameLower) {
                    updates.usernameLower = userProfile.username.toLowerCase();
                }

                if (userProfile.username && !userProfile.userHandle) {
                    const norm = userProfile.username.toLowerCase();
                    updates.userHandle = '$' + norm;
                    updates.userHandleNorm = norm;
                    await db.collection('handles').doc(norm).set({ uid: currentUser.uid }, { merge: true });
                }

                if (Object.keys(updates).length > 0) {
                    await db.collection('users').doc(uid).update(updates);
                    Object.assign(userProfile, updates);
                }

                // ✅ ПРОВЕРКА ПРЕМИУМА ПОСЛЕ ЗАГРУЗКИ ВСЕХ ДАННЫХ
                await checkPremiumStatus(currentUser.uid);
                updateAllPremiumBadges();
                // Показать/скрыть премиум-бейдж под ником
                const premiumBadge = document.getElementById('premiumBadge');
                if (window.premiumCache.isActive) {
                    premiumBadge.style.display = 'flex';
                } else {
                    premiumBadge.style.display = 'none';
                }
                displayProfile(userProfile);
                
            } catch (error) {
                console.error('Ошибка загрузки профиля:', error);
                showError('Ошибка загрузки профиля');
            }
        }

        function displayProfile(profile) {
            const avatarUrl = profile.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(profile.username)}&background=5c3d8c&color=f5e6ff&size=150&bold=true`;
            avatarImage.src = avatarUrl;
            
            userName.textContent = profile.username || 'Пользователь';
            const handleText = profile.userHandle || ('$' + (profile.usernameLower || profile.username?.toLowerCase() || 'user'));
            userHandle.textContent = handleText;
            userEmail.textContent = currentUser.email || 'email@example.com';
            
            usernameInput.value = profile.username || '';
            handleInput.value = profile.userHandle || ('$' + (profile.usernameLower || ''));
            
            if (profile.createdAt) {
                const date = profile.createdAt.toDate ? profile.createdAt.toDate() : new Date(profile.createdAt);
                joinDate.textContent = date.toLocaleDateString('ru-RU', {
                    year: 'numeric',
                    month: 'long',
                    day: 'numeric'
                });
            } else {
                joinDate.textContent = 'Неизвестно';
            }
            
            userId.textContent = currentUser.uid.substring(0, 8) + '...' + currentUser.uid.substring(currentUser.uid.length - 4);
        }

        async function uploadAvatar() {
            const fileInput = document.getElementById('avatarInput');
            const file = fileInput.files[0];
            
            if (!file) return;
            
            if (isUploadingAvatar) {
                showError('Подождите, аватар уже загружается');
                return;
            }
            
            if (file.size > 5 * 1024 * 1024) {
                showError('Размер изображения не должен превышать 5MB');
                fileInput.value = '';
                return;
            }
            
            if (!file.type.startsWith('image/')) {
                showError('Пожалуйста, выберите изображение');
                fileInput.value = '';
                return;
            }
            
            isUploadingAvatar = true;
            showSuccess('⏳ Загрузка аватара...');
            
            try {
                const formData = new FormData();
                formData.append('image', file);
                
                const response = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                
                if (data.success) {
                    await db.collection('users').doc(currentUser.uid).update({
                        avatar: data.data.url,
                        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    
                    avatarImage.src = data.data.url;
                    userProfile.avatar = data.data.url;
                    
                    showSuccess('Аватар успешно обновлен! 🎉');
                } else {
                    showError('Ошибка загрузки: ' + (data.error?.message || 'неизвестная ошибка'));
                }
                
            } catch (error) {
                console.error('Ошибка загрузки аватара:', error);
                showError('Ошибка загрузки аватара: ' + error.message);
            } finally {
                isUploadingAvatar = false;
                fileInput.value = '';
            }
        }

        async function updateUsername() {
            const newUsername = usernameInput.value.trim();
            const errorDiv = document.getElementById('errorMessage');
            const successDiv = document.getElementById('successMessage');
            
            // Очищаем предыдущие сообщения
            if (errorDiv) errorDiv.classList.add('hidden');
            if (successDiv) successDiv.classList.add('hidden');
            
            // ========== ВАЛИДАЦИЯ 1: Пустое поле ==========
            if (!newUsername) {
                showError('Введите новое имя пользователя');
                usernameInput.focus();
                return;
            }
            
            // ========== ВАЛИДАЦИЯ 2: Длина ==========
            if (newUsername.length < 2) {
                showError('Имя должно быть не менее 2 символов');
                usernameInput.focus();
                return;
            }
            
            if (newUsername.length > 30) {
                showError('Имя не может быть длиннее 30 символов');
                usernameInput.focus();
                return;
            }
            
            // ========== ВАЛИДАЦИЯ 3: Защита от XSS ==========
            const dangerousChars = /[<>{}[\]\\]/;
            if (dangerousChars.test(newUsername)) {
                showError('Имя содержит недопустимые символы: < > { } [ ] \\');
                usernameInput.focus();
                return;
            }
            
            // ========== ВАЛИДАЦИЯ 4: Разрешенные символы ==========
            // Разрешены: латиница, кириллица, цифры, пробел, дефис, точка, подчеркивание
            const allowedPattern = /^[A-Za-zА-Яа-яЁё0-9\s\-._]+$/;
            if (!allowedPattern.test(newUsername)) {
                showError('Имя может содержать только буквы, цифры, пробел, -, . и _');
                usernameInput.focus();
                return;
            }
            
            // ========== ВАЛИДАЦИЯ 5: Не совпадает с текущим ==========
            if (newUsername === userProfile.username) {
                showError('Это ваше текущее имя');
                usernameInput.focus();
                return;
            }
            
            // ========== ВАЛИДАЦИЯ 6: Запрещенные слова ==========
            const forbiddenWords = ['admin', 'administrator', 'moderator', 'support', 'system', 'root', 'y zfi', 'yzfi'];
            const lowerNew = newUsername.toLowerCase();
            for (const word of forbiddenWords) {
                if (lowerNew === word || lowerNew.includes(word)) {
                    showError(`Имя не может содержать "${word}"`);
                    usernameInput.focus();
                    return;
                }
            }
            
            // ========== ВАЛИДАЦИЯ 7: Не начинается/заканчивается пробелом ==========
            if (newUsername.startsWith(' ') || newUsername.endsWith(' ')) {
                showError('Имя не может начинаться или заканчиваться пробелом');
                usernameInput.focus();
                return;
            }
            
            // ========== ВАЛИДАЦИЯ 8: Несколько пробелов подряд ==========
            if (newUsername.includes('  ')) {
                showError('Имя не может содержать несколько пробелов подряд');
                usernameInput.focus();
                return;
            }
            
            // Блокируем кнопку на время операции
            const updateBtn = document.getElementById('updateNameBtn');
            const originalText = updateBtn.textContent;
            updateBtn.disabled = true;
            updateBtn.innerHTML = '<span class="spinner"></span> Проверка...';
            
            try {
                const newLower = newUsername.toLowerCase();
                
                // ========== ПРОВЕРКА 9: Уникальность имени ==========
                updateBtn.innerHTML = '<span class="spinner"></span> Проверка уникальности...';
                
                // Проверяем через коллекцию usernames
                const usernameLock = await db.collection('usernames').doc(newLower).get();
                if (usernameLock.exists && usernameLock.data().uid !== currentUser.uid) {
                    showError('Это имя пользователя уже занято');
                    updateBtn.disabled = false;
                    updateBtn.innerHTML = originalText;
                    return;
                }
                
                // Дополнительная проверка через коллекцию users
                const existingUser = await db.collection('users')
                    .where('usernameLower', '==', newLower)
                    .limit(1)
                    .get();
                
                if (!existingUser.empty && existingUser.docs[0].id !== currentUser.uid) {
                    showError('Это имя пользователя уже занято');
                    updateBtn.disabled = false;
                    updateBtn.innerHTML = originalText;
                    return;
                }
                
                // ========== СОХРАНЕНИЕ ==========
                updateBtn.innerHTML = '<span class="spinner"></span> Сохранение...';
                
                const userRef = db.collection('users').doc(currentUser.uid);
                const oldLower = (userProfile.username || '').toLowerCase();
                
                // Обновляем документ пользователя
                await userRef.update({
                    username: newUsername,
                    usernameLower: newLower,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Обновляем коллекцию usernames
                if (oldLower && oldLower !== newLower) {
                    const oldUsernameRef = db.collection('usernames').doc(oldLower);
                    const oldDoc = await oldUsernameRef.get();
                    if (oldDoc.exists && oldDoc.data().uid === currentUser.uid) {
                        await oldUsernameRef.delete();
                    }
                }
                
                // Создаем новую запись в usernames
                await db.collection('usernames').doc(newLower).set({ 
                    uid: currentUser.uid,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                // Обновляем профиль в Firebase Auth
                await currentUser.updateProfile({ displayName: newUsername });
                
                // Обновляем локальные данные
                userProfile.username = newUsername;
                userProfile.usernameLower = newLower;
                
                // Обновляем отображение
                const userNameSpan = document.getElementById('userName');
                if (userNameSpan) userNameSpan.textContent = newUsername;
                
                // Обновляем handle, если он еще не установлен или основан на старом имени
                if (!userProfile.userHandle || userProfile.userHandle === ('$' + oldLower)) {
                    const newHandle = '$' + newLower;
                    await userRef.update({
                        userHandle: newHandle,
                        userHandleNorm: newLower
                    });
                    
                    // Обновляем handles коллекцию
                    if (oldLower && oldLower !== newLower) {
                        const oldHandleRef = db.collection('handles').doc(oldLower);
                        const oldHandleDoc = await oldHandleRef.get();
                        if (oldHandleDoc.exists && oldHandleDoc.data().uid === currentUser.uid) {
                            await oldHandleRef.delete();
                        }
                    }
                    await db.collection('handles').doc(newLower).set({ uid: currentUser.uid });
                    
                    userProfile.userHandle = newHandle;
                    userProfile.userHandleNorm = newLower;
                    
                    const userHandleSpan = document.getElementById('userHandle');
                    if (userHandleSpan) userHandleSpan.textContent = newHandle;
                    
                    const handleInput = document.getElementById('handleInput');
                    if (handleInput) handleInput.value = newHandle;
                }
                
                // Обновляем имя в поле ввода
                usernameInput.value = newUsername;
                
                showSuccess(`Имя успешно изменено на "${newUsername}"! ✨`);
                
                // Дополнительно: обновляем имя автора во всех постах пользователя (фоновая задача)
                updateAuthorNameInPosts(currentUser.uid, newUsername).catch(console.warn);
                
            } catch (error) {
                console.error('Ошибка обновления имени:', error);
                
                let errorMessage = 'Ошибка обновления имени';
                if (error.code === 'permission-denied') {
                    errorMessage = 'Нет прав для изменения имени. Обратитесь к администратору.';
                } else if (error.code === 'unavailable') {
                    errorMessage = 'Сервер недоступен. Попробуйте позже.';
                } else if (error.message) {
                    errorMessage = error.message;
                }
                
                showError(errorMessage);
            } finally {
                updateBtn.disabled = false;
                updateBtn.innerHTML = originalText;
                usernameInput.focus();
            }
        }

        // ========== ВСПОМОГАТЕЛЬНАЯ ФУНКЦИЯ ДЛЯ ОБНОВЛЕНИЯ ПОСТОВ ==========
        async function updateAuthorNameInPosts(userId, newUsername) {
            try {
                const postsSnapshot = await db.collection('posts')
                    .where('authorId', '==', userId)
                    .limit(50)
                    .get();
                
                const batch = db.batch();
                postsSnapshot.forEach(doc => {
                    batch.update(doc.ref, { authorName: newUsername });
                });
                
                if (postsSnapshot.size > 0) {
                    await batch.commit();
                }
            } catch(e) {
                console.warn('Не удалось обновить имена в постах:', e);
            }
        }

        async function updateHandle() {
            const raw = (handleInput.value || '').trim();

            if (!raw) {
                showError('Введите юз');
                return;
            }
            if (!/^\$[A-Za-z0-9_]{2,20}$/.test(raw)) {
                showError('Юз должен быть в формате $юз (латиница, цифры, _, 2-20 символов после $)');
                return;
            }

            const norm = raw.slice(1).toLowerCase();
            const oldRaw = (userProfile && userProfile.userHandle) ? String(userProfile.userHandle) : '';
            const oldNorm = oldRaw.startsWith('$') ? oldRaw.slice(1).toLowerCase() : '';

            if (oldNorm === norm) {
                showError('Это ваш текущий юз');
                return;
            }

            setButtonLoading('updateHandleBtn', true, '🏷️ Изменить юз');

            try {
                const newHandleDoc = await db.collection('handles').doc(norm).get();
                if (newHandleDoc.exists && newHandleDoc.data().uid !== currentUser.uid) {
                    showError('Этот юз уже занят');
                    return;
                }

                const userRef = db.collection('users').doc(currentUser.uid);
                
                await userRef.update({
                    userHandle: raw,
                    userHandleNorm: norm,
                    updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                });

                if (oldNorm && oldNorm !== norm) {
                    const oldHandleDoc = await db.collection('handles').doc(oldNorm).get();
                    if (oldHandleDoc.exists && oldHandleDoc.data().uid === currentUser.uid) {
                        await db.collection('handles').doc(oldNorm).delete();
                    }
                }

                await db.collection('handles').doc(norm).set({ uid: currentUser.uid });

                userProfile.userHandle = raw;
                userProfile.userHandleNorm = norm;
                userHandle.textContent = raw;
                
                showSuccess('Юз успешно обновлен! 🎯');
                
            } catch (error) {
                console.error('Ошибка обновления юза:', error);
                showError('Ошибка обновления юза: ' + error.message);
            } finally {
                setButtonLoading('updateHandleBtn', false, '🏷️ Изменить юз');
            }
        }

        async function updatePassword() {
            const currentPass = document.getElementById('currentPassword').value;
            const newPass = document.getElementById('newPassword').value;
            const confirmPass = document.getElementById('confirmPassword').value;
            
            if (!currentPass || !newPass || !confirmPass) {
                showError('Заполните все поля паролей');
                return;
            }
            
            if (newPass !== confirmPass) {
                showError('Новые пароли не совпадают');
                return;
            }
            
            if (newPass.length < 6) {
                showError('Пароль должен содержать минимум 6 символов');
                return;
            }
            
            setButtonLoading('updatePassBtn', true, '🔒 Изменить пароль');
            
            try {
                const credential = firebase.auth.EmailAuthProvider.credential(
                    currentUser.email,
                    currentPass
                );
                
                await currentUser.reauthenticateWithCredential(credential);
                await currentUser.updatePassword(newPass);
                
                // НЕ сохраняем пароль в Firestore!
                
                document.getElementById('currentPassword').value = '';
                document.getElementById('newPassword').value = '';
                document.getElementById('confirmPassword').value = '';
                
                showSuccess('Пароль успешно обновлен! 🔐');
                
            } catch (error) {
                console.error('Ошибка обновления пароля:', error);
                
                if (error.code === 'auth/wrong-password') {
                    showError('Неверный текущий пароль');
                } else if (error.code === 'auth/weak-password') {
                    showError('Пароль слишком слабый');
                } else if (error.code === 'auth/requires-recent-login') {
                    showError('Требуется повторный вход. Выйдите и зайдите снова.');
                } else {
                    showError('Ошибка обновления пароля: ' + error.message);
                }
            } finally {
                setButtonLoading('updatePassBtn', false, '🔒 Изменить пароль');
            }
        }

        async function logout() {
            if (confirm('Вы уверены, что хотите выйти?')) {
                setButtonLoading('logoutBtn', true, '🚪 Выход...');
                try {
                    await auth.signOut();
                    window.location.href = 'index.html';
                } catch (error) {
                    console.error('Ошибка выхода:', error);
                    showError('Ошибка выхода из аккаунта');
                    setButtonLoading('logoutBtn', false, '🚪 Выйти из аккаунта');
                }
            }
        }

        function togglePassword(inputId) {
            const input = document.getElementById(inputId);
            if (input.type === 'password') {
                input.type = 'text';
            } else {
                input.type = 'password';
            }
        }

        function goToChat() {
            window.location.href = 'chat.html';
        }

        document.getElementById('avatarInput').addEventListener('change', uploadAvatar);

        window.updateUsername = updateUsername;
        window.updateHandle = updateHandle;
        window.updatePassword = updatePassword;
        window.logout = logout;
        window.togglePassword = togglePassword;
        window.goToChat = goToChat;

        window.onload = init;


        // ========== ЗАГРУЗКА СКРУГЛЕНИЯ ==========
        function loadRadius() {
            const radius = localStorage.getItem('yzfi_ui_radius') || '8';
            document.documentElement.style.setProperty('--yzfi-radius', `${radius}px`);
            document.documentElement.style.setProperty('--yzfi-radius-sm', `${Math.max(2, radius / 2)}px`);
            document.documentElement.style.setProperty('--yzfi-radius-lg', `${Math.min(radius * 1.5, 24)}px`);
        }
        
        loadRadius();
        
        // Слушаем изменения в localStorage (если настройки меняются на другой вкладке)
        window.addEventListener('storage', (e) => {
            if (e.key === 'yzfi_ui_radius') {
                loadRadius();
            }
        });


        
    </script>
</body>
