<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>YzFi — профиль</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            background: #1a0f2e;
            color: #e8d5f2;
            font-size: 15px;
            min-height: 100dvh;
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
        }
        .container { max-width: 480px; margin: 0 auto; padding: 10px; }
        .header {
            background: linear-gradient(180deg, #4a2f7a, #2d1b4e);
            border: 2px solid #110822;
            border-radius: 0 0 8px 8px;
            padding: 12px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 8px;
        }
        .header h1 { color: #f5e6ff; font-size: 1.1rem; }
        .profile-card {
            background: #2d1b4e;
            border: 2px solid #110822;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 14px;
        }
        .avatar-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 15px;
            cursor: pointer;
            position: relative;
        }
        .avatar {
            width: 100%;
            height: 100%;
            border-radius: 8px;
            object-fit: cover;
            border: 3px solid #110822;
        }
        .avatar-overlay {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.6);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            transition: opacity 0.2s;
        }
        .avatar-container:hover .avatar-overlay { opacity: 1; }
        .user-name { font-size: 1.4rem; font-weight: bold; color: #7fdb8a; text-align: center; }
        .user-handle { text-align: center; color: #b47aff; margin-bottom: 5px; }
        .premium-badge {
            display: inline-block;
            background: #ffd700;
            color: #1a0f2e;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            margin-left: 8px;
        }
        button {
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid #110822;
            border-radius: 4px;
            padding: 12px;
            cursor: pointer;
            background: #b47aff;
            color: #1a0f2e;
            box-shadow: 2px 2px 0 #110822;
            width: 100%;
            margin-bottom: 8px;
        }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 #110822; }
        button.secondary { background: #3d2666; color: #f5e6ff; }
        button.danger { background: #e74c3c; color: #fff; }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #110822;
            border-radius: 4px;
            background: #f5e6ff;
            color: #1a0f2e;
            margin-bottom: 10px;
        }
        .hidden { display: none; }
        .toast {
            position: fixed;
            bottom: 20px;
            left: 12px;
            right: 12px;
            background: #1a5a2a;
            border: 2px solid #110822;
            color: #ccffcc;
            padding: 12px;
            border-radius: 6px;
            text-align: center;
            z-index: 1100;
        }
        .toast.error { background: #5a1a1a; color: #ffcccc; }
        .loading { text-align: center; padding: 40px; color: #b47aff; }
        .stats {
            background: #12081f;
            border: 1px solid #4a2f7a;
            border-radius: 6px;
            padding: 12px;
            margin: 15px 0;
        }
        .stat-item { display: flex; justify-content: space-between; padding: 6px 0; border-bottom: 1px solid #2a1a45; }
        .stat-item:last-child { border-bottom: none; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>👤 Мой профиль</h1>
            <div>
                <button class="secondary" onclick="goToChats()" style="width: auto; padding: 8px 12px;">💬 чаты</button>
                <button class="secondary" onclick="goToPremium()" style="width: auto; padding: 8px 12px;">⭐ премиум</button>
            </div>
        </div>

        <div id="profileContent">
            <div class="loading">⏳ Загрузка...</div>
        </div>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const IMGBB_API_KEY = '532c1a46efe25420841b8296f7eeed3f';

        let currentUser = null;
        let userData = null;

        function showToast(msg, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = isError ? '❌ ' + msg : '✅ ' + msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function goToChats() { window.location.href = 'chat.html'; }
        function goToLenta() { window.location.href = 'lenta.html'; }
        function goToPremium() { window.location.href = 'premium.html'; }

        async function init() {
            auth.onAuthStateChanged(async (user) => {
                if (!user) { window.location.href = 'index.html'; return; }
                currentUser = user;
                await loadProfile();
            });
        }

        async function loadProfile() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (!doc.exists) { showToast('Профиль не найден', true); return; }
            userData = doc.data();
            renderProfile();
        }

        function renderProfile() {
            const container = document.getElementById('profileContent');
            const isPremium = userData.premium === true;
            const avatarUrl = userData.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(userData.username)}&background=5c3d8c&color=f5e6ff&size=150`;
            const joinDate = userData.createdAt?.toDate() || new Date();
            
            container.innerHTML = `
                <div class="profile-card">
                    <div class="avatar-container" onclick="document.getElementById('avatarInput').click()">
                        <img class="avatar" id="avatarImg" src="${avatarUrl}" alt="аватар">
                        <div class="avatar-overlay">📷 изменить</div>
                    </div>
                    <input type="file" id="avatarInput" accept="image/*" style="display: none;">
                    
                    <div class="user-name">
                        ${escapeHtml(userData.username)}
                        ${isPremium ? '<span class="premium-badge">⭐ PREMIUM</span>' : ''}
                        <span id="userIconDisplay" style="font-size: 1.2rem;">${userData.userIcon || ''}</span>
                    </div>
                    <div class="user-handle">${escapeHtml(userData.userHandle || ('$' + userData.usernameLower))}</div>
                    
                    <div class="stats">
                        <div class="stat-item"><span>📅 Регистрация:</span><span>${joinDate.toLocaleDateString()}</span></div>
                        <div class="stat-item"><span>🆔 ID:</span><span>${currentUser.uid.substring(0, 8)}...</span></div>
                        ${isPremium ? `<div class="stat-item"><span>⭐ Премиум с:</span><span>${userData.premiumSince?.toDate()?.toLocaleDateString() || 'сегодня'}</span></div>` : ''}
                    </div>
                    
                    <div class="stats">
                        <div class="stat-item"><span>📝 Имя:</span><span id="usernameDisplay">${escapeHtml(userData.username)}</span></div>
                        <div class="stat-item"><span>🏷️ Юз:</span><span id="handleDisplay">${escapeHtml(userData.userHandle || ('$' + userData.usernameLower))}</span></div>
                    </div>
                    
                    <input type="text" id="newUsername" placeholder="Новое имя" maxlength="30">
                    <button onclick="updateUsername()">🔄 Изменить имя</button>
                    
                    <input type="text" id="newHandle" placeholder="Новый юз (например: \$username)" maxlength="22">
                    <button onclick="updateHandle()">🏷️ Изменить юз</button>
                    
                    <hr style="margin: 15px 0; border-color: #4a2f7a;">
                    
                    <div class="password-input" style="position: relative;">
                        <input type="password" id="currentPass" placeholder="Текущий пароль">
                    </div>
                    <div class="password-input" style="position: relative;">
                        <input type="password" id="newPass" placeholder="Новый пароль (мин. 6)">
                    </div>
                    <div class="password-input" style="position: relative;">
                        <input type="password" id="confirmPass" placeholder="Подтвердите пароль">
                    </div>
                    <button onclick="updatePassword()">🔒 Изменить пароль</button>
                    
                    <button class="danger" onclick="logout()">🚪 Выйти из аккаунта</button>
                </div>
            `;
            
            document.getElementById('avatarInput').addEventListener('change', uploadAvatar);
        }

        function escapeHtml(s) { if (!s) return ''; return s.replace(/[&<>]/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;'}[m]; }); }

        async function uploadAvatar() {
            const file = document.getElementById('avatarInput').files[0];
            if (!file) return;
            const fd = new FormData();
            fd.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) {
                    await db.collection('users').doc(currentUser.uid).update({ avatar: data.data.url });
                    document.getElementById('avatarImg').src = data.data.url;
                    showToast('Аватар обновлен');
                } else showToast('Ошибка загрузки', true);
            } catch(e) { showToast('Ошибка', true); }
        }

        async function updateUsername() {
            const newName = document.getElementById('newUsername').value.trim();
            if (!newName) { showToast('Введите имя', true); return; }
            const lower = newName.toLowerCase();
            const existing = await db.collection('users').where('usernameLower', '==', lower).limit(1).get();
            if (!existing.empty && existing.docs[0].id !== currentUser.uid) { showToast('Имя занято', true); return; }
            await db.collection('users').doc(currentUser.uid).update({ username: newName, usernameLower: lower });
            userData.username = newName;
            document.getElementById('usernameDisplay').textContent = newName;
            document.getElementById('newUsername').value = '';
            showToast('Имя обновлено');
        }

        async function updateHandle() {
            let newHandle = document.getElementById('newHandle').value.trim();
            if (!newHandle) { showToast('Введите юз', true); return; }
            if (!/^\$[A-Za-z0-9_]{2,20}$/.test(newHandle)) { showToast('Формат: $ник (латиница, 2-20 символов)', true); return; }
            const norm = newHandle.slice(1).toLowerCase();
            const existing = await db.collection('handles').doc(norm).get();
            if (existing.exists && existing.data().uid !== currentUser.uid) { showToast('Юз занят', true); return; }
            await db.collection('users').doc(currentUser.uid).update({ userHandle: newHandle, userHandleNorm: norm });
            await db.collection('handles').doc(norm).set({ uid: currentUser.uid });
            userData.userHandle = newHandle;
            document.getElementById('handleDisplay').textContent = newHandle;
            document.getElementById('newHandle').value = '';
            showToast('Юз обновлен');
        }

        async function updatePassword() {
            const current = document.getElementById('currentPass').value;
            const newPass = document.getElementById('newPass').value;
            const confirm = document.getElementById('confirmPass').value;
            if (!current || !newPass || !confirm) { showToast('Заполните все поля', true); return; }
            if (newPass !== confirm) { showToast('Пароли не совпадают', true); return; }
            if (newPass.length < 6) { showToast('Пароль минимум 6 символов', true); return; }
            try {
                const credential = firebase.auth.EmailAuthProvider.credential(currentUser.email, current);
                await currentUser.reauthenticateWithCredential(credential);
                await currentUser.updatePassword(newPass);
                document.getElementById('currentPass').value = '';
                document.getElementById('newPass').value = '';
                document.getElementById('confirmPass').value = '';
                showToast('Пароль изменен');
            } catch(e) { showToast('Неверный текущий пароль', true); }
        }

        async function logout() {
            if (confirm('Выйти?')) { await auth.signOut(); window.location.href = 'index.html'; }
        }

        window.goToChats = goToChats;
        window.goToLenta = goToLenta;
        window.goToPremium = goToPremium;
        window.updateUsername = updateUsername;
        window.updateHandle = updateHandle;
        window.updatePassword = updatePassword;
        window.logout = logout;
        window.uploadAvatar = uploadAvatar;

        init();
    </script>
</body>
</html>
