<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2d1b4e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="YzFi">
    <title>YzFi — чаты</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg: #1a0f2e;
            --panel: #2d1b4e;
            --panel2: #3d2666;
            --cream: #f5e6ff;
            --text: #e8d5f2;
            --green: #7fdb8a;
            --accent: #b47aff;
            --header: #4a2f7a;
            --border: #110822;
            --shadow: rgba(0,0,0,.35);
            --online: #2ecc71;
            --offline: #7f8c8d;
            --danger: #c44;
        }
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            height: 100dvh;
        }
        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            font-size: 15px;
            line-height: 1.45;
            background: var(--bg);
            color: var(--text);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-tap-highlight-color: transparent;
        }
        .app {
            max-width: 520px;
            margin: 0 auto;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
        }
        .header {
            flex-shrink: 0;
            background: linear-gradient(180deg, var(--header) 0%, var(--panel) 100%);
            border: 2px solid var(--border);
            border-radius: 0 0 8px 8px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 0 var(--border);
        }
        .header-title {
            flex: 1;
            text-align: center;
            font-weight: bold;
            font-size: 1.15rem;
            letter-spacing: 0.04em;
            color: var(--cream);
            text-shadow: 1px 1px 0 var(--border);
        }
        .header-actions {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            justify-content: flex-end;
        }
        button, .btn {
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid var(--border);
            border-radius: 4px;
            padding: 10px 12px;
            cursor: pointer;
            background: var(--accent);
            color: #1a0f2e;
            box-shadow: 2px 2px 0 var(--border);
            touch-action: manipulation;
            transition: all 0.05s ease;
        }
        button:active, .btn:active {
            transform: translate(1px, 1px);
            box-shadow: 1px 1px 0 var(--border);
        }
        button.secondary {
            background: var(--panel2);
            color: var(--cream);
        }
        button.danger {
            background: var(--danger);
            color: #fff;
        }
        button.small {
            padding: 6px 10px;
            font-size: 12px;
        }
        button.icon-btn {
            padding: 6px 8px;
            background: none;
            box-shadow: none;
            color: var(--text);
        }
        button.icon-btn:active {
            transform: none;
            opacity: 0.6;
        }
        button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
            min-height: 0;
        }
        .panel {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 3px 3px 0 var(--shadow);
        }
        .search-row {
            display: flex;
            gap: 8px;
            margin-bottom: 10px;
        }
        input[type="text"], input[type="search"] {
            flex: 1;
            min-width: 0;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: var(--cream);
            color: #1a0f2e;
        }
        .chats-list, .user-search-list {
            max-height: min(52vh, 420px);
            overflow-y: auto;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: #12081f;
        }
        @media (min-width: 600px) {
            .chats-list, .user-search-list { max-height: 480px; }
        }
        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #2a1a45;
            transition: background 0.1s ease;
            cursor: pointer;
            position: relative;
        }
        .chat-item:hover { background: var(--panel2); }
        .chat-item.unread {
            border-left: 4px solid var(--accent);
            background: #251840;
        }
        .chat-item.blocked {
            opacity: 0.6;
            background: #2a1a2a;
        }
        .chat-item:last-child { border-bottom: none; }
        .avatar-wrapper {
            position: relative;
            flex-shrink: 0;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            border: 2px solid var(--border);
            cursor: pointer;
        }
        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--offline);
        }
        .status-dot.online {
            background: var(--online);
        }
        .chat-info {
            flex: 1;
            min-width: 0;
        }
        .chat-name {
            font-weight: bold;
            color: var(--green);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-preview {
            font-size: 13px;
            color: #b9a0d4;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .chat-meta {
            text-align: right;
            font-size: 12px;
            color: #8a739e;
            flex-shrink: 0;
        }
        .badge-unread {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            background: var(--accent);
            color: #1a0f2e;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 4px;
        }
        .group-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 8px;
        }
        .hidden { display: none !important; }
        .empty {
            text-align: center;
            padding: 32px 16px;
            color: #8a739e;
        }
        .empty strong { color: var(--green); display: block; margin-bottom: 8px; }
        .error-toast, .success-toast {
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: max(16px, env(safe-area-inset-bottom));
            padding: 12px;
            border-radius: 6px;
            z-index: 200;
            font-size: 14px;
            box-shadow: 4px 4px 0 var(--border);
        }
        .error-toast { background: #5a1a1a; color: #ffcccc; }
        .success-toast { background: #1a5a2a; color: #ccffcc; }
        
        .chat-view .chat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chat-view .chat-header .title {
            flex: 1;
            font-weight: bold;
            color: var(--cream);
            font-size: 15px;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .chat-view .chat-header .title:hover {
            color: #b47aff;
            text-decoration: underline;
        }
        .chat-actions {
            display: flex;
            gap: 8px;
        }
        .messages {
            flex: 1;
            min-height: 200px;
            max-height: min(55vh, 520px);
            overflow-y: auto;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: #12081f;
            padding: 10px;
            margin-bottom: 10px;
        }
        @media (max-height: 640px) {
            .messages { max-height: 42vh; }
            .chats-list, .user-search-list { max-height: 38vh; }
        }
        .msg {
            margin-bottom: 14px;
            padding: 8px 12px;
            border-radius: 6px;
            background: #1f1338;
            position: relative;
            transition: background 0.1s;
        }
        .msg:hover {
            background: #2a1f45;
        }
        .msg.own {
            background: #2a2350;
            border-left: 3px solid var(--green);
        }
        .msg.edited {
            opacity: 0.9;
        }
        .msg-head {
            display: flex;
            justify-content: space-between;
            gap: 8px;
            font-size: 13px;
            margin-bottom: 6px;
        }
        .msg-user {
            color: var(--green);
            font-weight: bold;
            cursor: pointer;
            transition: color 0.2s ease;
        }
        .msg-user:hover {
            color: #9effaa;
            text-decoration: underline;
        }
        .msg-time {
            color: #8a739e;
            flex-shrink: 0;
            font-size: 11px;
        }
        .msg-body {
            color: var(--text);
            word-break: break-word;
        }
        .msg-body img {
            max-width: 100%;
            max-height: 280px;
            object-fit: contain;
            border: 2px solid var(--border);
            border-radius: 4px;
            margin-top: 6px;
            display: block;
            cursor: pointer;
        }
        .msg-status {
            font-size: 11px;
            margin-left: 8px;
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .msg-status .read { color: var(--green); }
        .msg-status .delivered { color: #b9a0d4; }
        
        .msg-actions {
            position: absolute;
            right: 8px;
            top: 8px;
            display: none;
            gap: 4px;
            background: rgba(0,0,0,0.7);
            padding: 4px 6px;
            border-radius: 4px;
            z-index: 10;
        }
        .msg:hover .msg-actions {
            display: flex;
        }
        .msg-actions button {
            padding: 4px 6px;
            font-size: 11px;
            margin: 0;
            background: var(--panel2);
        }
        .msg-actions button.danger {
            background: #a33;
        }
        
        .composer {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            gap: 8px;
            padding-top: 4px;
            background: var(--bg);
            padding-bottom: env(safe-area-inset-bottom);
        }
        .composer-row {
            display: flex;
            gap: 8px;
        }
        .composer-row input[type="text"] { flex: 1; }
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.85);
            z-index: 100;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 12px;
            padding-bottom: max(12px, env(safe-area-inset-bottom));
        }
        @media (min-width: 480px) {
            .modal-overlay { align-items: center; }
        }
        .modal {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            max-height: 90dvh;
            overflow-y: auto;
            padding: 16px;
            box-shadow: 6px 6px 0 var(--border);
        }
        .modal h3 {
            color: var(--cream);
            margin-bottom: 12px;
            font-size: 1.1rem;
        }
        .modal .field { margin-bottom: 12px; }
        .modal label {
            display: block;
            font-size: 12px;
            color: #b9a0d4;
            margin-bottom: 4px;
        }
        .modal textarea {
            width: 100%;
            padding: 10px;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: var(--cream);
            font-family: inherit;
            resize: vertical;
        }
        .hint { font-size: 12px; color: #8a739e; margin-top: 6px; }
        .mono { font-family: ui-monospace, monospace; font-size: 13px; }
        .loading-spinner {
            text-align: center;
            padding: 20px;
            color: var(--accent);
        }
        .blocked-banner {
            background: #3a1525;
            border: 2px solid var(--border);
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 10px;
            text-align: center;
            color: #ffb3c0;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-title" id="screenTitle">YzFi</div>
            <div class="header-actions">
                <button type="button" class="small secondary" id="btnLenta" onclick="goToLenta()">📸 лента</button>
                <button type="button" class="small secondary" id="btnProfile" onclick="goProfile()">👤 я</button>
            </div>
        </header>

        <main class="main" id="listMain">
            <div class="panel">
                <div class="search-row">
                    <input type="search" id="searchInput" placeholder="🔍 Поиск по нику или $юз..." autocomplete="off">
                    <button type="button" class="small" id="btnSearchUsers" onclick="runUserSearch()">найти</button>
                </div>
                <div id="userSearchWrap" class="user-search-list hidden"></div>
                <div class="group-actions">
                    <button type="button" class="secondary" onclick="openCreateGroupModal()">➕ группа</button>
                    <button type="button" class="secondary" onclick="openJoinModal()">🔑 войти по коду</button>
                </div>
            </div>
            <div class="chats-list" id="chatsList">
                <div class="empty">⏳ Загрузка...</div>
            </div>
            <div id="emptyChats" class="empty hidden">
                <strong>✨ Пока пусто</strong>
                Найди человека выше или создай группу.
            </div>
        </main>

        <main class="main chat-view hidden" id="chatMain">
            <div class="panel chat-header">
                <button type="button" class="small secondary" onclick="backToList()">←</button>
                <div class="title" id="chatTitle">чат</div>
                <div class="chat-actions" id="chatActions">
                    <button type="button" class="small secondary" id="clearChatBtn" onclick="clearChat()">🗑️ очистить</button>
                    <button type="button" class="small danger" id="blockUserBtn" onclick="toggleBlockUser()">🚫 блок</button>
                </div>
            </div>
            <div id="blockedBanner" class="blocked-banner hidden"></div>
            <div class="messages" id="messagesEl"></div>
            <div class="composer">
                <input type="text" id="messageInput" placeholder="💬 Сообщение..." maxlength="2000" autocomplete="off">
                <input type="file" id="imageInput" accept="image/*" class="hidden">
                <div class="composer-row">
                    <button type="button" onclick="sendNow()">📤 отправить</button>
                    <button type="button" class="secondary" onclick="pickImage()">🖼️ фото</button>
                </div>
            </div>
        </main>
    </div>

    <div id="modalCreate" class="modal-overlay hidden" onclick="if(event.target===this) closeModals()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>✨ Создать группу</h3>
            <div class="field">
                <label>📛 Название группы</label>
                <input type="text" id="newGroupName" maxlength="40" placeholder="Например: Ночной /b/">
            </div>
            <div class="field">
                <label>🔑 Код приглашения</label>
                <label style="display:flex;align-items:center;gap:8px;margin-top:8px;color:var(--text);">
                    <input type="radio" name="codeMode" value="random" checked> 🎲 случайный
                </label>
                <label style="display:flex;align-items:center;gap:8px;color:var(--text);">
                    <input type="radio" name="codeMode" value="custom"> ✍️ свой ($ник)
                </label>
                <input type="text" id="customGroupCode" class="hidden" maxlength="24" placeholder="$mycrew" style="margin-top:8px;width:100%;">
            </div>
            <p class="hint">💡 Свой код: от 3 символов, формат с $, латиница, цифры, _</p>
            <div class="composer-row">
                <button type="button" onclick="submitCreateGroup()">✅ создать</button>
                <button type="button" class="secondary" onclick="closeModals()">❌ отмена</button>
            </div>
        </div>
    </div>

    <div id="modalJoin" class="modal-overlay hidden" onclick="if(event.target===this) closeModals()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>🔓 Войти по коду</h3>
            <div class="field">
                <label>🔑 Код группы</label>
                <input type="text" id="joinCodeInput" maxlength="32" placeholder="ABC12XY или $mycrew">
            </div>
            <div class="composer-row">
                <button type="button" onclick="submitJoinGroup()">✅ войти</button>
                <button type="button" class="secondary" onclick="closeModals()">❌ отмена</button>
            </div>
        </div>
    </div>

    <div id="modalEditMsg" class="modal-overlay hidden" onclick="if(event.target===this) closeEditModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>✏️ Редактировать сообщение</h3>
            <textarea id="editMsgText" rows="3" maxlength="2000"></textarea>
            <div class="composer-row" style="margin-top:12px;">
                <button type="button" onclick="submitEditMessage()">💾 сохранить</button>
                <button type="button" class="secondary" onclick="closeEditModal()">❌ отмена</button>
            </div>
        </div>
    </div>

    <div id="modalForward" class="modal-overlay hidden" onclick="if(event.target===this) closeForwardModal()">
        <div class="modal" onclick="event.stopPropagation()">
            <h3>📎 Переслать</h3>
            <div class="field">
                <label>Выберите чат</label>
                <div id="forwardChatsList" style="max-height:300px;overflow-y:auto;"></div>
            </div>
            <div class="composer-row">
                <button type="button" class="secondary" onclick="closeForwardModal()">❌ отмена</button>
            </div>
        </div>
    </div>

    <div id="errorToast" class="error-toast hidden"></div>
    <div id="successToast" class="success-toast hidden"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const IMGBB_API_KEY = '532c1a46efe25420841b8296f7eeed3f';

        let currentUser = null;
        let myUsername = '';
        let myUserData = null;
        let unsubscribeChats = null;
        let unsubscribeMessages = null;
        let chats = [];
        let onlineStatusListener = null;
        let userStatuses = new Map();
        let blockedUsers = new Set();

        let chatMode = null;
        let dmPeerId = null;
        let dmPeerProfile = null;
        let groupIdOpen = null;
        let groupMetaOpen = null;
        let lastUploadedImage = null;
        let isSending = false;
        let editingMessage = null;
        let forwardingMessage = null;

        const listMain = document.getElementById('listMain');
        const chatMain = document.getElementById('chatMain');
        const chatsList = document.getElementById('chatsList');
        const emptyChats = document.getElementById('emptyChats');
        const searchInput = document.getElementById('searchInput');
        const userSearchWrap = document.getElementById('userSearchWrap');
        const messagesEl = document.getElementById('messagesEl');
        const messageInput = document.getElementById('messageInput');
        const chatTitle = document.getElementById('chatTitle');
        const chatExtra = document.getElementById('chatExtra');
        const screenTitle = document.getElementById('screenTitle');
        const chatActions = document.getElementById('chatActions');
        const blockedBanner = document.getElementById('blockedBanner');

        function escapeHtml(s) {
            if (s == null) return '';
            const div = document.createElement('div');
            div.textContent = s;
            return div.innerHTML;
        }

        function showError(msg) {
            const el = document.getElementById('errorToast');
            el.textContent = '❌ ' + msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 4000);
        }

        function showSuccess(msg) {
            const el = document.getElementById('successToast');
            el.textContent = '✅ ' + msg;
            el.classList.remove('hidden');
            setTimeout(() => el.classList.add('hidden'), 3000);
        }

        function formatTime(d) {
            if (!d) return '';
            return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
        }

        function formatFullDate(d) {
            if (!d) return '';
            return d.toLocaleString('ru-RU', { day: 'numeric', month: 'short', hour: '2-digit', minute: '2-digit' });
        }

        function scrollBottom() {
            setTimeout(() => {
                if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight;
            }, 100);
        }

        function goProfile() { window.location.href = 'profil.html'; }
        function goToLenta() { window.location.href = 'lenta.html'; }

        function goToUserProfile(userId) {
            if (userId === currentUser?.uid) {
                window.location.href = 'profil.html';
            } else {
                window.location.href = `users_profil.html?userId=${userId}`;
            }
        }

        async function updateOnlineStatus() {
            if (!currentUser) return;
            try {
                await db.collection('users').doc(currentUser.uid).update({
                    lastSeen: firebase.firestore.FieldValue.serverTimestamp(),
                    online: true
                });
            } catch (e) { console.error(e); }
        }

        async function loadBlockedUsers() {
            try {
                const blockDoc = await db.collection('blocks').doc(currentUser.uid).collection('blocked').get();
                blockedUsers.clear();
                blockDoc.forEach(doc => blockedUsers.add(doc.id));
            } catch (e) { console.error('Ошибка загрузки блокировок:', e); }
        }

        async function toggleBlockUser() {
            if (chatMode !== 'dm' || !dmPeerId) return;
            
            const isBlocked = blockedUsers.has(dmPeerId);
            
            try {
                if (isBlocked) {
                    await db.collection('blocks').doc(currentUser.uid).collection('blocked').doc(dmPeerId).delete();
                    blockedUsers.delete(dmPeerId);
                    showSuccess(`Пользователь разблокирован`);
                    updateBlockedUI(false);
                } else {
                    await db.collection('blocks').doc(currentUser.uid).collection('blocked').doc(dmPeerId).set({
                        blockedAt: firebase.firestore.FieldValue.serverTimestamp(),
                        blockedBy: currentUser.uid
                    });
                    blockedUsers.add(dmPeerId);

        async function sendForwardToChat(targetChat, chatId) {
            if (!forwardingMessage) return;
            
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            const preview = forwardingMessage.text ? (forwardingMessage.text.substring(0, 50) + (forwardingMessage.text.length > 50 ? '...' : '')) : '📷 Фото';
            
            const payload = {
                userId: currentUser.uid,
                username: myUsername,
                text: forwardingMessage.text || '',
                timestamp: ts,
                readBy: {},
                forwarded: true,
                originalAuthor: forwardingMessage.username,
                forwardedFrom: chatMode === 'dm' ? 'личный чат' : 'группа'
            };
            
            if (forwardingMessage.imageUrl) {
                payload.imageUrl = forwardingMessage.imageUrl;
            }
            
            try {
                if (targetChat.type === 'dm' && targetChat.userId) {
                    const dmChatId = dmChatId(currentUser.uid, targetChat.userId);
                    await db.collection('chats').doc(dmChatId).collection('messages').add(payload);
                    
                    await db.collection('users').doc(currentUser.uid).collection('chats').doc(targetChat.userId).update({
                        lastMessage: '📎 Пересланное: ' + preview,
                        lastMessageTime: ts,
                        unreadCount: 0
                    });
                    
                    await db.collection('users').doc(targetChat.userId).collection('chats').doc(currentUser.uid).update({
                        lastMessage: '📎 Пересланное: ' + preview,
                        lastMessageTime: ts,
                        unreadCount: firebase.firestore.FieldValue.increment(1)
                    });
                } 
                else if (targetChat.type === 'group' && targetChat.groupId) {
                    await db.collection('groups').doc(targetChat.groupId).collection('messages').add(payload);
                    await updateGroupPreviews(targetChat.groupId, '📎 Пересланное: ' + preview);
                }
                
                showSuccess('Сообщение переслано');
                closeForwardModal();
            } catch (e) {
                console.error('Ошибка пересылки:', e);
                showError('Не удалось переслать сообщение');
            }
        }

        function closeForwardModal() {
            forwardingMessage = null;
            document.getElementById('modalForward').classList.add('hidden');
        }

        async function loadMyProfile() {
            try {
                const doc = await db.collection('users').doc(currentUser.uid).get();
                if (doc.exists) {
                    myUserData = doc.data();
                    myUsername = myUserData.username || currentUser.displayName || 'anon';
                }
            } catch (e) { console.error(e); }

        function loadChatsListener() {
            if (unsubscribeChats) unsubscribeChats();
            
            unsubscribeChats = db.collection('users').doc(currentUser.uid)
                .collection('chats')
                .orderBy('lastMessageTime', 'desc')
                .onSnapshot((snap) => {
                    chats = [];
                    chatsList.innerHTML = '';
                    
                    const userIds = [];
                    snap.forEach((doc) => {
                        const chatData = { id: doc.id, ...doc.data() };
                        chats.push(chatData);
                        if (chatData.type === 'dm' && chatData.userId) {
                            userIds.push(chatData.userId);
                        }
                    });
                    
                    if (userIds.length > 0) subscribeToUserStatuses(userIds);
                    
                    if (snap.empty) {
                        emptyChats.classList.remove('hidden');
                        chatsList.innerHTML = '<div class="empty">📭 Нет чатов</div>';
                        return;
                    }
                    
                    emptyChats.classList.add('hidden');
                    chats.forEach((chatData) => renderChatRow(chatData));
                    filterChatsLocal();
                }, (err) => { showError('Не удалось загрузить чаты'); });
        }

        function refreshChatsListUI() {
            const items = chatsList.querySelectorAll('.chat-item');
            items.forEach((item, idx) => {
                const chat = chats[idx];
                if (chat && chat.type === 'dm' && chat.userId && blockedUsers.has(chat.userId)) {
                    item.classList.add('blocked');
                } else if (chat && chat.type === 'dm' && chat.userId) {
                    item.classList.remove('blocked');
                }
                
                if (chat && chat.type === 'dm' && chat.userId) {
                    const status = userStatuses.get(chat.userId);
                    const dot = item.querySelector('.status-dot');
                    if (dot && status) {
                        dot.className = 'status-dot' + (status.online ? ' online' : '');
                    }
                }
            });
        }

        async function renderChatRow(chat) {
            const el = document.createElement('div');
            const unread = (chat.unreadCount || 0) > 0;
            const isBlocked = chat.type === 'dm' && chat.userId && blockedUsers.has(chat.userId);
            el.className = 'chat-item' + (unread ? ' unread' : '') + (isBlocked ? ' blocked' : '');
            
            const isGroup = chat.type === 'group';
            const title = isGroup ? (chat.name || 'группа') : (chat.username || 'Пользователь');
            const avatar = isGroup
                ? `https://ui-avatars.com/api/?name=${encodeURIComponent(title)}&background=5c3d8c&color=f5e6ff&bold=true&size=88`
                : (chat.peerAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(title)}&background=5c3d8c&color=f5e6ff&size=88`);
            const when = chat.lastMessageTime && chat.lastMessageTime.toDate ? formatTime(chat.lastMessageTime.toDate()) : '';
            const preview = chat.lastMessage || '—';
            
            let statusHtml = '';
            let status = null;
            if (!isGroup && chat.userId) {
                status = userStatuses.get(chat.userId);
                statusHtml = `<div class="status-dot ${status?.online ? 'online' : ''}"></div>`;
            }
            
            el.innerHTML = `
                <div class="avatar-wrapper">
                    <img class="avatar" src="${escapeHtml(avatar)}" alt="" data-user-id="${!isGroup ? chat.userId : ''}">
                    ${statusHtml}
                </div>
                <div class="chat-info" data-user-id="${!isGroup ? chat.userId : ''}">
                    <div class="chat-name">${escapeHtml(title)}${isBlocked ? ' 🚫' : ''}${isGroup ? ' <span class="mono" style="font-size:11px;">👥</span>' : ''}</div>
                    <div class="chat-preview">${escapeHtml(preview.length > 50 ? preview.substring(0, 50) + '...' : preview)}</div>
                </div>
                <div class="chat-meta">
                    <div>${escapeHtml(when)}</div>
                    ${unread ? `<div class="badge-unread">${chat.unreadCount}</div>` : ''}
                </div>
            `;
            
            const avatarImg = el.querySelector('.avatar');
            if (!isGroup && chat.userId) {
                avatarImg.addEventListener('click', (e) => {
                    e.stopPropagation();
                    goToUserProfile(chat.userId);
                });
            }
            
            el.addEventListener('click', (e) => {
                if (e.target === avatarImg || avatarImg.contains(e.target)) return;
                if (chat.type === 'group') {
                    openGroupChat(chat.groupId || chat.id, chat);
                } else {
                    openDMChat(chat.userId || chat.id, { 
                        username: chat.username, 
                        avatar: chat.peerAvatar,
                        userHandle: chat.userHandle 
                    });
                }
            });
            
            chatsList.appendChild(el);
        }

        function filterChatsLocal() {
            const q = searchInput.value.trim().toLowerCase();
            const items = chatsList.querySelectorAll('.chat-item');
            items.forEach((node, i) => {
                const chat = chats[i];
                if (!chat) return;
                if (!q) {
                    node.style.display = 'flex';
                    return;
                }
                const title = (chat.type === 'group' ? chat.name : chat.username) || '';
                node.style.display = title.toLowerCase().includes(q) ? 'flex' : 'none';
            });
        }

        searchInput.addEventListener('input', () => {
            userSearchWrap.classList.add('hidden');
            filterChatsLocal();
        });

        async function runUserSearch() {
            const raw = searchInput.value.trim();
            if (!raw) { userSearchWrap.classList.add('hidden'); return; }
            
            const isHandleQuery = raw.startsWith('$');
            userSearchWrap.innerHTML = '<div class="loading-spinner">🔍 Поиск...</div>';
            userSearchWrap.classList.remove('hidden');
            
            try {
                if (isHandleQuery) {
                    if (!/^\$[A-Za-z0-9_]{2,20}$/.test(raw)) {
                        userSearchWrap.innerHTML = '<div class="empty">❌ Неверный формат юза</div>';
                        return;
                    }
                    const norm = raw.slice(1).toLowerCase();
                    const hDoc = await db.collection('handles').doc(norm).get();
                    if (!hDoc.exists) { userSearchWrap.innerHTML = '<div class="empty">🔍 Юз не найден</div>'; return; }
                    const peerId = hDoc.data().uid;
                    if (peerId === currentUser.uid) { userSearchWrap.innerHTML = '<div class="empty">👤 Это вы</div>'; return; }
                    const uDoc = await db.collection('users').doc(peerId).get();
                    renderSearchResult(peerId, uDoc.data());
                    return;
                }
                
                let snap = await db.collection('users')
                    .where('usernameLower', '>=', raw.toLowerCase())
                    .where('usernameLower', '<=', raw.toLowerCase() + '\uf8ff')
                    .limit(20).get();
                
                if (snap.empty) {
                    snap = await db.collection('users')
                        .where('username', '>=', raw)
                        .where('username', '<=', raw + '\uf8ff')
                        .limit(20).get();
                }
                
                userSearchWrap.innerHTML = '';
                if (snap.empty) { userSearchWrap.innerHTML = '<div class="empty">🔍 Никого не найдено</div>'; return; }
                
                snap.forEach((doc) => {
                    if (doc.id !== currentUser.uid) renderSearchResult(doc.id, doc.data());
                });
            } catch (e) { showError('Ошибка поиска'); }
        }

        function renderSearchResult(userId, userData) {
            const name = userData.username || 'anon';
            const avatar = userData.avatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(name)}&background=5c3d8c&color=f5e6ff&size=88`;
            const handle = userData.userHandle || ('$' + (userData.usernameLower || name.toLowerCase()));
            const isBlocked = blockedUsers.has(userId);
            
            const row = document.createElement('div');
            row.className = 'chat-item';
            row.innerHTML = `
                <div class="avatar-wrapper"><img class="avatar" src="${escapeHtml(avatar)}" alt=""></div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(name)}${isBlocked ? ' 🚫' : ''}</div>
                    <div class="chat-preview">${escapeHtml(handle)}</div>
                </div>
                <button type="button" class="small" style="background: var(--green);">💬 написать</button>
            `;
            const btn = row.querySelector('button');
            btn.onclick = (e) => { e.stopPropagation(); startDMWith(userId, userData); };
            row.onclick = () => startDMWith(userId, userData);
            userSearchWrap.appendChild(row);
        }

        async function startDMWith(peerId, peerProfile) {
            userSearchWrap.classList.add('hidden');
            if (blockedUsers.has(peerId)) {
                showError('Вы заблокировали этого пользователя');
                return;
            }
            
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            try {
                const myChatData = {
                    type: 'dm', userId: peerId, username: peerProfile.username || 'Пользователь',
                    peerAvatar: peerProfile.avatar || '', userHandle: peerProfile.userHandle || '',
                    lastMessage: '', lastMessageTime: ts, unreadCount: 0
                };
                const peerChatData = {
                    type: 'dm', userId: currentUser.uid, username: myUsername,
                    peerAvatar: myUserData?.avatar || '', userHandle: myUserData?.userHandle || '',
                    lastMessage: '', lastMessageTime: ts, unreadCount: 0
                };
                await db.collection('users').doc(currentUser.uid).collection('chats').doc(peerId).set(myChatData);
                await db.collection('users').doc(peerId).collection('chats').doc(currentUser.uid).set(peerChatData);
                showSuccess('Чат создан!');
                openDMChat(peerId, { username: peerProfile.username, avatar: peerProfile.avatar, userHandle: peerProfile.userHandle });
            } catch (e) { showError('Не удалось создать чат'); }
        }

        function openDMChat(userId, userData) {
            chatMode = 'dm';

            dmPeerProfile = userData;

            chatTitle.textContent = userData.username || 'Чат';

            showChatShell();

        async function clearUnreadDM(uid) {
            try { await db.collection('users').doc(currentUser.uid).collection('chats').doc(uid).update({ unreadCount: 0 }); } catch(e) {}
        }

        function dmChatId(a, b) { return [a, b].sort().join('_'); }

        async function markMessagesAsRead(chatId) {
            try {
                const messagesRef = db.collection('chats').doc(chatId).collection('messages');
                const unreadMessages = await messagesRef.where('userId', '!=', currentUser.uid).get();
                const batch = db.batch();
                unreadMessages.forEach(doc => {
                    if (!doc.data().readBy?.[currentUser.uid]) {
                        batch.update(doc.ref, { [`readBy.${currentUser.uid}`]: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                });
                await batch.commit();
            } catch(e) {}
        }

        function subscribeMessagesDM(peerId) {
            if (unsubscribeMessages) unsubscribeMessages();
            const chatId = dmChatId(currentUser.uid, peerId);
            messagesEl.innerHTML = '<div class="empty">💬 Загрузка сообщений...</div>';
            
            unsubscribeMessages = db.collection('chats').doc(chatId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot(async (snap) => {
                    messagesEl.innerHTML = '';
                    if (snap.empty) { messagesEl.innerHTML = '<div class="empty">💭 Нет сообщений</div>'; return; }
                    snap.forEach((doc) => renderMessageDoc(doc.data(), doc.id, chatId));
                    await markMessagesAsRead(chatId);
                    scrollBottom();
                }, (e) => { showError('Не удалось загрузить переписку'); });

        function subscribeMessagesGroup(gid) {

        function renderMessageDoc(message, msgId, chatId = null) {
            const div = document.createElement('div');
            const isOwn = message.userId === currentUser.uid;
            div.className = 'msg' + (isOwn ? ' own' : '') + (message.edited ? ' edited' : '');
            
            const ts = message.timestamp?.toDate ? message.timestamp.toDate() : new Date();
            const timeStr = formatTime(ts);
            const fullTime = formatFullDate(ts);
            const uname = escapeHtml(message.username || 'anon');
            
            let statusHtml = '';
            if (chatId && isOwn) {
                const readBy = message.readBy || {};
                const isRead = Object.keys(readBy).length > 1;
                statusHtml = `<span class="msg-status"><span class="${isRead ? 'read' : 'delivered'}">${isRead ? '✓✓' : '✓'}</span></span>`;
            }
            
            let body = '';
            if (message.text) {
                body = escapeHtml(message.text).replace(/\n/g, '<br>');
            }
            if (message.imageUrl) {
                body += (body ? '<br>' : '') + `<img src="${escapeHtml(message.imageUrl)}" alt="📷 фото" loading="lazy" onclick="window.open('${escapeHtml(message.imageUrl)}', '_blank')">`;
            }
            if (message.forwarded) {
                body = `<span style="color:#b47aff;font-size:11px;">📎 Переслано из ${escapeHtml(message.forwardedFrom || 'чата')} от ${escapeHtml(message.originalAuthor || 'пользователя')}</span><br>${body}`;
            }
            
            div.innerHTML = `
                <div class="msg-head">
                    <span class="msg-user" data-user-id="${message.userId}">${uname}</span>
                    <span class="msg-time" title="${fullTime}">${timeStr}${statusHtml}${message.edited ? ' ✏️' : ''}</span>
                </div>
                <div class="msg-body">${body || '<i>📎 Вложение</i>'}</div>
                <div class="msg-actions">
                    ${isOwn ? `<button onclick="openEditModal('${msgId}', ${JSON.stringify(escapeHtml(message.text || ''))})" class="small" title="Редактировать">✏️</button>` : ''}
                    <button onclick="openForwardModal(${JSON.stringify({ text: message.text || '', imageUrl: message.imageUrl || null, username: uname }).replace(/"/g, '&quot;')})" class="small" title="Переслать">📎</button>
                    <button onclick="deleteMessage('${msgId}', ${JSON.stringify(message)})" class="small danger" title="Удалить">🗑️</button>
                </div>
            `;
            
            const msgUserSpan = div.querySelector('.msg-user');
            if (msgUserSpan && message.userId) {
                msgUserSpan.onclick = () => goToUserProfile(message.userId);
            }
            
            messagesEl.appendChild(div);
        }

        function showChatShell() {
            listMain.classList.add('hidden');
            chatMain.classList.remove('hidden');
            screenTitle.textContent = 'YzFi · 💬';
            messageInput.value = '';
            setTimeout(() => messageInput.focus(), 200);
        }

        function backToList() {
            if (unsubscribeMessages) { unsubscribeMessages(); unsubscribeMessages = null; }
            chatMode = null;
            dmPeerId = null;
            groupIdOpen = null;
            chatMain.classList.add('hidden');
            listMain.classList.remove('hidden');
            screenTitle.textContent = 'YzFi';
            messagesEl.innerHTML = '';
            lastUploadedImage = null;
        }

        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendNow(); }
        });

        async function sendNow() {
            if (isSending) return;
            if (chatMode === 'dm' && blockedUsers.has(dmPeerId)) {
                showError('Вы не можете отправлять сообщения заблокированному пользователю');
                return;
            }
            
            const text = messageInput.value.trim();
            if (!text && !lastUploadedImage) return;

            isSending = true;
            const imageToSend = lastUploadedImage;
            const textToSend = text;
            messageInput.value = '';
            lastUploadedImage = null;

            const ts = firebase.firestore.FieldValue.serverTimestamp();
            const currentUsername = myUserData?.username || myUsername || currentUser.displayName || 'anon';
            const payload = { userId: currentUser.uid, username: currentUsername, text: textToSend || '', timestamp: ts, readBy: {} };
            if (imageToSend) payload.imageUrl = imageToSend;
            const preview = textToSend || (imageToSend ? '📷 Фото' : '');

            try {
                if (chatMode === 'dm') {
                    const chatId = dmChatId(currentUser.uid, dmPeerId);
                    await db.collection('chats').doc(chatId).collection('messages').add(payload);
                    await db.collection('users').doc(currentUser.uid).collection('chats').doc(dmPeerId).update({ lastMessage: preview, lastMessageTime: ts, unreadCount: 0 });
                    await db.collection('users').doc(dmPeerId).collection('chats').doc(currentUser.uid).update({ lastMessage: preview, lastMessageTime: ts, unreadCount: firebase.firestore.FieldValue.increment(1) });
                } 
                else if (chatMode === 'group') {
                    await db.collection('groups').doc(groupIdOpen).collection('messages').add(payload);
                    await updateGroupPreviews(groupIdOpen, preview);
                }
                scrollBottom();
            } catch (e) { showError('Не удалось отправить'); if (textToSend) messageInput.value = textToSend; if (imageToSend) lastUploadedImage = imageToSend; }
            finally { isSending = false; }
        }

        async function updateGroupPreviews(gid, preview) {
            const gdoc = await db.collection('groups').doc(gid).get();
            if (!gdoc.exists) return;
            const groupData = gdoc.data();
            const members = groupData.memberIds || [];
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            for (const uid of members) {
                const chatRef = db.collection('users').doc(uid).collection('chats').doc(gid);
                const updateData = { type: 'group', groupId: gid, name: groupData.name, inviteCode: groupData.inviteCode, lastMessage: preview, lastMessageTime: ts };
                if (uid === currentUser.uid) await chatRef.set({ ...updateData, unreadCount: 0 }, { merge: true });
                else { await chatRef.set(updateData, { merge: true }); await chatRef.update({ unreadCount: firebase.firestore.FieldValue.increment(1) }); }
            }
        }

        function pickImage() { document.getElementById('imageInput').click(); }

        let isUploading = false;
        document.getElementById('imageInput').addEventListener('change', async function () {
            const file = this.files?.[0];
            this.value = '';
            if (!file) return;
            if (isUploading) { showError('Подождите'); return; }
            if (file.size > 5 * 1024 * 1024) { showError('Файл больше 5 МБ'); return; }
            isUploading = true;
            showSuccess('Загрузка фото...');
            const fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch('https://api.imgbb.com/1/upload?key=' + IMGBB_API_KEY, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) { lastUploadedImage = data.data.url; sendNow(); }
                else showError('imgBB: ' + (data.error?.message || 'ошибка'));
            } catch (e) { showError('Не удалось загрузить фото'); }
            finally { isUploading = false; }
        });

        function randomInvite() { const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; let code = ''; for (let i = 0; i < 8; i++) code += chars[Math.floor(Math.random() * chars.length)]; return code; }
        function openCreateGroupModal() { document.getElementById('newGroupName').value = ''; document.getElementById('customGroupCode').value = ''; document.querySelector('input[name="codeMode"][value="random"]').checked = true; document.getElementById('customGroupCode').classList.add('hidden'); document.getElementById('modalCreate').classList.remove('hidden'); }
        function openJoinModal() { document.getElementById('joinCodeInput').value = ''; document.getElementById('modalJoin').classList.remove('hidden'); }
        function closeModals() { document.getElementById('modalCreate').classList.add('hidden'); document.getElementById('modalJoin').classList.add('hidden'); }
        document.querySelectorAll('input[name="codeMode"]').forEach(r => { r.addEventListener('change', () => { document.getElementById('customGroupCode').classList.toggle('hidden', document.querySelector('input[name="codeMode"]:checked').value !== 'custom'); }); });
        async function submitCreateGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) { showError('Введите название'); return; }
            const mode = document.querySelector('input[name="codeMode"]:checked').value;
            let inviteCode = mode === 'random' ? randomInvite() : document.getElementById('customGroupCode').value.trim();
            if (mode === 'custom' && !/^\$[A-Za-z0-9_]{2,20}$/.test(inviteCode)) { showError('Код должен быть в формате $ник'); return; }
            const norm = inviteCode.toLowerCase();
            const existing = await db.collection('groups').where('inviteCodeNorm', '==', norm).limit(1).get();
            if (!existing.empty) { showError('Такой код уже существует'); return; }
            const groupRef = db.collection('groups').doc();
            const gid = groupRef.id;
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            await groupRef.set({ name, inviteCode, inviteCodeNorm: norm, ownerId: currentUser.uid, memberIds: [currentUser.uid], createdAt: ts, updatedAt: ts });
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(gid).set({ type: 'group', groupId: gid, name, inviteCode, lastMessage: '', lastMessageTime: ts, unreadCount: 0 });
            closeModals();
            showSuccess('Группа создана!');
            openGroupChat(gid, { type: 'group', groupId: gid, name, inviteCode, memberIds: [currentUser.uid] });
        }
        async function submitJoinGroup() {
            let code = document.getElementById('joinCodeInput').value.trim();
            if (!code) { showError('Введите код'); return; }
            const norm = code.toLowerCase();
            const snap = await db.collection('groups').where('inviteCodeNorm', '==', norm).limit(1).get();
            if (snap.empty) { showError('Группа не найдена'); return; }
            const groupDoc = snap.docs[0]; const gid = groupDoc.id; const groupData = groupDoc.data();
            const isMember = groupData.memberIds?.includes(currentUser.uid);
            if (!isMember) await db.collection('groups').doc(gid).update({ memberIds: firebase.firestore.FieldValue.arrayUnion(currentUser.uid), updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(gid).set({ type: 'group', groupId: gid, name: groupData.name, inviteCode: groupData.inviteCode, lastMessage: '', lastMessageTime: ts, unreadCount: 0 }, { merge: true });
            closeModals();
            showSuccess('Вы вступили в группу!');
            openGroupChat(gid, { type: 'group', groupId: gid, name: groupData.name, inviteCode: groupData.inviteCode, memberIds: groupData.memberIds || [currentUser.uid] });
        }

        window.goProfile = goProfile;
        window.goToLenta = goToLenta;
        window.goToUserProfile = goToUserProfile;
        window.runUserSearch = runUserSearch;
        window.openCreateGroupModal = openCreateGroupModal;
        window.openJoinModal = openJoinModal;
        window.closeModals = closeModals;
        window.submitCreateGroup = submitCreateGroup;
        window.submitJoinGroup = submitJoinGroup;
        window.backToList = backToList;
        window.sendNow = sendNow;
        window.pickImage = pickImage;
        window.clearChat = clearChat;
        window.toggleBlockUser = toggleBlockUser;
        window.deleteMessage = deleteMessage;
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.submitEditMessage = submitEditMessage;
        window.openForwardModal = openForwardModal;
        window.closeForwardModal = closeForwardModal;

        window.onload = init;
    </script>
</body>
</html>
