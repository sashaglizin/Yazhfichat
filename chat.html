<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#2d1b4e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>YzFi — чаты</title>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    <style>
        :root {
            --bg: #1a0f2e;
            --bg-light: #2a1a45;
            --panel: #2d1b4e;
            --panel2: #3d2666;
            --cream: #f5e6ff;
            --text: #e8d5f2;
            --text-muted: #b9a0d4;
            --green: #7fdb8a;
            --accent: #b47aff;
            --header: #4a2f7a;
            --border: #110822;
            --shadow: rgba(0,0,0,.35);
            --online: #2ecc71;
            --offline: #7f8c8d;
            --danger: #c44;
            --warning: #f39c12;
            --success: #2ecc71;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; height: 100dvh; }
        body {
            font-family: Tahoma, "MS Sans Serif", Arial, sans-serif;
            font-size: 15px;
            line-height: 1.45;
            background: var(--bg);
            color: var(--text);
            padding: env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
            -webkit-tap-highlight-color: transparent;
        }
        .app { max-width: 520px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }
        
        .header {
            flex-shrink: 0;
            background: linear-gradient(180deg, var(--header) 0%, var(--panel) 100%);
            border: 2px solid var(--border);
            border-radius: 0 0 8px 8px;
            padding: 10px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            position: sticky;
            top: 0;
            z-index: 50;
            box-shadow: 0 4px 0 var(--border);
        }
        .header-title {
            flex: 1;
            text-align: center;
            font-weight: bold;
            font-size: 1.15rem;
            color: var(--cream);
            text-shadow: 1px 1px 0 var(--border);
        }
        .header-actions { display: flex; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
        
        button, .btn {
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
            border: 2px solid var(--border);
            border-radius: 4px;
            padding: 10px 12px;
            cursor: pointer;
            background: var(--accent);
            color: #1a0f2e;
            box-shadow: 2px 2px 0 var(--border);
            touch-action: manipulation;
            transition: all 0.05s ease;
        }
        button:active { transform: translate(1px, 1px); box-shadow: 1px 1px 0 var(--border); }
        button.secondary { background: var(--panel2); color: var(--cream); }
        button.small { padding: 8px 10px; font-size: 13px; }
        button.danger { background: var(--danger); color: #fff; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        
        .main { flex: 1; display: flex; flex-direction: column; padding: 10px; min-height: 0; }
        .panel {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 10px;
            box-shadow: 3px 3px 0 var(--shadow);
        }
        
        .search-row { display: flex; gap: 8px; margin-bottom: 10px; }
        input[type="text"], input[type="search"], textarea {
            flex: 1;
            min-width: 0;
            padding: 12px 14px;
            font-size: 16px;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: var(--cream);
            color: #1a0f2e;
        }
        
        .chats-list, .user-search-list {
            max-height: min(52vh, 420px);
            overflow-y: auto;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: #12081f;
        }
        
        .chat-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 12px;
            border-bottom: 1px solid #2a1a45;
            transition: background 0.1s ease;
            cursor: pointer;
        }
        .chat-item:hover { background: var(--panel2); }
        .chat-item.unread { border-left: 4px solid var(--accent); background: #251840; }
        .chat-item:last-child { border-bottom: none; }
        
        .avatar-wrapper { position: relative; flex-shrink: 0; }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 4px;
            object-fit: cover;
            border: 2px solid var(--border);
            cursor: pointer;
        }
        .status-dot {
            position: absolute;
            bottom: 2px;
            right: 2px;
            width: 12px;
            height: 12px;
            border-radius: 50%;
            border: 2px solid var(--border);
            background: var(--offline);
        }
        .status-dot.online { background: var(--online); }
        
        .chat-info { flex: 1; min-width: 0; }
        .chat-name { font-weight: bold; color: var(--green); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-preview { font-size: 13px; color: #b9a0d4; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .chat-meta { text-align: right; font-size: 12px; color: #8a739e; flex-shrink: 0; }
        .badge-unread {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-width: 22px;
            height: 22px;
            padding: 0 6px;
            background: var(--accent);
            color: #1a0f2e;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            margin-top: 4px;
        }
        
        .group-actions { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
        .hidden { display: none !important; }
        .empty { text-align: center; padding: 32px 16px; color: #8a739e; }
        .empty strong { color: var(--green); display: block; margin-bottom: 8px; }
        
        .error-toast, .success-toast {
            position: fixed;
            left: 12px;
            right: 12px;
            bottom: max(16px, env(safe-area-inset-bottom));
            padding: 12px;
            border-radius: 6px;
            z-index: 200;
            font-size: 14px;
            box-shadow: 4px 4px 0 var(--border);
        }
        .error-toast { background: #5a1a1a; border: 2px solid var(--border); color: #ffcccc; }
        .success-toast { background: #1a5a2a; border: 2px solid var(--border); color: #ccffcc; }
        
        .chat-view .chat-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 8px;
            flex-shrink: 0;
            flex-wrap: wrap;
        }
        .chat-view .chat-header .title {
            flex: 1;
            font-weight: bold;
            color: var(--cream);
            font-size: 15px;
            cursor: pointer;
        }
        
        .messages {
            flex: 1;
            min-height: 200px;
            max-height: min(55vh, 520px);
            overflow-y: auto;
            border: 2px solid var(--border);
            border-radius: 4px;
            background: #12081f;
            padding: 10px;
            margin-bottom: 10px;
        }
        
        .msg {
            margin-bottom: 14px;
            padding: 8px;
            border-radius: 4px;
            background: #1a0f2e;
            position: relative;
            transition: background 0.2s ease;
        }
        .msg:hover { background: #251840; }
        .msg-head { display: flex; justify-content: space-between; gap: 8px; font-size: 13px; margin-bottom: 6px; flex-wrap: wrap; }
        .msg-user { color: var(--green); font-weight: bold; cursor: pointer; }
        .msg-time { color: #8a739e; flex-shrink: 0; }
        .msg-body { color: var(--text); word-break: break-word; }
        .msg-body img { max-width: 100%; max-height: 280px; object-fit: contain; border: 2px solid var(--border); border-radius: 4px; margin-top: 6px; display: block; }
        
        .composer { flex-shrink: 0; display: flex; flex-direction: column; gap: 8px; padding-top: 4px; background: var(--bg); }
        .composer-row { display: flex; gap: 8px; }
        .composer-row input[type="text"] { flex: 1; }
        
        .image-preview-container { position: relative; display: inline-block; width: fit-content; margin-bottom: 8px; }
        .image-preview-img { max-height: 80px; border-radius: 4px; border: 2px solid var(--border); }
        .remove-image-btn {
            position: absolute;
            top: -8px;
            right: -8px;
            background: var(--danger);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            padding: 0;
            font-size: 14px;
            line-height: 1;
            box-shadow: 1px 1px 0 var(--border);
        }
        
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,.85);
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 12px;
        }
        .modal {
            background: var(--panel);
            border: 2px solid var(--border);
            border-radius: 8px;
            width: 100%;
            max-width: 400px;
            max-height: 90dvh;
            overflow-y: auto;
            padding: 16px;
            box-shadow: 6px 6px 0 var(--border);
        }
        .modal h3 { color: var(--cream); margin-bottom: 12px; }
        .modal .field { margin-bottom: 12px; }
        .modal label { display: block; font-size: 12px; color: #b9a0d4; margin-bottom: 4px; }
        
        .typing-indicator { font-size: 11px; color: var(--accent); margin-left: 8px; animation: pulse 1s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        
        .spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #fff;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app">
        <header class="header">
            <div class="header-title" id="screenTitle">YzFi</div>
            <div class="header-actions">
                <button type="button" class="small secondary" onclick="goToLenta()">📸 лента</button>
                <button type="button" class="small secondary" onclick="goProfile()">👤 я</button>
            </div>
        </header>

        <main class="main" id="listMain">
            <div class="panel">
                <div class="search-row">
                    <input type="search" id="searchInput" placeholder="🔍 Поиск по нику или $юз..." autocomplete="off">
                    <button type="button" class="small" onclick="runUserSearch()">найти</button>
                </div>
                <div id="userSearchWrap" class="user-search-list hidden"></div>
                <div class="group-actions">
                    <button type="button" class="secondary" onclick="openCreateGroupModal()">➕ группа</button>
                    <button type="button" class="secondary" onclick="openJoinModal()">🔑 войти по коду</button>
                </div>
            </div>
            <div class="chats-list" id="chatsList"><div class="empty">⏳ Загрузка...</div></div>
        </main>

        <main class="main chat-view hidden" id="chatMain">
            <div class="panel chat-header">
                <button type="button" class="small secondary" onclick="backToList()">←</button>
                <div class="title" id="chatTitle">чат</div>
                <span id="chatExtra" class="mono" style="font-size:12px;color:#b9a0d4;"></span>
                <button type="button" class="small secondary" onclick="openChatSettings()">⚙️</button>
            </div>
            <div class="messages" id="messagesEl"></div>
            <div class="composer">
                <div id="imagePreviewContainer" class="hidden image-preview-container">
                    <img id="previewImage" class="image-preview-img" alt="preview">
                    <button type="button" id="removeImageBtn" class="remove-image-btn" onclick="removeAttachedImage()">✕</button>
                </div>
                <div class="composer-row">
                    <input type="text" id="messageInput" placeholder="💬 Сообщение..." maxlength="2000" autocomplete="off">
                    <button type="button" id="sendBtn" onclick="sendNow()">📤</button>
                    <button type="button" class="secondary" onclick="pickImage()">🖼️</button>
                </div>
                <input type="file" id="imageInput" accept="image/*" class="hidden">
            </div>
        </main>
    </div>

    <div id="modalCreate" class="modal-overlay hidden" onclick="if(event.target===this) closeModals()">
        <div class="modal">
            <h3>✨ Создать группу</h3>
            <div class="field"><label>📛 Название</label><input type="text" id="newGroupName" maxlength="40"></div>
            <div class="field"><label>🔑 Код (оставьте пустым для случайного)</label><input type="text" id="groupCode" maxlength="20" placeholder="например: $mycrew"></div>
            <div class="composer-row"><button onclick="submitCreateGroup()">✅ создать</button><button class="secondary" onclick="closeModals()">❌</button></div>
        </div>
    </div>

    <div id="modalJoin" class="modal-overlay hidden" onclick="if(event.target===this) closeModals()">
        <div class="modal">
            <h3>🔓 Войти по коду</h3>
            <div class="field"><label>🔑 Код группы</label><input type="text" id="joinCodeInput" maxlength="32"></div>
            <div class="composer-row"><button onclick="submitJoinGroup()">✅ войти</button><button class="secondary" onclick="closeModals()">❌</button></div>
        </div>
    </div>

    <div id="modalChatSettings" class="modal-overlay hidden" onclick="if(event.target===this) closeModals()">
        <div class="modal">
            <h3>⚙️ Настройки</h3>
            <div class="field"><button class="danger" style="width:100%" onclick="clearChat()">🗑️ Очистить чат</button></div>
            <div class="composer-row"><button class="secondary" onclick="closeModals()">Закрыть</button></div>
        </div>
    </div>

    <div id="errorToast" class="error-toast hidden"></div>
    <div id="successToast" class="success-toast hidden"></div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyC-xF1GL7G67XNJOiMUDchcLQRhXANsORk",
            authDomain: "hlypalka.firebaseapp.com",
            projectId: "hlypalka",
            storageBucket: "hlypalka.firebasestorage.app",
            messagingSenderId: "41063525028",
            appId: "1:41063525028:web:253e10e09ec8ff4cf75431"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();
        const IMGBB_API_KEY = '532c1a46efe25420841b8296f7eeed3f';

        let currentUser = null;
        let myUserData = null;
        let unsubscribeChats = null;
        let unsubscribeMessages = null;
        let chatMode = null; // 'dm' or 'group'
        let dmPeerId = null;
        let groupIdOpen = null;
        let lastUploadedImage = null;
        let isSending = false;

        function showError(msg) { const el = document.getElementById('errorToast'); el.textContent = '❌ ' + msg; el.classList.remove('hidden'); setTimeout(() => el.classList.add('hidden'), 4000); }
        function showSuccess(msg) { const el = document.getElementById('successToast'); el.textContent = '✅ ' + msg; el.classList.remove('hidden'); setTimeout(() => el.classList.add('hidden'), 3000); }
        function escapeHtml(s) { if (s == null) return ''; const div = document.createElement('div'); div.textContent = s; return div.innerHTML; }
        function formatTime(d) { if (!d) return ''; return d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }); }
        function scrollBottom() { setTimeout(() => { if (messagesEl) messagesEl.scrollTop = messagesEl.scrollHeight; }, 100); }
        function goProfile() { window.location.href = 'profil.html'; }
        function goToLenta() { window.location.href = 'lenta.html'; }
        function dmChatId(a, b) { return [a, b].sort().join('_'); }

        // ========== Отправка сообщений ==========
        async function sendMessage(text, imageUrl) {
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            const payload = {
                userId: currentUser.uid,
                username: myUserData?.username || 'Пользователь',
                text: text || '',
                timestamp: ts,
                readBy: { [currentUser.uid]: ts }
            };
            if (imageUrl) payload.imageUrl = imageUrl;
            
            const preview = text || (imageUrl ? '📷 Фото' : '');
            
            if (chatMode === 'dm') {
                const chatId = dmChatId(currentUser.uid, dmPeerId);
                const msgRef = await db.collection('chats').doc(chatId).collection('messages').add(payload);
                
                // Обновляем чат у отправителя (unreadCount = 0)
                await db.collection('users').doc(currentUser.uid).collection('chats').doc(dmPeerId).set({
                    type: 'dm',
                    userId: dmPeerId,
                    username: dmPeerProfile?.username || 'Пользователь',
                    peerAvatar: dmPeerProfile?.avatar || '',
                    userHandle: dmPeerProfile?.userHandle || '',
                    lastMessage: preview,
                    lastMessageTime: ts,
                    lastMessageId: msgRef.id,
                    unreadCount: 0,
                    updatedAt: ts
                }, { merge: true });
                
                // У получателя увеличиваем unreadCount
                const peerChatRef = db.collection('users').doc(dmPeerId).collection('chats').doc(currentUser.uid);
                const peerChatDoc = await peerChatRef.get();
                const currentUnread = peerChatDoc.exists ? (peerChatDoc.data().unreadCount || 0) : 0;
                await peerChatRef.set({
                    type: 'dm',
                    userId: currentUser.uid,
                    username: myUserData?.username || 'Пользователь',
                    peerAvatar: myUserData?.avatar || '',
                    userHandle: myUserData?.userHandle || '',
                    lastMessage: preview,
                    lastMessageTime: ts,
                    lastMessageId: msgRef.id,
                    unreadCount: currentUnread + 1,
                    updatedAt: ts
                }, { merge: true });
                
            } else if (chatMode === 'group') {
                const msgRef = await db.collection('groups').doc(groupIdOpen).collection('messages').add(payload);
                
                // Обновляем чат у всех участников группы
                const groupDoc = await db.collection('groups').doc(groupIdOpen).get();
                const memberIds = groupDoc.data()?.memberIds || [];
                
                for (const uid of memberIds) {
                    const chatRef = db.collection('users').doc(uid).collection('chats').doc(groupIdOpen);
                    if (uid === currentUser.uid) {
                        await chatRef.set({
                            type: 'group',
                            groupId: groupIdOpen,
                            name: groupDoc.data()?.name || 'Группа',
                            inviteCode: groupDoc.data()?.inviteCode || '',
                            lastMessage: preview,
                            lastMessageTime: ts,
                            lastMessageId: msgRef.id,
                            unreadCount: 0,
                            updatedAt: ts
                        }, { merge: true });
                    } else {
                        const currData = (await chatRef.get()).data();
                        const currUnread = currData?.unreadCount || 0;
                        await chatRef.set({
                            type: 'group',
                            groupId: groupIdOpen,
                            name: groupDoc.data()?.name || 'Группа',
                            inviteCode: groupDoc.data()?.inviteCode || '',
                            lastMessage: preview,
                            lastMessageTime: ts,
                            lastMessageId: msgRef.id,
                            unreadCount: currUnread + 1,
                            updatedAt: ts
                        }, { merge: true });
                    }
                }
            }
        }

        async function sendNow() {
            if (isSending) return;
            const text = messageInput.value.trim();
            if (!text && !lastUploadedImage) return;
            
            isSending = true;
            sendBtn.disabled = true;
            sendBtn.innerHTML = '<span class="spinner"></span>';
            
            const img = lastUploadedImage;
            const txt = text;
            messageInput.value = '';
            lastUploadedImage = null;
            removeAttachedImage();
            
            try {
                await sendMessage(txt, img);
                scrollBottom();
            } catch (e) {
                console.error(e);
                showError('Ошибка отправки: ' + e.message);
                if (txt) messageInput.value = txt;
                if (img) lastUploadedImage = img;
            } finally {
                isSending = false;
                sendBtn.disabled = false;
                sendBtn.innerHTML = '📤';
            }
        }

        // ========== Загрузка чатов ==========
        function loadChatsListener() {
            if (unsubscribeChats) unsubscribeChats();
            
            unsubscribeChats = db.collection('users').doc(currentUser.uid).collection('chats')
                .orderBy('updatedAt', 'desc')
                .onSnapshot((snap) => {
                    const chatsList = document.getElementById('chatsList');
                    chatsList.innerHTML = '';
                    
                    if (snap.empty) {
                        chatsList.innerHTML = '<div class="empty"><strong>✨ Нет чатов</strong><br>Найдите пользователя или создайте группу</div>';
                        return;
                    }
                    
                    snap.forEach(doc => {
                        const chat = { id: doc.id, ...doc.data() };
                        renderChatRow(chat);
                    });
                });
        }
        
        function renderChatRow(chat) {
            const chatsList = document.getElementById('chatsList');
            const isGroup = chat.type === 'group';
            const title = isGroup ? (chat.name || 'Группа') : (chat.username || 'Пользователь');
            const avatar = isGroup ? 
                `https://ui-avatars.com/api/?name=${encodeURIComponent(title)}&background=5c3d8c&color=f5e6ff&bold=true&size=88` : 
                (chat.peerAvatar || `https://ui-avatars.com/api/?name=${encodeURIComponent(title)}&background=5c3d8c&color=f5e6ff&size=88`);
            const time = chat.lastMessageTime?.toDate ? formatTime(chat.lastMessageTime.toDate()) : '';
            const preview = chat.lastMessage || 'Новое сообщение';
            const unread = (chat.unreadCount || 0) > 0;
            
            const el = document.createElement('div');
            el.className = 'chat-item' + (unread ? ' unread' : '');
            el.innerHTML = `
                <div class="avatar-wrapper">
                    <img class="avatar" src="${escapeHtml(avatar)}" alt="">
                    <div class="status-dot"></div>
                </div>
                <div class="chat-info">
                    <div class="chat-name">${escapeHtml(title)}${isGroup ? ' <span style="font-size:11px;">👥</span>' : ''}</div>
                    <div class="chat-preview">${escapeHtml(preview.length > 50 ? preview.substring(0,50)+'...' : preview)}</div>
                </div>
                <div class="chat-meta">
                    <div>${escapeHtml(time)}</div>
                    ${unread ? `<div class="badge-unread">${chat.unreadCount}</div>` : ''}
                </div>
            `;
            
            el.addEventListener('click', () => {
                if (isGroup) {
                    openGroupChat(chat.groupId || chat.id, { name: chat.name, inviteCode: chat.inviteCode });
                } else {
                    openDMChat(chat.userId, { username: chat.username, avatar: chat.peerAvatar, userHandle: chat.userHandle });
                }
            });
            
            chatsList.appendChild(el);
        }
        
        // ========== Открытие чатов ==========
        let dmPeerProfile = null;
        
        async function openDMChat(userId, userData) {
            chatMode = 'dm';
            dmPeerId = userId;
            dmPeerProfile = userData;
            groupIdOpen = null;
            
            chatTitle.textContent = userData.username || 'Чат';
            document.getElementById('chatExtra').textContent = userData.userHandle || '';
            document.getElementById('chatTitle').style.cursor = 'pointer';
            document.getElementById('chatTitle').onclick = () => goToUserProfile(userId);
            
            // Сбрасываем unreadCount при открытии
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(userId).update({
                unreadCount: 0
            }).catch(() => {});
            
            showChatShell();
            subscribeMessagesDM(userId);
        }
        
        async function openGroupChat(groupId, groupData) {
            chatMode = 'group';
            groupIdOpen = groupId;
            dmPeerId = null;
            
            chatTitle.textContent = groupData.name || 'Группа';
            document.getElementById('chatExtra').textContent = groupData.inviteCode ? `код: ${groupData.inviteCode}` : '';
            document.getElementById('chatTitle').style.cursor = 'default';
            document.getElementById('chatTitle').onclick = null;
            
            // Сбрасываем unreadCount при открытии
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(groupId).update({
                unreadCount: 0
            }).catch(() => {});
            
            showChatShell();
            subscribeMessagesGroup(groupId);
        }
        
        function showChatShell() {
            document.getElementById('listMain').classList.add('hidden');
            document.getElementById('chatMain').classList.remove('hidden');
            document.getElementById('screenTitle').textContent = 'YzFi · 💬';
            document.getElementById('messageInput').focus();
        }
        
        function backToList() {
            if (unsubscribeMessages) unsubscribeMessages();
            chatMode = null;
            document.getElementById('chatMain').classList.add('hidden');
            document.getElementById('listMain').classList.remove('hidden');
            document.getElementById('screenTitle').textContent = 'YzFi';
            document.getElementById('messagesEl').innerHTML = '';
            removeAttachedImage();
        }
        
        // ========== Подписка на сообщения ==========
        function subscribeMessagesDM(peerId) {
            if (unsubscribeMessages) unsubscribeMessages();
            const chatId = dmChatId(currentUser.uid, peerId);
            
            unsubscribeMessages = db.collection('chats').doc(chatId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snap) => {
                    const container = document.getElementById('messagesEl');
                    container.innerHTML = '';
                    if (snap.empty) {
                        container.innerHTML = '<div class="empty">💭 Нет сообщений. Напишите что-нибудь!</div>';
                        return;
                    }
                    snap.forEach(doc => renderMessage(doc.data(), doc.id));
                    scrollBottom();
                    
                    // Отмечаем сообщения как прочитанные
                    snap.forEach(async (doc) => {
                        const data = doc.data();
                        if (data.userId !== currentUser.uid && (!data.readBy || !data.readBy[currentUser.uid])) {
                            await doc.ref.update({ [`readBy.${currentUser.uid}`]: firebase.firestore.FieldValue.serverTimestamp() });
                        }
                    });
                });
        }
        
        function subscribeMessagesGroup(groupId) {
            if (unsubscribeMessages) unsubscribeMessages();
            
            unsubscribeMessages = db.collection('groups').doc(groupId).collection('messages')
                .orderBy('timestamp', 'asc')
                .onSnapshot((snap) => {
                    const container = document.getElementById('messagesEl');
                    container.innerHTML = '';
                    if (snap.empty) {
                        container.innerHTML = '<div class="empty">💭 Нет сообщений. Напишите что-нибудь!</div>';
                        return;
                    }
                    snap.forEach(doc => renderMessage(doc.data(), doc.id));
                    scrollBottom();
                    
                    snap.forEach(async (doc) => {
                        const data = doc.data();
                        if (data.userId !== currentUser.uid && (!data.readBy || !data.readBy[currentUser.uid])) {
                            await doc.ref.update({ [`readBy.${currentUser.uid}`]: firebase.firestore.FieldValue.serverTimestamp() });
                        }
                    });
                });
        }
        
        function renderMessage(msg, msgId) {
            const container = document.getElementById('messagesEl');
            const div = document.createElement('div');
            div.className = 'msg';
            
            const time = msg.timestamp?.toDate ? formatTime(msg.timestamp.toDate()) : '';
            const isOwn = msg.userId === currentUser.uid;
            
            let body = escapeHtml(msg.text || '');
            if (msg.imageUrl) body += `<br><img src="${escapeHtml(msg.imageUrl)}" alt="фото" loading="lazy">`;
            
            div.innerHTML = `
                <div class="msg-head">
                    <span class="msg-user" data-uid="${msg.userId}">${escapeHtml(msg.username)}</span>
                    <span class="msg-time">${time}</span>
                </div>
                <div class="msg-body">${body || '<i>📎 Вложение</i>'}</div>
            `;
            
            div.querySelector('.msg-user')?.addEventListener('click', () => {
                if (msg.userId === currentUser.uid) goProfile();
                else window.location.href = `users_profil.html?userId=${msg.userId}`;
            });
            
            container.appendChild(div);
        }
        
        // ========== Поиск пользователей ==========
        async function runUserSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const wrap = document.getElementById('userSearchWrap');
            if (!query) { wrap.classList.add('hidden'); return; }
            
            wrap.innerHTML = '<div class="empty">🔍 Поиск...</div>';
            wrap.classList.remove('hidden');
            
            try {
                let users = [];
                if (query.startsWith('$')) {
                    const norm = query.slice(1).toLowerCase();
                    const handleDoc = await db.collection('handles').doc(norm).get();
                    if (handleDoc.exists) {
                        const userDoc = await db.collection('users').doc(handleDoc.data().uid).get();
                        if (userDoc.exists && userDoc.id !== currentUser.uid) users.push({ id: userDoc.id, ...userDoc.data() });
                    }
                } else {
                    const snap = await db.collection('users')
                        .where('usernameLower', '>=', query.toLowerCase())
                        .where('usernameLower', '<=', query.toLowerCase() + '\uf8ff')
                        .limit(10)
                        .get();
                    snap.forEach(doc => { if (doc.id !== currentUser.uid) users.push({ id: doc.id, ...doc.data() }); });
                }
                
                if (users.length === 0) {
                    wrap.innerHTML = '<div class="empty">🔍 Никого не найдено</div>';
                    return;
                }
                
                wrap.innerHTML = '';
                for (const user of users) {
                    const div = document.createElement('div');
                    div.className = 'chat-item';
                    div.innerHTML = `
                        <div class="avatar-wrapper"><img class="avatar" src="${escapeHtml(user.avatar || `https://ui-avatars.com/api/?name=${user.username}&background=5c3d8c&color=f5e6ff&size=88`)}" alt=""></div>
                        <div class="chat-info"><div class="chat-name">${escapeHtml(user.username)}</div><div class="chat-preview">${escapeHtml(user.userHandle || '$'+user.username)}</div></div>
                        <button class="small" style="background:var(--green)">💬</button>
                    `;
                    div.addEventListener('click', () => startDM(user.id, user));
                    wrap.appendChild(div);
                }
            } catch(e) {
                console.error(e);
                wrap.innerHTML = '<div class="empty">❌ Ошибка поиска</div>';
            }
        }
        
        async function startDM(peerId, peerData) {
            document.getElementById('userSearchWrap').classList.add('hidden');
            document.getElementById('searchInput').value = '';
            
            const ts = firebase.firestore.FieldValue.serverTimestamp();
            
            // Создаем чат для себя
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(peerId).set({
                type: 'dm',
                userId: peerId,
                username: peerData.username,
                peerAvatar: peerData.avatar || '',
                userHandle: peerData.userHandle || '',
                lastMessage: '',
                lastMessageTime: ts,
                unreadCount: 0,
                updatedAt: ts
            }, { merge: true });
            
            // Создаем чат для собеседника
            await db.collection('users').doc(peerId).collection('chats').doc(currentUser.uid).set({
                type: 'dm',
                userId: currentUser.uid,
                username: myUserData?.username || 'Пользователь',
                peerAvatar: myUserData?.avatar || '',
                userHandle: myUserData?.userHandle || '',
                lastMessage: '',
                lastMessageTime: ts,
                unreadCount: 0,
                updatedAt: ts
            }, { merge: true });
            
            openDMChat(peerId, peerData);
        }
        
        // ========== Группы ==========
        function randomCode() { let r=''; const c='ABCDEFGHJKLMNPQRSTUVWXYZ23456789'; for(let i=0;i<8;i++) r+=c[Math.floor(Math.random()*c.length)]; return r; }
        
        function openCreateGroupModal() {
            document.getElementById('newGroupName').value = '';
            document.getElementById('groupCode').value = '';
            document.getElementById('modalCreate').classList.remove('hidden');
        }
        
        function openJoinModal() {
            document.getElementById('joinCodeInput').value = '';
            document.getElementById('modalJoin').classList.remove('hidden');
        }
        
        async function submitCreateGroup() {
            const name = document.getElementById('newGroupName').value.trim();
            if (!name) { showError('Введите название'); return; }
            
            let code = document.getElementById('groupCode').value.trim();
            if (!code) code = randomCode();
            if (code.startsWith('$')) code = code.slice(1);
            
            const existing = await db.collection('groups').where('inviteCode', '==', code).limit(1).get();
            if (!existing.empty) { showError('Код занят'); return; }
            
            const groupId = db.collection('groups').doc().id;
            await db.collection('groups').doc(groupId).set({
                name: name,
                inviteCode: code,
                ownerId: currentUser.uid,
                memberIds: [currentUser.uid],
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(groupId).set({
                type: 'group',
                groupId: groupId,
                name: name,
                inviteCode: code,
                lastMessage: '',
                lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                unreadCount: 0,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            
            closeModals();
            openGroupChat(groupId, { name: name, inviteCode: code });
        }
        
        async function submitJoinGroup() {
            let code = document.getElementById('joinCodeInput').value.trim();
            if (!code) { showError('Введите код'); return; }
            
            const snap = await db.collection('groups').where('inviteCode', '==', code).limit(1).get();
            if (snap.empty) { showError('Группа не найдена'); return; }
            
            const groupDoc = snap.docs[0];
            const groupId = groupDoc.id;
            const groupData = groupDoc.data();
            
            if (!groupData.memberIds.includes(currentUser.uid)) {
                await db.collection('groups').doc(groupId).update({
                    memberIds: firebase.firestore.FieldValue.arrayUnion(currentUser.uid)
                });
            }
            
            await db.collection('users').doc(currentUser.uid).collection('chats').doc(groupId).set({
                type: 'group',
                groupId: groupId,
                name: groupData.name,
                inviteCode: groupData.inviteCode,
                lastMessage: '',
                lastMessageTime: firebase.firestore.FieldValue.serverTimestamp(),
                unreadCount: 0,
                updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            
            closeModals();
            openGroupChat(groupId, groupData);
        }
        
        async function clearChat() {
            if (!confirm('Очистить историю сообщений в этом чате?')) return;
            try {
                if (chatMode === 'dm') {
                    const chatId = dmChatId(currentUser.uid, dmPeerId);
                    const msgs = await db.collection('chats').doc(chatId).collection('messages').get();
                    for (const msg of msgs.docs) await msg.ref.delete();
                    showSuccess('Чат очищен');
                } else if (chatMode === 'group') {
                    const msgs = await db.collection('groups').doc(groupIdOpen).collection('messages').get();
                    for (const msg of msgs.docs) await msg.ref.delete();
                    showSuccess('Чат очищен');
                }
                backToList();
            } catch(e) { showError('Ошибка очистки'); }
            closeModals();
        }
        
        function openChatSettings() { document.getElementById('modalChatSettings').classList.remove('hidden'); }
        function closeModals() {
            document.getElementById('modalCreate').classList.add('hidden');
            document.getElementById('modalJoin').classList.add('hidden');
            document.getElementById('modalChatSettings').classList.add('hidden');
        }
        
        // ========== Фото ==========
        function removeAttachedImage() { lastUploadedImage = null; document.getElementById('imagePreviewContainer').classList.add('hidden'); document.getElementById('imageInput').value = ''; }
        function pickImage() { document.getElementById('imageInput').click(); }
        
        document.getElementById('imageInput').addEventListener('change', async function() {
            const file = this.files[0]; this.value = '';
            if (!file || file.size > 5*1024*1024) { showError('Файл >5МБ'); return; }
            const fd = new FormData(); fd.append('image', file);
            try {
                const res = await fetch(`https://api.imgbb.com/1/upload?key=${IMGBB_API_KEY}`, { method: 'POST', body: fd });
                const data = await res.json();
                if (data.success) {
                    lastUploadedImage = data.data.url;
                    document.getElementById('previewImage').src = data.data.url;
                    document.getElementById('imagePreviewContainer').classList.remove('hidden');
                } else showError('Ошибка загрузки');
            } catch(e) { showError('Ошибка загрузки фото'); }
        });
        
        // ========== Инициализация ==========
        async function loadMyProfile() {
            const doc = await db.collection('users').doc(currentUser.uid).get();
            if (doc.exists) {
                myUserData = doc.data();
                if (!myUserData.usernameLower && myUserData.username) {
                    await doc.ref.update({ usernameLower: myUserData.username.toLowerCase() });
                }
            }
        }
        
        function goToUserProfile(uid) {
            if (uid === currentUser?.uid) window.location.href = 'profil.html';
            else window.location.href = `users_profil.html?userId=${uid}`;
        }
        
        auth.onAuthStateChanged(async (user) => {
            if (!user) { window.location.href = 'index.html'; return; }
            currentUser = user;
            await loadMyProfile();
            loadChatsListener();
            
            document.getElementById('messageInput').addEventListener('keypress', (e) => {
                if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendNow(); }
            });
        });
        
        window.goProfile = goProfile;
        window.goToLenta = goToLenta;
        window.backToList = backToList;
        window.sendNow = sendNow;
        window.pickImage = pickImage;
        window.removeAttachedImage = removeAttachedImage;
        window.runUserSearch = runUserSearch;
        window.openCreateGroupModal = openCreateGroupModal;
        window.openJoinModal = openJoinModal;
        window.submitCreateGroup = submitCreateGroup;
        window.submitJoinGroup = submitJoinGroup;
        window.clearChat = clearChat;
        window.openChatSettings = openChatSettings;
        window.closeModals = closeModals;
    </script>
</body>
</html>
